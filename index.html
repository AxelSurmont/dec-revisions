button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}

.bt2{background:linear-gradient(135deg,var(--yl),var(--rd));color:#fff}
.bt3{background:var(--cd);color:var(--tx);border:1px solid var(--bd)}
.bt4{background:linear-gradient(135deg,var(--gn),#059669);color:#fff}
.cd{background:var(--cd);border-radius:16px;padding:20px;border:1px solid var(--bd)}

.ch.sel{border-color:var(--b2);background:rgba(96,165,250,.12);color:var(--b2)}
.ch.ok{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.15);color:var(--gn);font-weight:600}
.ch.wrong{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:var(--rd)}
.fi{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--bd);background:rgba(255,255,255,.06);color:var(--tx);font-size:14px}
.fi:focus{border-color:var(--bl)}
.fi::placeholder{color:var(--dm)}
.kw{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;margin:2px}
.kw-ok{background:rgba(16,185,129,.15);color:var(--gn);border:1px solid rgba(16,185,129,.3)}
.kw-miss{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}

.mn{font-family:'JetBrains Mono',monospace}
.pb{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s}
.fade{animation:fadeIn .3s}

.help-btn{padding:8px 14px;border-radius:9px;border:1px solid rgba(168,85,247,.3);background:rgba(168,85,247,.1);color:#a855f7;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;margin-bottom:10px}

{id:"ec2",p:"EC",th:"Exercice",ty:"qcm",q:"L'EC peut-il représenter son client devant les tribunaux ?",ch:["Oui, sans restriction","Oui, si lettre de mission","Non, mais il peut l'assister","Non, en aucun cas"],a:2,ex:"Art. 22 al. 5 : représentation interdite, assistance autorisée.",sr:"Art. 22 ord. 1945"},
{id:"ec3",p:"EC",th:"Exercice",ty:"qcm",q:"Ratio d'encadrement maximal pour un EC ?",ch:["10 salariés","12 salariés","15 salariés","20 salariés"],a:2,ex:"15 salariés comptables par professionnel inscrit.",sr:"Décret 2012-432"},
{id:"ec4",p:"EC",th:"Exercice",ty:"qrc",q:"L'expert-comptable peut-il donner des consultations juridiques ? Si oui, dans quelles conditions ?",a:"Oui, à titre accessoire et si directement liées aux travaux comptables ou pour un client bénéficiant d'une mission comptable permanente (art. 22 al. 8 et 10 ord. 1945). Elles ne doivent pas constituer l'objet principal de l'activité.",sr:"Art. 22 ord. 1945",kw:["accessoire","liées aux travaux comptables","article 22","ordonnance 1945","objet principal"],tip:"Précisez le caractère accessoire ET le lien obligatoire avec la mission comptable. Citez l'article."},
{id:"ec5",p:"EC",th:"Exercice",ty:"qcm",q:"Fonction incompatible avec la profession d'EC ?",ch:["Conseil patrimoine (accessoire)","Tiers payant député UE","Assister clients devant tribunaux","Représenter clients devant tribunaux"],a:3,ex:"Représentation interdite (art. 22 al. 5). Assistance autorisée.",sr:"Art. 22 ord. 1945"},
// EC - Déontologie
{id:"ec6",p:"EC",th:"Déontologie",ty:"qcm",q:"La lettre de mission est-elle obligatoire pour l'EC ?",ch:["Oui, toujours","Oui, sauf missions accessoires","Non, recommandée","Non, sauf audit"],a:0,ex:"Art. 151 : obligatoire avant toute intervention.",sr:"Art. 151 décret 2012-432"},
{id:"ec7",p:"EC",th:"Déontologie",ty:"qcm",q:"Honoraires au succès pour optimisation fiscale ?",ch:["Oui, libre","Non, jamais","Non, car assiette fiscale","Oui, si accord écrit"],a:2,ex:"Missions touchant l'assiette fiscale : pas de rémunération au succès.",sr:"Art. 158 décret 2012-432"},
{id:"ec8",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les obligations de l'EC successeur en matière de confraternité ?",a:"S'assurer que les honoraires du prédécesseur sont réglés et l'informer de sa nomination (art. 163). Suggérer la conciliation ou l'arbitrage en cas de contestation.",sr:"Art. 163 décret 2012-432",kw:["honoraires","prédécesseur","réglés","informer","nomination","article 163","conciliation"],tip:"Deux obligations distinctes : vérification du paiement des honoraires + information du confrère. Citez l'article 163."},
{id:"ec9",p:"EC",th:"Déontologie",ty:"qcm",q:"Action de promotion NON autorisée pour un EC ?",ch:["Référencement société non inscrite","Site notation clients","Parrainage par clients","Publicité « premier réseau »"],a:3,ex:"Art. 152 : publicité sans élément comparatif. « Premier réseau » = comparatif.",sr:"Art. 152 décret 2012-432"},
{id:"ec10",p:"EC",th:"Déontologie",ty:"qcm",q:"Droit de rétention sur comptes annuels si indemnité rupture impayée ?",ch:["Oui","Oui si lettre de mission","Non","Selon circonstances"],a:2,ex:"Droit de rétention limité aux documents liés aux travaux effectués, pas à l'indemnité de rupture.",sr:"CNOEC 2025 p.230"},
{id:"ec11",p:"EC",th:"Déontologie",ty:"qrc",q:"Dans quelle situation l'EC peut-il opposer le secret professionnel ?",a:"Lors d'une audition pénale en qualité de témoin ou suspect libre (art. 109 CPP). L'EC doit se soumettre à la convocation mais peut refuser de témoigner sur les éléments couverts par le secret.",sr:"CNOEC Secret pro 2021",kw:["audition pénale","témoin","suspect libre","article 109","refuser","témoigner","secret"],tip:"Distinguez l'obligation de se présenter (pas de choix) du droit de refuser de témoigner sur les éléments couverts. Citez l'art. 109 CPP."},
// EC - Contrôle qualité

{id:"ec13",p:"EC",th:"Qualité",ty:"qcm",q:"Niveaux de vigilance NPLAB anti-blanchiment ?",ch:["Faible et accrue","Allégée et standard","Standard et renforcée","Standard et accentuée"],a:2,ex:"Standard (risque faible/moyen) et renforcée (risque élevé).",sr:"NPLAB §21"},

{id:"ec14",p:"EC",th:"Responsabilité",ty:"qcm",q:"Sanction disciplinaire EC inexistante :",ch:["Remontrance avec inscription","Blâme avec inscription","Suspension avec sursis","Radiation du Tableau"],a:0,ex:"« Remontrance » n'existe pas. Sanctions : réprimande, blâme, suspension, radiation.",sr:"Art. 53 ord. 1945"},
{id:"ec15",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelle est la peine pour exercice illégal de la profession d'EC ?",a:"Délit puni des peines prévues aux articles 433-17 et 433-25 du code pénal, sans préjudice des sanctions disciplinaires.",sr:"Art. 20 ord. 1945",kw:["délit","433-17","433-25","code pénal","sanctions disciplinaires"],tip:"Citez les articles du code pénal applicables et mentionnez le cumul possible avec les sanctions disciplinaires."},

{id:"cac3",p:"CAC",th:"Exercice",ty:"qcm",q:"Institution NE pouvant PAS demander une NEP ?",ch:["Ministère Justice","AMF","CRCC","Conseil norm. comptes publics"],a:2,ex:"CRCC absente de la liste art. L. 820-3.",sr:"Art. L. 820-3"},

{id:"cac9",p:"CAC",th:"Déontologie",ty:"qcm",q:"Disposition absente du Titre I code déonto CAC ?",ch:["Principes fondamentaux","Monopole autres professions","Collaborateurs externes","Honoraires proportionnels autorisés"],a:3,ex:"Honoraires proportionnels/conditionnels interdits (art. 12-13).",sr:"Code déonto CAC, Titre I"},
{id:"cac10",p:"CAC",th:"Déontologie",ty:"qrc",q:"En cas de litige sur les honoraires portant sur des prestations du CAC, quelle juridiction saisir ?",a:"Le tribunal compétent (droit commun). La H2A n'est plus compétente, contrairement à l'ancien H3C.",sr:"Fiche CNCC n°2",kw:["tribunal","compétent","droit commun","H2A","plus compétente","H3C"],tip:"Le piège est de répondre H2A. Insistez sur le changement par rapport à l'ancien système H3C."},

{id:"cac14",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Procédure disciplinaire inexistante pour le CAC ?",ch:["Composition administrative","Procédure simplifiée","Droit commun","Comparution immédiate"],a:3,ex:"3 procédures : classique, simplifiée, composition administrative.",sr:"Fiche CNCC n°4"},
{id:"cac15",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Montant max sanction pécuniaire CAC personne physique ?",a:"250 000 € maximum (art. L. 821-71). Prononcée par la Commission des sanctions H2A.",sr:"Art. L. 821-71",kw:["250 000","Commission des sanctions","H2A","article L. 821-71","disciplinaire"],tip:"Donnez le montant exact, précisez que c'est disciplinaire (pas pénal) et l'organe qui prononce."},

// ── EXERCICE DE LA PROFESSION (25 questions) ──

{id:"v4e1",p:"EC",th:"Exercice",ty:"qcm",q:"Quelles formes juridiques sont INTERDITES pour exercer l'expertise comptable ?",ch:["SARL et EURL","SAS et SA","SNC et société en commandite","Société civile et SCOP"],a:2,ex:"Art. 7 ord. 1945 : toutes formes sauf celles conférant la qualité de commerçant (SNC, commandite).",sr:"Art. 7 ord. 1945"},
{id:"v4e2",p:"EC",th:"Exercice",ty:"qcm",q:"Quelle proportion des droits de vote doit être détenue par des EC dans une SEC ?",ch:["La majorité simple (50%+1)","Plus de deux tiers","Au moins trois quarts","La totalité"],a:1,ex:"Art. 7-I : les EC et personnes autorisées doivent détenir plus de 2/3 des droits de vote.",sr:"Art. 7-I ord. 1945"},
{id:"v4e3",p:"EC",th:"Exercice",ty:"qrc",q:"Un expert-comptable de nationalité étrangère (hors UE/EEE), inscrit au Tableau français, peut-il créer une société d'expertise comptable en France ?",a:"Oui, depuis l'ordonnance n°2023-77 du 8 février 2023, tout EC inscrit au Tableau français peut créer une SEC quelle que soit sa nationalité, en vertu du principe d'égalité devant la loi et de la liberté d'entreprendre.",sr:"Art. 7 ord. 1945 modifié par Ord. 2023-77",kw:["oui","ordonnance 2023-77","8 février 2023","nationalité","égalité","liberté d'entreprendre","tableau"],tip:"Rappelez la modification législative de 2023 qui a corrigé l'omission de l'ordonnance de 1945. Citez les principes constitutionnels."},
{id:"v4e4",p:"EC",th:"Exercice",ty:"qcm",q:"Une personne morale peut être représentant légal d'une SEC sous forme de :",ch:["SARL uniquement","SAS ou société civile","SA uniquement","Toute forme juridique"],a:1,ex:"Depuis l'ord. 2023-77, une SEC ou SPEC peut diriger une SAS ou société civile d'EC.",sr:"Art. 7 ord. 1945"},
{id:"v4e5",p:"EC",th:"Exercice",ty:"qcm",q:"Nombre minimum d'adhérents pour inscrire une AGC au tableau de l'Ordre ?",ch:["100 adhérents","200 adhérents","300 adhérents","500 adhérents"],a:2,ex:"Art. 7 ter : aucune AGC ne peut être inscrite avec moins de 300 adhérents.",sr:"Art. 7 ter ord. 1945"},
{id:"v4e6",p:"EC",th:"Exercice",ty:"qcm",q:"L'expert-comptable en entreprise (art. 13 ord. 1945) peut-il accomplir les missions des deux premiers alinéas de l'article 2 ?",ch:["Non, jamais","Oui, sans restriction","Oui, uniquement pour son employeur","Oui, pour les filiales de son employeur"],a:2,ex:"Art. 13-III : uniquement au bénéfice de l'entité juridique qui l'emploie.",sr:"Art. 13 ord. 1945"},
{id:"v4e7",p:"EC",th:"Exercice",ty:"qrc",q:"Qu'est-ce que le « mandat implicite » introduit par la loi PACTE et quelles en sont les limites ?",a:"Le mandat implicite est une présomption simple de mandat qui permet à l'EC d'agir auprès de l'administration fiscale et des organismes de sécurité sociale sans produire de mandat signé pour chaque démarche. Exception : les identifiants fiscaux des particuliers (création de compte, mot de passe, adresse mail) nécessitent toujours un mandat exprès.",sr:"Art. 151 décret 2012-432 / Loi PACTE 2019",kw:["présomption simple","administration fiscale","sécurité sociale","mandat signé","particuliers","identifiants fiscaux","exception"],tip:"Distinguez bien la règle (présomption simple pour fiscal/social) de l'exception (identifiants fiscaux des particuliers). Mentionnez que la lettre de mission reste obligatoire."},
{id:"v4e8",p:"EC",th:"Exercice",ty:"qcm",q:"Quel statut interdit à un avocat de créer un cabinet d'EC même s'il est diplômé DEC ?",ch:["Loi PACTE 2019","Art. 21 décret n°2023-552","Art. 7 ord. 1945","Code de commerce"],a:1,ex:"Le décret 2023-552 interdit aux avocats d'exercer toute autre profession, y compris l'EC.",sr:"Décret n°2023-552 du 30/06/2023"},
{id:"v4e9",p:"EC",th:"Exercice",ty:"qcm",q:"Les SCP (Sociétés Civiles Professionnelles) peuvent-elles être utilisées par les EC ?",ch:["Oui, librement","Oui, avec autorisation du CR","Non, faute de décret d'application","Non, car forme commerciale"],a:2,ex:"Pas de décret d'application pour la profession d'EC concernant les SCP.",sr:"Guide profession EC 2025"},
{id:"v4e10",p:"EC",th:"Exercice",ty:"qcm",q:"La détention du capital des SEC est-elle réglementée ?",ch:["Oui, mêmes règles que les droits de vote","Non, seuls les droits de vote le sont","Oui, au moins 50% par des EC","Non, aucune règle"],a:1,ex:"Art. 7 ord. 1945 : pas de disposition sur le capital, seuls les droits de vote (2/3) sont réglementés.",sr:"Art. 7 ord. 1945"},
{id:"v4e11",p:"EC",th:"Exercice",ty:"qrc",q:"Un expert-comptable peut-il investir dans une start-up cliente de son cabinet ? Quelles précautions prendre ?",a:"Oui, si l'investissement ne constitue pas des intérêts substantiels (pas de capacité d'interférence dans le processus de décision, comme un droit de blocage). Des mesures de sauvegarde doivent être mises en place : suivi par un autre EC du cabinet (code éthique IESBA).",sr:"Art. 22 al. 5 ord. 1945 / Code éthique IESBA",kw:["intérêts substantiels","blocage","mesures de sauvegarde","IESBA","autre expert-comptable","indépendance"],tip:"Distinguez l'investissement modéré des intérêts substantiels (= capacité d'interférer). Mentionnez le code IESBA et les mesures de sauvegarde."},
{id:"v4e12",p:"EC",th:"Exercice",ty:"qcm",q:"Quelle mission est interdite à l'EC au sein de sa structure d'exercice inscrite ?",ch:["Recouvrement amiable de créances","Représentation fiscale (répondant)","Mandataire fiscal","Conseil en investissements financiers"],a:1,ex:"Le représentant fiscal est garant du paiement de l'impôt = assimilé à agence d'affaires, interdit.",sr:"Art. 22 al. 5 ord. 1945"},
{id:"v4e13",p:"EC",th:"Exercice",ty:"qcm",q:"Depuis quand les activités commerciales accessoires sont-elles effectives pour les EC ?",ch:["6 août 2015 (loi Macron)","22 mai 2019 (loi PACTE)","3 mai 2021 (arrêté agrément)","1er janvier 2020"],a:2,ex:"Norme agréée par arrêté du 12 mars 2021, entrée en vigueur le 3 mai 2021.",sr:"Arrêté 12/03/2021"},
{id:"v4e14",p:"EC",th:"Exercice",ty:"qcm",q:"L'EC peut-il exercer l'activité d'agent immobilier ?",ch:["Oui, à titre accessoire","Oui, via une filiale non inscrite","Non, car agence d'affaires interdite","Non, sauf autorisation du CR"],a:2,ex:"Agent immobilier = agence d'affaires (art. 22 al. 5). Activité limitée au conseil.",sr:"Art. 22 ord. 1945 / Loi Hoguet"},
{id:"v4e15",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les conditions pour qu'un EC puisse faire de l'intermédiation en assurances dans sa structure d'exercice ?",a:"L'EC ne peut exercer que comme mandataire d'intermédiaire d'assurance (pas courtier ni agent général). Il doit : s'inscrire à l'ORIAS, souscrire une assurance RCP, se faire rémunérer sous forme d'honoraires par ses clients (pas de commissions), et ne pas réaliser de prestations d'encaissement.",sr:"Art. L 511-1 Code des assurances / Art. 24 ord. 1945",kw:["mandataire d'intermédiaire","ORIAS","honoraires","pas de commissions","encaissement","assurance RCP"],tip:"Le piège est de confondre avec le courtier (commerçant = interdit). Détaillez les 4 conditions cumulatives."},
{id:"v4e16",p:"EC",th:"Exercice",ty:"qcm",q:"Le seuil de participation dans une société non inscrite déclenchant le contrôle du CR est de :",ch:["5% des droits de vote","10% des droits de vote ou bénéfices","25% du capital","Toute participation"],a:1,ex:"Art. 601 RI : participation > 10% des droits de vote ou des bénéfices soumise au contrôle.",sr:"Art. 601 et s. RI de l'Ordre"},
{id:"v4e17",p:"EC",th:"Exercice",ty:"qcm",q:"Quel texte encadre les SPE (sociétés pluriprofessionnelles d'exercice) depuis le 1er septembre 2024 ?",ch:["Loi n°90-1258 du 31/12/1990","Ordonnance n°2023-77 du 8/02/2023","Loi PACTE 2019","Décret 2012-432"],a:1,ex:"L'ordonnance de 2023 a remplacé la loi de 1990, abrogée depuis le 1er sept. 2024.",sr:"Ord. n°2023-77"},
{id:"v4e18",p:"EC",th:"Exercice",ty:"qcm",q:"Dans une SPE, la comptabilité doit être :",ch:["Unique pour toute la société","Distincte pour chaque profession","Distincte seulement si plus de 2 professions","Au choix des associés"],a:1,ex:"Les SPE doivent établir une comptabilité distincte pour chacune des professions exercées.",sr:"Ord. n°2023-77 / Décret 2025-131"},
{id:"v4e19",p:"EC",th:"Exercice",ty:"qcm",q:"L'EC peut-il être rémunéré sous forme de commissions pour ses activités commerciales accessoires ?",ch:["Oui, dans le cadre de la norme","Non, exclusivement des honoraires","Oui, si accord écrit du client","Oui, pour les actes d'intermédiaire"],a:1,ex:"Art. 24 ord. 1945 : honoraires exclusifs de toute autre rémunération, même pour activités commerciales.",sr:"Art. 24 ord. 1945"},
{id:"v4e20",p:"EC",th:"Exercice",ty:"qrc",q:"Le cabinet d'expertise comptable peut-il séquestrer des fonds pour le compte de son client ?",a:"Non. Depuis la loi PACTE 2019, seuls le recouvrement amiable de créances et le mandat de paiement sont autorisés. Le paiement doit se faire via les comptes bancaires du client (codes d'accès spécifiques fournis par le client). L'EC ne peut pas encaisser de fonds sur ses propres comptes.",sr:"Art. 22 al. 4 ord. 1945 / Art. 151-3 décret 2012",kw:["non","recouvrement amiable","mandat de paiement","comptes bancaires du client","codes d'accès","pas encaisser"],tip:"Précisez les deux seules missions autorisées (mandat de paiement + recouvrement amiable) et que les fonds transitent uniquement par les comptes du client."},
{id:"v4e21",p:"EC",th:"Exercice",ty:"qcm",q:"L'EC est dispensé d'immatriculation ORIAS pour le CIF (conseil en investissements financiers) quand :",ch:["Jamais, l'ORIAS est toujours obligatoire","La mission est accessoire de l'activité EC","Le client est un particulier","Les montants sont inférieurs à 15 000 €"],a:1,ex:"Art. L 531-2 g CMF : dispensé si service d'investissement à titre accessoire dans le cadre d'une activité réglementée.",sr:"Art. L 531-2 / L 541-1 CMF"},
{id:"v4e22",p:"EC",th:"Exercice",ty:"qcm",q:"Les honoraires de succès sont interdits pour les missions :",ch:["De conseil en organisation","D'accompagnement au financement","Relevant de l'assiette fiscale ou sociale","D'aide au recrutement"],a:2,ex:"Art. 24 ord. 1945 modifié par PACTE : interdit pour missions touchant l'assiette fiscale/sociale.",sr:"Art. 24 ord. 1945 / Art. 158 décret"},
{id:"v4e23",p:"EC",th:"Exercice",ty:"qcm",q:"La mission d'établissement des bulletins de paie peut-elle être réalisée sans mission comptable ?",ch:["Non, mission comptable obligatoire","Oui, si accessoire de l'activité du cabinet","Non, c'est un acte juridique","Oui, uniquement pour les AGC"],a:1,ex:"Bulletins de paie = travaux administratifs/techniques domaine social (art. 22 al. 8-9), pas d'acte sous seing privé.",sr:"Art. 22 al. 8-9 ord. 1945"},
{id:"v4e24",p:"EC",th:"Exercice",ty:"qcm",q:"Qui exerce la tutelle sur l'Ordre des experts-comptables ?",ch:["Le ministère de la Justice","Le ministère de l'Économie","Le Premier ministre","La Cour des comptes"],a:1,ex:"Art. 56 ord. 1945 : ministre chargé de l'économie, représenté par un Commissaire du Gouvernement.",sr:"Art. 56 ord. 1945"},
{id:"v4e25",p:"EC",th:"Exercice",ty:"qrc",q:"Un cabinet d'EC peut-il créer une filiale pour réaliser du suivi juridique de ses clients EC ?",a:"Non, si le suivi juridique implique des consultations juridiques ou la rédaction d'actes sous seing privé. Ces missions ne peuvent être réalisées que dans une structure inscrite à l'Ordre, à titre accessoire, et uniquement pour un client bénéficiant d'une mission comptable permanente ou habituelle, ou directement lié aux travaux comptables.",sr:"Art. 22 al. 8 et 10 ord. 1945",kw:["non","consultations juridiques","actes sous seing privé","structure inscrite","accessoire","mission comptable","permanente"],tip:"La clé est que la dérogation pour les prestations juridiques ne s'applique qu'au sein de structures inscrites à l'Ordre."},

// ── DÉONTOLOGIE (25 questions) ──

{id:"v4d1",p:"EC",th:"Déontologie",ty:"qcm",q:"Le code de déontologie EC est contenu dans quel texte ?",ch:["Ordonnance de 1945","Décret n°2012-432 du 30/03/2012","Règlement intérieur de l'Ordre","Arrêté du 6 mars 2024"],a:1,ex:"Le code de déontologie constitue le chapitre II du titre III du décret 2012-432 (art. 141 à 169).",sr:"Décret 2012-432"},
{id:"v4d2",p:"EC",th:"Déontologie",ty:"qcm",q:"Dans quel délai l'EC doit-il prêter serment après inscription au tableau ?",ch:["1 mois","3 mois","6 mois","12 mois"],a:2,ex:"Art. 143 : dans les six mois de l'inscription au tableau.",sr:"Art. 143 décret 2012-432"},
{id:"v4d3",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelle est la formule du serment de l'expert-comptable ?",a:"« Je jure d'exercer ma profession avec conscience et probité, de respecter et faire respecter les lois dans mes travaux. » Prestation devant le conseil régional de l'ordre.",sr:"Art. 143 décret 2012-432",kw:["conscience","probité","respecter","lois","travaux","conseil régional"],tip:"Citez la formule exacte et précisez devant quelle instance le serment est prêté."},
{id:"v4d4",p:"EC",th:"Déontologie",ty:"qcm",q:"L'article 145 du code de déontologie impose à l'EC de ne jamais se trouver en situation de :",ch:["Dépendance financière","Conflit d'intérêts","Rémunération au succès","Pluriactivité"],a:1,ex:"Art. 145 al. 5 : ne jamais se trouver en situation de conflit d'intérêts.",sr:"Art. 145 décret 2012-432"},
{id:"v4d5",p:"EC",th:"Déontologie",ty:"qcm",q:"L'article 147 du code de déontologie porte sur :",ch:["Le devoir de conseil","Le devoir de discrétion","Le secret professionnel","La formation continue"],a:1,ex:"Art. 147 : devoir de discrétion, sans préjudice du secret professionnel (art. 21 ord.).",sr:"Art. 147 décret 2012-432"},
{id:"v4d6",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les conditions de démarchage autorisées pour un expert-comptable depuis 2014 ?",a:"Le démarchage est autorisé depuis le décret du 18 août 2014 modifiant l'art. 152, dans des conditions compatibles avec les règles déontologiques. Les limites : respect de l'indépendance, dignité, honneur, secret professionnel, loyauté envers les clients et confrères (art. 161 : pas de démarche susceptible de nuire aux confrères).",sr:"Art. 152 décret 2012-432 / Décret 18/08/2014",kw:["autorisé","2014","article 152","indépendance","dignité","secret professionnel","loyauté","confrères"],tip:"Rappelez l'arrêt CJUE 2011 qui a annulé l'interdiction totale, puis le nouvel encadrement de 2014. Citez les limites."},
{id:"v4d7",p:"EC",th:"Déontologie",ty:"qcm",q:"La publicité de l'EC doit être exempte de tout élément :",ch:["Tarifaire","Comparatif","Numérique","Technique"],a:1,ex:"Art. 152 : exempt de tout élément comparatif, décent et empreint de retenue.",sr:"Art. 152 décret 2012-432"},
{id:"v4d8",p:"EC",th:"Déontologie",ty:"qcm",q:"L'EC qui fait l'objet de poursuites judiciaires liées à sa profession doit en informer :",ch:["Le procureur de la République","Le président du conseil régional","Le Conseil national","Le commissaire du Gouvernement"],a:1,ex:"Art. 167 : informer sans délai le président du CR de la circonscription d'inscription.",sr:"Art. 167 décret 2012-432"},
{id:"v4d9",p:"EC",th:"Déontologie",ty:"qcm",q:"En cas de différend entre EC, la conciliation est :",ch:["Facultative","Obligatoire avant toute plainte","Obligatoire seulement pour les honoraires","Décidée par le Conseil national"],a:1,ex:"Art. 161 modifié par décret 2025-506 : conciliation ou arbitrage obligatoire avant plainte, sous peine d'irrecevabilité.",sr:"Art. 161 décret 2012-432 (mod. 2025)"},
{id:"v4d10",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les mentions autorisées sur les imprimés professionnels de l'EC (art. 154) ?",a:"Nom, prénoms, raison sociale, adresses, téléphone, email ; titres et diplômes ; spécialisations issues de la formation ou de l'expérience ; nom de l'assureur et n° de police ; référence à une norme de certification ; qualité d'expert judiciaire ou CAC ; distinctions honorifiques ; appartenance à un réseau professionnel.",sr:"Art. 154 décret 2012-432",kw:["diplômes","spécialisations","assureur","police","certification","expert judiciaire","distinctions","réseau"],tip:"Listez les 8 catégories de mentions autorisées par l'article 154."},
{id:"v4d11",p:"EC",th:"Déontologie",ty:"qcm",q:"L'EC peut mentionner ses spécialisations sur ses imprimés depuis :",ch:["La loi PACTE 2019","Le décret du 30/12/2022","L'arrêté du 6 mars 2024","Toujours"],a:1,ex:"Décret 2022-1732 : modification art. 154, spécialisations issues formation ou expérience sans reconnaissance préalable de l'Ordre.",sr:"Art. 154 / Décret 2022-1732"},
{id:"v4d12",p:"EC",th:"Déontologie",ty:"qcm",q:"Pour justifier une spécialisation, l'EC doit prouver une formation d'au moins :",ch:["40 heures sur 5 ans","80 heures sur 3 ans","120 heures sur 5 ans","200 heures sur 10 ans"],a:2,ex:"Art. 306 RI : 120h sur 5 ans, ou 40h formation + animation, ou 10% de l'activité annuelle.",sr:"Art. 306 RI de l'Ordre"},
{id:"v4d13",p:"EC",th:"Déontologie",ty:"qcm",q:"Le délai pour le président du CR pour engager une conciliation entre EC est de :",ch:["1 mois","2 mois","3 mois","6 mois"],a:1,ex:"Art. 161 modifié 2025 : 2 mois pour engager, 4 mois pour mener à terme.",sr:"Art. 161 décret 2012-432"},
{id:"v4d14",p:"EC",th:"Déontologie",ty:"qcm",q:"L'article 150 oblige l'EC à apprécier avant d'accepter une mission :",ch:["Les honoraires du prédécesseur","La possibilité de l'effectuer conformément aux textes","La taille de l'entreprise cliente","L'avis du conseil régional"],a:1,ex:"Art. 150 : apprécier la possibilité d'effectuer la mission conformément aux textes et normes.",sr:"Art. 150 décret 2012-432"},
{id:"v4d15",p:"EC",th:"Déontologie",ty:"qrc",q:"L'article 146 du code de déontologie porte sur l'indépendance. Quelles obligations en découlent ?",a:"L'EC doit éviter toute situation qui pourrait faire présumer d'un manque d'indépendance. Il doit être libre de tout lien extérieur d'ordre personnel, professionnel ou financier qui pourrait être interprété comme une entrave à son intégrité ou à son objectivité.",sr:"Art. 146 décret 2012-432",kw:["indépendance","présumer","libre","lien extérieur","personnel","professionnel","financier","intégrité","objectivité"],tip:"Citez les deux dimensions de l'article 146 : éviter les apparences ET être libre de tout lien."},
{id:"v4d16",p:"EC",th:"Déontologie",ty:"qcm",q:"L'article 157 impose à l'EC de dénoncer le contrat en cas de :",ch:["Retard de paiement des honoraires","Conflit d'intérêts ou atteinte à l'indépendance","Changement de dirigeant du client","Déménagement du client"],a:1,ex:"Art. 157 : obligation de dénoncer le contrat si conflit d'intérêts ou atteinte à l'indépendance.",sr:"Art. 157 décret 2012-432"},
{id:"v4d17",p:"EC",th:"Déontologie",ty:"qcm",q:"Le remplacement provisoire d'un EC décédé est une mission de confraternité :",ch:["Rémunérée au tarif horaire","Gratuite (sauf importance de la mission)","Facturée au CR","Payée par l'assurance du défunt"],a:1,ex:"Art. 166 : mission gratuite, sauf indemnité si l'importance le justifie, soumise à l'agrément du CR.",sr:"Art. 166 décret 2012-432"},
{id:"v4d18",p:"EC",th:"Déontologie",ty:"qcm",q:"L'indépendance selon le code IESBA recouvre :",ch:["Indépendance financière et morale","Indépendance d'esprit et en apparence","Indépendance technique et juridique","Indépendance fonctionnelle et hiérarchique"],a:1,ex:"Code IESBA : indépendance d'esprit (jugement non affecté) et en apparence (tiers raisonnable).",sr:"Code éthique IESBA"},
{id:"v4d19",p:"EC",th:"Déontologie",ty:"qcm",q:"L'arbitrage du président du CR entre l'EC et son client est soumis aux règles :",ch:["Du code de commerce","Du code de procédure civile (art. 1451 et suivants)","Du règlement intérieur de l'Ordre","Du code du travail"],a:1,ex:"Art. 160 : arbitrage soumis aux règles des articles 1451 et suivants du code de procédure civile.",sr:"Art. 160 décret 2012-432"},
{id:"v4d20",p:"EC",th:"Déontologie",ty:"qrc",q:"Quels motifs permettent à l'EC d'interrompre sa mission avant son terme normal (art. 156) ?",a:"Des motifs justes et raisonnables, tels que la perte de confiance manifestée par le client ou la méconnaissance par celui-ci d'une clause substantielle du contrat. L'EC doit s'efforcer de ne pas porter préjudice au client.",sr:"Art. 156 décret 2012-432",kw:["motifs justes","raisonnables","perte de confiance","clause substantielle","contrat","préjudice"],tip:"Citez les deux exemples donnés par l'article 156 et mentionnez l'obligation de ne pas nuire au client."},
{id:"v4d21",p:"EC",th:"Déontologie",ty:"qcm",q:"L'article 148 impose à l'EC de s'assurer que ses collaborateurs :",ch:["Sont tous diplômés DEC","Ont une compétence appropriée à la complexité des travaux","Ont au moins 3 ans d'expérience","Sont inscrits au tableau de l'Ordre"],a:1,ex:"Art. 148 : compétence appropriée, critères de qualité, respect des règles déontologiques.",sr:"Art. 148 décret 2012-432"},
{id:"v4d22",p:"EC",th:"Déontologie",ty:"qcm",q:"Le mandat spécial pour le paiement des dettes des clients (art. 151-3) impose que l'opération soit réalisée par :",ch:["Chèque du cabinet","Virement électronique via les comptes du client","Prélèvement automatique","Espèces"],a:1,ex:"Art. 151-3 : virement électronique grâce aux codes d'accès spécifiques aux comptes bancaires en ligne du client.",sr:"Art. 151-3 décret 2012-432"},
{id:"v4d23",p:"EC",th:"Déontologie",ty:"qcm",q:"Les membres élus des conseils de l'Ordre doivent s'abstenir de tout acte visant à :",ch:["Critiquer les normes professionnelles","Entraver le fonctionnement des organismes élus","Participer à des congrès internationaux","Communiquer avec la presse"],a:1,ex:"Art. 169 : s'abstenir d'entraver le fonctionnement ou d'empêcher la libre expression.",sr:"Art. 169 décret 2012-432"},
{id:"v4d24",p:"EC",th:"Déontologie",ty:"qcm",q:"L'EC envisageant une rétention de travaux pour impayé doit d'abord informer :",ch:["Le client par LRAR","Le président du conseil régional","Le tribunal de commerce","Le commissaire du Gouvernement"],a:1,ex:"Art. 168 : informer le président du CR avant de procéder à la rétention.",sr:"Art. 168 décret 2012-432"},
{id:"v4d25",p:"EC",th:"Déontologie",ty:"qrc",q:"Comment l'article 22 de l'ordonnance de 1945 encadre-t-il la notion d'intérêts substantiels ?",a:"L'article 22 interdit d'effectuer des travaux d'EC pour les entreprises dans lesquelles l'EC possède directement ou indirectement des intérêts substantiels. La notion d'intérêts substantiels s'entend comme la capacité à interférer dans le processus de décision (ex : droit de blocage de 33% en SARL ou 25% en SA).",sr:"Art. 22 al. 5 ord. 1945",kw:["intérêts substantiels","interférer","processus de décision","droit de blocage","33%","25%","interdit"],tip:"Définissez la notion d'intérêts substantiels avec les seuils concrets de blocage selon la forme sociale."},

// ── CONTRÔLE QUALITÉ / NORMES (20 questions) ──

{id:"v4q1",p:"EC",th:"Qualité",ty:"qcm",q:"Le cadre de référence du référentiel normatif a été agréé le :",ch:["1er septembre 2016","10 juin 2022","1er juillet 2025","22 août 2025"],a:2,ex:"Agréé par arrêté du 1er juillet 2025 (JO 21 août), applicable le 22 août 2025.",sr:"Cadre de référence, Réf. normatif 2025"},
{id:"v4q2",p:"EC",th:"Qualité",ty:"qcm",q:"Le cadre de référence distingue trois grandes natures de missions :",ch:["Comptables, juridiques, fiscales","D'assurance sur comptes, autres assurances, sans assurance","Audit, conseil, attestation","Légales, contractuelles, accessoires"],a:1,ex:"Missions d'assurance sur comptes complets historiques, autres missions d'assurance, missions sans assurance.",sr:"Cadre de référence"},
{id:"v4q3",p:"EC",th:"Qualité",ty:"qrc",q:"Quelle est la différence entre la mission de présentation des comptes (NP 2300) et l'examen limité (NP 2400) ?",a:"La présentation (NP 2300) exprime une assurance modérée sur la cohérence et vraisemblance des comptes, basée sur les informations du client, la technique comptable et les procédés analytiques. Elle n'est pas applicable aux comptes consolidés. L'examen limité (NP 2400) exprime une assurance modérée sur la conformité au référentiel comptable, avec des diligences supérieures : prise de connaissance, analyse des procédures, collecte d'éléments probants. Il peut porter sur des comptes consolidés.",sr:"Cadre de référence / NP 2300 et NP 2400",kw:["présentation","cohérence","vraisemblance","examen limité","conformité","référentiel","assurance modérée","consolidés","éléments probants"],tip:"Les deux expriment une assurance modérée mais sur des objets différents. Précisez le champ d'application (consolidés ou non)."},
{id:"v4q4",p:"EC",th:"Qualité",ty:"qcm",q:"La mission d'audit d'états financiers exprime une assurance :",ch:["Modérée","Raisonnable","Absolue","Limitée"],a:1,ex:"Assurance raisonnable sur la conformité des états financiers au référentiel applicable.",sr:"Cadre de référence"},
{id:"v4q5",p:"EC",th:"Qualité",ty:"qcm",q:"La mission de compilation de comptes (NP 4410) est destinée :",ch:["À toutes les entités","Exclusivement aux entités du périmètre de consolidation d'un groupe audité","Aux associations","Aux TPE"],a:1,ex:"Exclusivement destinée aux filiales d'un groupe audité qui assure en interne sa comptabilité.",sr:"NP 4410 / Cadre de référence"},
{id:"v4q6",p:"EC",th:"Qualité",ty:"qcm",q:"La NPMQ (Norme Professionnelle de Management de la Qualité) est applicable depuis :",ch:["1er juillet 2022","1er janvier 2025","1er septembre 2016","3 mai 2021"],a:1,ex:"Agréée le 30 mai 2024, applicable à compter du 1er janvier 2025.",sr:"NPMQ, Réf. normatif 2025"},
{id:"v4q7",p:"EC",th:"Qualité",ty:"qcm",q:"Le système de management de la qualité (NPMQ) est constitué de :",ch:["Règles, procédures écrites, dispositif de surveillance","Manuel qualité, rapports, contrôles","Normes ISA, code déontologie, NPLAB","Logiciels, bases de données, archives"],a:0,ex:"NPMQ §3 : règles + procédures écrites + dispositif de surveillance.",sr:"NPMQ §3"},
{id:"v4q8",p:"EC",th:"Qualité",ty:"qrc",q:"Quels sont les 8 domaines couverts par le système de management de la qualité (NPMQ §11) ?",a:"1) Évaluation des risques qualité, 2) Responsabilité de l'équipe dirigeante, 3) Règles de déontologie, 4) Acceptation et maintien des relations clients/missions, 5) Ressources, 6) Réalisation des missions, 7) Surveillance du SMQ, 8) Informations et communications.",sr:"NPMQ §11",kw:["risques","équipe dirigeante","déontologie","acceptation","maintien","ressources","réalisation","surveillance","communications"],tip:"Listez les 8 domaines dans l'ordre de la norme. Les erreurs classiques : oublier « informations et communications » ou « évaluation des risques »."},
{id:"v4q9",p:"EC",th:"Qualité",ty:"qcm",q:"Les modalités d'application de la NPMQ (paragraphes commençant par « A ») sont :",ch:["Obligatoires comme les exigences requises","Obligatoires seulement pour les grands cabinets","Non obligatoires mais facilitent l'application","Optionnelles et sans valeur normative"],a:2,ex:"Les modalités d'application ne constituent pas des obligations mais facilitent l'application pertinente.",sr:"NPMQ §7"},
{id:"v4q10",p:"EC",th:"Qualité",ty:"qcm",q:"Selon la NPMQ, qui assume la responsabilité du système de management de la qualité ?",ch:["Le responsable qualité désigné","L'équipe dirigeante","Le conseil régional de l'Ordre","Chaque responsable de mission"],a:1,ex:"NPMQ §13 : l'équipe dirigeante promeut la culture qualité et assume la responsabilité du SMQ.",sr:"NPMQ §13"},
{id:"v4q11",p:"EC",th:"Qualité",ty:"qcm",q:"La NPMQ exige une confirmation écrite périodique du respect de l'indépendance par :",ch:["Les clients","Les stagiaires uniquement","Tout le personnel technique","L'équipe dirigeante seule"],a:2,ex:"NPMQ §17 : confirmation écrite périodique de tout le personnel technique.",sr:"NPMQ §17"},
{id:"v4q12",p:"EC",th:"Qualité",ty:"qcm",q:"Selon la NPLAB, la déclaration de soupçon à TRACFIN doit être conservée :",ch:["3 ans","5 ans à compter de l'envoi","10 ans","Indéfiniment"],a:1,ex:"NPLAB §16 : conservée 5 ans à compter de l'envoi, en dehors des dossiers (confidentiel).",sr:"NPLAB §16"},
{id:"v4q13",p:"EC",th:"Qualité",ty:"qcm",q:"Selon la NPLAB, le seuil en dessous duquel le responsable de mission n'exécute aucune vigilance pour un client occasionnel est de :",ch:["5 000 €","10 000 €","15 000 €","25 000 €"],a:2,ex:"NPLAB §26b : seuil de 15 000 € pour les opérations ponctuelles d'un client occasionnel.",sr:"NPLAB §26b"},
{id:"v4q14",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les obligations du correspondant TRACFIN au sein de la structure d'exercice ?",a:"Le correspondant TRACFIN est désigné lors de la première déclaration de soupçon. Il répond aux demandes de TRACFIN, centralise et transmet les informations générales de TRACFIN et du Conseil de l'Ordre, sensibilise la structure aux risques de blanchiment et assure la mise à jour des procédures internes.",sr:"NPLAB §12-13",kw:["correspondant","première déclaration","répondre","demandes","centraliser","informations","sensibiliser","blanchiment","procédures internes"],tip:"Distinguez les 4 rôles du correspondant TRACFIN prévus par la NPLAB §13."},
{id:"v4q15",p:"EC",th:"Qualité",ty:"qcm",q:"La classification des risques NPLAB s'opère selon au moins :",ch:["2 critères","3 critères","4 critères","6 critères"],a:2,ex:"NPLAB §19 : 4 critères minimum : caractéristiques des clients, activité, localisation, missions proposées.",sr:"NPLAB §19"},
{id:"v4q16",p:"EC",th:"Qualité",ty:"qcm",q:"La mission d'attestation particulière (NP 3100) peut exprimer une assurance :",ch:["Uniquement raisonnable","Uniquement modérée","Raisonnable ou modérée","Aucune assurance"],a:2,ex:"NP 3100 : assurance de niveau raisonnable ou modéré selon les critères applicables.",sr:"NP 3100 / Cadre de référence"},
{id:"v4q17",p:"EC",th:"Qualité",ty:"qcm",q:"La mission de procédures convenues (NP 4400) exprime :",ch:["Une assurance raisonnable","Une assurance modérée","Aucune assurance (constats uniquement)","Une assurance limitée"],a:2,ex:"NP 4400 : seuls des constats, aucune assurance. Les destinataires tirent leurs propres conclusions.",sr:"NP 4400 / Cadre de référence"},
{id:"v4q18",p:"EC",th:"Qualité",ty:"qcm",q:"La supervision des missions relève de la responsabilité :",ch:["Du conseil régional","Du responsable qualité","Du responsable de la mission","De l'équipe dirigeante"],a:2,ex:"NPMQ §30 : la supervision relève de la responsabilité du responsable de la mission.",sr:"NPMQ §30"},
{id:"v4q19",p:"EC",th:"Qualité",ty:"qcm",q:"La NPMQ impose que la structure conserve la documentation de son SMQ pendant :",ch:["3 ans","5 ans","10 ans","Une période adaptée à son organisation"],a:3,ex:"NPMQ §44 : période adaptée à l'organisation de la structure.",sr:"NPMQ §44"},
{id:"v4q20",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les 3 conditions cumulatives pour accepter ou maintenir une mission selon la NPMQ ?",a:"La structure : 1) peut se conformer aux obligations légales, réglementaires et aux normes professionnelles, 2) ne conclut pas à un manque d'intégrité du client, 3) a la compétence, le temps et les ressources nécessaires pour réaliser la mission.",sr:"NPMQ §18",kw:["conformer","obligations","normes","intégrité","client","compétence","temps","ressources"],tip:"Les 3 conditions sont cumulatives (et non alternatives). L'erreur classique est d'oublier la condition d'intégrité du client."},

// ── RESPONSABILITÉ (15 questions) ──

{id:"v4r1",p:"EC",th:"Responsabilité",ty:"qcm",q:"Combien de sanctions disciplinaires sont prévues par l'article 53 de l'ordonnance de 1945 ?",ch:["3","4","5","6"],a:2,ex:"5 sanctions : réprimande, blâme avec inscription, suspension avec sursis, suspension, radiation.",sr:"Art. 53 ord. 1945"},
{id:"v4r2",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'avertissement du président de la chambre de discipline est :",ch:["La première sanction disciplinaire","Un préalable obligatoire","Réservé aux faits ne justifiant pas d'autre sanction","Prononcé par le conseil régional"],a:2,ex:"Art. 53 : avertissement dans le cabinet du président pour faits ne justifiant pas d'autre sanction.",sr:"Art. 53 ord. 1945"},
{id:"v4r3",p:"EC",th:"Responsabilité",ty:"qcm",q:"Le sursis en matière de suspension est révoqué si une nouvelle peine intervient dans :",ch:["2 ans","3 ans","5 ans","10 ans"],a:2,ex:"Art. 53 : si dans un délai de 5 ans, nouvelle infraction → exécution de la première peine.",sr:"Art. 53 ord. 1945"},
{id:"v4r4",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les conséquences d'une radiation du Tableau pour l'EC et ses clients ?",a:"Interdiction définitive d'exercer. L'EC radié est remplacé dans ses missions, soit d'office, soit à la requête de la partie la plus diligente. Les clients peuvent retirer les missions sans indemnité, à charge pour l'EC de restituer tous les documents et sommes non correspondant à des frais exposés. Les actes visant à permettre l'exercice à un EC radié sont nuls.",sr:"Art. 53 ord. 1945",kw:["interdiction définitive","remplacé","missions","clients","retirer","sans indemnité","restituer","documents","nuls"],tip:"Détaillez les conséquences pour l'EC (interdiction, nullité des actes) ET pour les clients (droit de retrait, restitution)."},
{id:"v4r5",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'article 53 bis concerne les manquements en matière de :",ch:["Assurance professionnelle","Lutte anti-blanchiment","Secret professionnel","Formation continue"],a:1,ex:"Art. 53 bis : renvoi à l'art. L.561-36-3 CMF pour manquements anti-blanchiment.",sr:"Art. 53 bis ord. 1945"},
{id:"v4r6",p:"EC",th:"Responsabilité",ty:"qcm",q:"La publication des décisions de suspension ou radiation se fait :",ch:["Au JO uniquement","Dans tout support approprié, sans leurs motifs","Au BO du ministère avec motifs","Sur le site de l'Ordre avec motifs"],a:1,ex:"Art. 54 : publication sans leurs motifs dans tout support approprié.",sr:"Art. 54 ord. 1945"},
{id:"v4r7",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'EC suspendu du tableau doit, pendant sa suspension :",ch:["Continuer à payer les salaires de ses employés","Cesser toute activité y compris le paiement des salaires","Transférer ses dossiers au CR","Fermer définitivement son cabinet"],a:0,ex:"Art. 53 : l'EC suspendu doit continuer à payer salaires et indemnités à ses employés.",sr:"Art. 53 ord. 1945"},
{id:"v4r8",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'appel d'une décision de la chambre régionale de discipline est :",ch:["Non suspensif","Suspensif","Suspensif sauf radiation","Non suspensif sauf demande expresse"],a:1,ex:"Art. 53 : le délai d'appel et l'appel sont suspensifs.",sr:"Art. 53 ord. 1945"},
{id:"v4r9",p:"EC",th:"Responsabilité",ty:"qcm",q:"Le recours contre une décision de la chambre nationale de discipline se fait devant :",ch:["La Cour d'appel de Paris","La Cour de cassation","Le Conseil d'État","Le tribunal administratif"],a:2,ex:"Art. 53 : recours devant le Conseil d'État (non suspensif, sauf sursis à exécution).",sr:"Art. 53 ord. 1945"},
{id:"v4r10",p:"EC",th:"Responsabilité",ty:"qcm",q:"La réprimande, le blâme et la suspension peuvent être assortis d'une privation du droit de siéger aux conseils de l'Ordre pendant :",ch:["3 ans maximum","5 ans maximum","10 ans maximum","Durée indéterminée"],a:2,ex:"Art. 53 : privation du droit de faire partie des conseils pendant une durée n'excédant pas 10 ans.",sr:"Art. 53 ord. 1945"},
{id:"v4r11",p:"EC",th:"Responsabilité",ty:"qrc",q:"Qui est le complice de l'EC radié ou suspendu qui continue d'exercer via un acte ou convention ?",a:"Toute personne intervenant à des actes, traités ou conventions tendant à permettre l'exercice par un EC radié ou suspendu peut être poursuivie comme complice et est passible des mêmes peines pour exercice illégal de la profession.",sr:"Art. 53 ord. 1945",kw:["complice","actes","conventions","poursuivie","mêmes peines","exercice illégal"],tip:"L'article 53 prévoit la nullité des actes ET la complicité des tiers. C'est un piège fréquent au DEC."},
{id:"v4r12",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'article 17 de l'ordonnance de 1945 concerne :",ch:["Les honoraires","La responsabilité civile et l'assurance","Le secret professionnel","La formation continue"],a:1,ex:"Art. 17 : responsabilité civile et obligation d'assurance professionnelle.",sr:"Art. 17 ord. 1945"},
{id:"v4r13",p:"EC",th:"Responsabilité",ty:"qcm",q:"Le décret n°2025-483 du 30 mai 2025 modifie les articles 134 à 136 sur :",ch:["Les élections ordinales","L'obligation d'assurance des EC","Le contrôle qualité","La formation continue"],a:1,ex:"Décret 2025-483 : sécuriser la couverture d'assurance des personnes exerçant en société.",sr:"Décret 2025-483 du 30/05/2025"},
{id:"v4r14",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'article 12 de l'ordonnance de 1945 prévoit que les travaux de l'EC doivent être assortis de :",ch:["La signature du client","La signature personnelle de l'EC et du visa social","Le cachet du conseil régional","Un numéro d'enregistrement"],a:1,ex:"Art. 12 : signature personnelle de l'EC + visa ou signature sociale de la structure.",sr:"Art. 12 ord. 1945"},
{id:"v4r15",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelle est la différence entre « prérogative d'exercice exclusive » et « monopole » pour les missions EC de l'article 2 ?",a:"La prérogative d'exercice exclusive (réserve d'activité) n'oblige pas les entreprises à recourir à un EC : elles peuvent tenir leur comptabilité elles-mêmes. Mais si elles souhaitent confier cette mission à un tiers extérieur, elles doivent recourir à un EC inscrit. Le monopole imposerait l'obligation de recourir à un EC, ce qui n'est pas le cas.",sr:"Art. 2 ord. 1945 / Guide profession EC 2025",kw:["prérogative","réserve d'activité","pas obligation","elles-mêmes","tiers extérieur","inscrit","monopole","différence"],tip:"Le piège est de confondre les deux notions. La Commission européenne examine régulièrement cette distinction."},

// V5 NEW QUESTIONS (50) — CAC focus — Sources: Corrigés DEC 2021-2025, Code déontologie CAC, Code de commerce

// ── CAC — EXERCICE DE LA PROFESSION (14 questions) ──

{id:"v5c1",p:"CAC",th:"Exercice",ty:"qcm",q:"Qui sont les électeurs pour l'élection du conseil régional d'une CRCC ?",ch:["Tous les CAC inscrits","Les personnes physiques membres de la CRCC à jour de cotisations","Les CAC ayant plus de 5 ans d'ancienneté","Les présidents de sociétés de CAC"],a:1,ex:"Seules les personnes physiques membres de la compagnie régionale, à jour de cotisations professionnelles, sont électeurs.",sr:"C. com., art. R. 821-54, II"},
{id:"v5c2",p:"CAC",th:"Exercice",ty:"qrc",q:"Quels sont les « autres membres » qui composent le Conseil national de la CNCC aux côtés des CAC élus ?",a:"Les 60 membres du Conseil national comprennent les présidents de compagnies régionales (17 présidents de CRCC) et des commissaires aux comptes élus. Le mandat est de 4 ans.",sr:"C. com., art. R. 821-37-I",kw:["présidents","compagnies régionales","CRCC","élus","60 membres","4 ans"],tip:"Ne confondez pas avec le H2A. Les 60 membres incluent de droit les 17 présidents de CRCC."},
{id:"v5c3",p:"CAC",th:"Exercice",ty:"qcm",q:"La lettre de mission est-elle obligatoire pour la mission de certification des comptes ?",ch:["Non, elle est facultative","Oui, elle favorise le bon déroulement de la mission","Oui, uniquement pour les EIP","Non, sauf demande du client"],a:1,ex:"NEP 210 §1-2 : la lettre de mission définit les termes et conditions de la mission de certification.",sr:"NEP 210, §1 et 2"},
{id:"v5c4",p:"CAC",th:"Exercice",ty:"qrc",q:"Lorsqu'une société de CAC est absorbée par une autre, que deviennent les mandats de l'absorbée ?",a:"La société absorbante poursuit le mandat de la société absorbée jusqu'à son échéance. Toutefois, l'organe compétent de la société contrôlée peut, lors de sa première réunion postérieure à l'absorption, délibérer sur le maintien du mandat, après avoir entendu le CAC. La société contrôlée peut proposer une résolution de non-maintien ; en cas d'adoption, le CAC suppléant devient titulaire.",sr:"C. com., art. L. 823-5 / Bull. CNCC n° 134",kw:["absorbante","poursuit","mandat","échéance","organe compétent","délibérer","maintien","suppléant"],tip:"Distinguez la règle (poursuite automatique) de l'exception (résolution de non-maintien). Le suppléant prend alors le relais."},
{id:"v5c5",p:"CAC",th:"Exercice",ty:"qcm",q:"Quelles sont les quatre principales catégories d'EIP définies par l'article L. 820-1 du Code de commerce ?",ch:["Établissements de crédit, entreprises d'assurance, entités cotées, fonds de retraite","Banques, mutuelles, SA, associations","Sociétés cotées, SAS, SARL, associations","PME, ETI, grandes entreprises, micro-entreprises"],a:0,ex:"Art. L. 820-1 : établissements de crédit, entreprises d'assurance/réassurance, entités cotées sur marché réglementé, institutions de prévoyance.",sr:"C. com., art. L. 820-1"},
{id:"v5c6",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC peut-il déléguer ses travaux de contrôle à des collaborateurs ou experts ?",ch:["Non, il doit effectuer tous les contrôles personnellement","Oui, sans restriction","Oui, mais sous sa responsabilité et supervision","Oui, uniquement à d'autres CAC"],a:2,ex:"Art. L. 823-13 : le CAC peut se faire assister ou représenter par des collaborateurs ou experts, sous sa responsabilité.",sr:"C. com., art. L. 823-13"},
{id:"v5c7",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les trois informations réglementaires requises lors de la déclaration d'activité d'une mission ou prestation fournie en dehors de la certification ?",a:"La déclaration d'activité à la CRCC doit indiquer : 1) la dénomination de la personne ou entité auprès de laquelle la mission est réalisée, 2) la nature de la mission ou prestation, 3) la date de début de la mission.",sr:"C. com., art. R. 823-10",kw:["dénomination","entité","nature","mission","prestation","date","début","CRCC"],tip:"Ce sont exactement les 3 informations prévues par l'article R. 823-10 du Code de commerce, ni plus ni moins."},
{id:"v5c8",p:"CAC",th:"Exercice",ty:"qcm",q:"Quel est le barème d'heures minimal pour un mandat de certification d'une SA avec un total bilan de 1,5M€ ?",ch:["20 heures","40 heures","60 heures","120 heures"],a:0,ex:"Art. R. 823-12 et R. 823-14 : le barème prévoit des fourchettes horaires selon le total du bilan, du CA et de l'effectif.",sr:"C. com., art. R. 823-14"},
{id:"v5c9",p:"CAC",th:"Exercice",ty:"qcm",q:"Le cumul des fonctions de CAC et d'expert judiciaire est-il possible ?",ch:["Oui, sans restriction","Non, il y a incompatibilité absolue","Oui, mais pas pour le même client","Oui, les deux fonctions sont indépendantes"],a:2,ex:"Le CAC peut exercer comme expert judiciaire, mais ne peut pas intervenir en qualité d'expert auprès d'une entité dont il certifie les comptes.",sr:"C. com., art. L. 822-9"},
{id:"v5c10",p:"CAC",th:"Exercice",ty:"qrc",q:"Comment fonctionne la nomination d'un CAC par décision de justice et dans quels cas intervient-elle ?",a:"Le tribunal de commerce peut nommer un CAC à la demande d'un ou plusieurs actionnaires représentant au moins 10% du capital, ou du comité social et économique, ou du ministère public, lorsque l'entité n'a pas désigné de CAC alors qu'elle y est tenue. Le CAC nommé judiciairement a les mêmes pouvoirs et responsabilités qu'un CAC nommé par l'assemblée.",sr:"C. com., art. L. 823-6 / Mémento Comptable",kw:["tribunal","commerce","actionnaires","10%","capital","comité social","ministère public","mêmes pouvoirs"],tip:"Listez les 3 catégories de demandeurs possibles et précisez que le CAC nommé judiciairement a exactement les mêmes attributions."},
{id:"v5c11",p:"CAC",th:"Exercice",ty:"qcm",q:"Les activités commerciales sont-elles autorisées pour le CAC ?",ch:["Oui, à titre accessoire","Non, le CAC ne peut exercer aucune activité commerciale","Oui, via une filiale dédiée","Oui, uniquement le conseil en gestion"],a:1,ex:"Art. L. 822-10 : incompatibilité avec toute activité commerciale, qu'elle soit exercée directement ou indirectement.",sr:"C. com., art. L. 822-10"},
{id:"v5c12",p:"CAC",th:"Exercice",ty:"qcm",q:"La mission complémentaire du CAC sur les comptes consolidés s'appelle :",ch:["Mission d'attestation","Mission de compilation","Mission ALPE","Rapport sur les comptes consolidés"],a:3,ex:"Le CAC nommé certifie les comptes annuels et, le cas échéant, les comptes consolidés. Ce sont deux rapports distincts.",sr:"C. com., art. L. 823-9"},
{id:"v5c13",p:"CAC",th:"Exercice",ty:"qrc",q:"En quoi consiste le plan de mission du CAC et quelles sont ses composantes principales ?",a:"Le plan de mission (NEP 300) décrit l'approche générale des travaux. Il comprend notamment : l'étendue, le calendrier et l'orientation des travaux ; le seuil de signification ; les domaines significatifs et les risques identifiés ; la constitution de l'équipe d'audit ; le budget d'heures. Il sert de base au programme de travail.",sr:"NEP 300 / C. com., art. R. 823-11",kw:["plan de mission","NEP 300","étendue","calendrier","seuil de signification","risques","équipe","budget","programme de travail"],tip:"Distinguez bien le plan de mission (vision globale) du programme de travail (détail des diligences). Le plan inclut obligatoirement le seuil de signification."},
{id:"v5c14",p:"CAC",th:"Exercice",ty:"qcm",q:"La « publicité sincère » des comptes par un organisme faisant appel à la générosité publique est vérifiée par :",ch:["L'expert-comptable de l'organisme","Le commissaire aux comptes","La Cour des comptes","Le préfet"],a:1,ex:"Le CAC peut être nommé pour vérifier la publication sincère des comptes annuels par les organismes faisant appel à la générosité du public.",sr:"CNCC, Avis technique / Mémento"},

// ── CAC — DÉONTOLOGIE (16 questions) ──

{id:"v5c15",p:"CAC",th:"Déontologie",ty:"qcm",q:"Le code de déontologie du CAC est divisé en :",ch:["3 titres","2 titres (socle commun + dispositions complémentaires)","4 chapitres","Un texte unique sans subdivision"],a:1,ex:"Titre I : socle commun applicable à tous les CAC. Titre II : dispositions complémentaires pour la certification.",sr:"Code de déontologie CAC"},
{id:"v5c16",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quels sont les sept indices d'appartenance à un réseau selon l'article 29 du code de déontologie CAC ?",a:"1) Direction ou coordination communes, 2) mécanisme de partage des revenus/résultats ou transferts de rémunération/coûts, 3) commissions en rétribution d'apports d'affaires, 4) dénomination ou signe distinctif communs, 5) clientèle habituelle commune, 6) documents au public présentant le réseau et mentionnant des compétences pluridisciplinaires, 7) élaboration ou développement d'outils techniques communs.",sr:"Code de déontologie CAC, art. 29",kw:["direction","coordination","partage","revenus","commissions","dénomination","clientèle","commune","outils techniques","communs"],tip:"L'article 29 liste 7 indices. L'erreur classique est d'en oublier 2 ou 3. Structurez votre réponse en liste numérotée."},
{id:"v5c17",p:"CAC",th:"Déontologie",ty:"qcm",q:"Les honoraires du CAC sont fixés en fonction de (art. 12 code déontologie) :",ch:["Un tarif fixe par entité","L'importance des diligences à mettre en œuvre","Le chiffre d'affaires de l'entité uniquement","Le résultat net de l'entité"],a:1,ex:"Art. 12 : rémunération en rapport avec l'importance des diligences. 4 critères : nature mission, taille entité, nature activités, complexité.",sr:"Code de déontologie CAC, art. 12"},
{id:"v5c18",p:"CAC",th:"Déontologie",ty:"qrc",q:"Que doit faire le CAC lorsqu'il se trouve dans l'impossibilité de prendre des mesures de sauvegarde suffisantes pour garantir son indépendance (art. 5-III) ?",a:"Il met fin à la mission ou à la prestation. L'article 5-III du code de déontologie impose au CAC de prendre immédiatement des mesures de sauvegarde (éliminer la cause ou en réduire les effets). Si ces mesures sont insuffisantes, il doit mettre fin à la mission.",sr:"Code de déontologie CAC, art. 5, III",kw:["met fin","mission","prestation","mesures de sauvegarde","insuffisantes","indépendance","article 5"],tip:"La réponse est courte mais précise : quand les mesures de sauvegarde sont insuffisantes → fin de mission. Citez l'article 5-III."},
{id:"v5c19",p:"CAC",th:"Déontologie",ty:"qcm",q:"Le CAC peut-il accepter une mission auprès d'une entité non-EIP s'il existe un risque d'autorévision ?",ch:["Oui, si des mesures de sauvegarde sont prises","Non, c'est une interdiction absolue","Oui, sans restriction pour les non-EIP","Non, sauf accord du H2A"],a:1,ex:"Art. L. 822-11 et code déontologie art. 5 : l'interdiction d'accepter ou poursuivre une mission en cas de risque d'autorévision ou d'indépendance compromise s'applique aussi aux non-EIP.",sr:"C. com., art. L. 822-11 / Code déonto. art. 5"},
{id:"v5c20",p:"CAC",th:"Déontologie",ty:"qcm",q:"Le CAC qui certifie les comptes d'une EIP peut-il fournir des services de conception et mise en place de systèmes informatiques financiers ?",ch:["Oui, si c'est accessoire","Non, c'est un service interdit","Oui, avec l'accord du comité d'audit","Non, sauf si externalisé au réseau"],a:1,ex:"Services interdits au CAC d'une EIP : conception/mise en place de procédures de contrôle interne ou de gestion des risques, et systèmes d'information financière.",sr:"Règlement UE 537/2014, art. 5"},
{id:"v5c21",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quels sont au moins quatre services interdits au CAC qui certifie les comptes d'une EIP ?",a:"Parmi les services interdits (liste non exhaustive) : 1) services fiscaux (préparation des déclarations, conseil fiscal, assistance contrôle fiscal), 2) services impliquant un rôle dans la gestion ou la prise de décision, 3) tenue de comptabilité et préparation des états financiers, 4) services de paie, 5) conception de systèmes informatiques financiers, 6) services d'évaluation, 7) services juridiques, 8) services d'audit interne.",sr:"Règlement UE 537/2014, art. 5 / Code déonto. art. 19 bis",kw:["services fiscaux","comptabilité","états financiers","paie","systèmes informatiques","évaluation","services juridiques","audit interne","gestion","décision"],tip:"Le règlement européen liste précisément les services interdits. Citez-en au moins 4 avec précision."},
{id:"v5c22",p:"CAC",th:"Déontologie",ty:"qcm",q:"La démission du CAC est encadrée par l'article 28 du code de déontologie. Le CAC doit :",ch:["Démissionner sans formalité","Exposer ses motifs au président de la CRCC","Exposer ses motifs à l'organe appelé à statuer et en informer le H2A","Informer uniquement son client par courrier"],a:2,ex:"Art. 28 : le CAC expose ses motifs à l'organe compétent de l'entité et en informe le H2A.",sr:"Code de déontologie CAC, art. 28"},
{id:"v5c23",p:"CAC",th:"Déontologie",ty:"qrc",q:"Que doivent faire deux co-commissaires aux comptes qui ne parviennent pas à s'entendre sur leurs contributions respectives dans une mission de contrôle légal ?",a:"Ils saisissent le président de leur compagnie régionale ou, s'ils appartiennent à des compagnies régionales distinctes, le président de leur compagnie respective, pour engager une procédure de conciliation.",sr:"Code de déontologie CAC, art. 24",kw:["saisir","président","compagnie régionale","CRCC","conciliation","contributions","compagnies distinctes"],tip:"L'article 24 du code de déontologie prévoit la conciliation obligatoire. Le piège est de dire qu'ils saisissent le H2A directement."},
{id:"v5c24",p:"CAC",th:"Déontologie",ty:"qcm",q:"La publicité personnelle du CAC est autorisée par :",ch:["Tout moyen sans restriction","Envoi postal ou courrier électronique uniquement","Communication institutionnelle uniquement","Aucun moyen (interdite)"],a:1,ex:"Art. 15-16 code déontologie : communication institutionnelle libre, sollicitation personnalisée uniquement par voie postale ou email.",sr:"Code de déontologie CAC, art. 15-16"},
{id:"v5c25",p:"CAC",th:"Déontologie",ty:"qcm",q:"L'article 31 du code de déontologie impose une rotation du CAC signataire d'une EIP au bout de :",ch:["3 exercices","6 exercices","7 exercices","10 exercices"],a:2,ex:"Art. 31 : le signataire personne physique ne peut signer le rapport de certification plus de 7 exercices consécutifs pour une EIP.",sr:"Code de déontologie CAC, art. 31"},
{id:"v5c26",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quelle est la différence entre « mission » et « prestation » dans le code de déontologie du CAC ?",a:"La « mission » désigne les travaux effectués en application d'un texte légal ou réglementaire (certification légale, ALPE, etc.). La « prestation » désigne les travaux réalisés en dehors de toute obligation légale, sur une base contractuelle. Cette distinction est importante car les règles d'indépendance et les services interdits diffèrent selon qu'il s'agit d'une mission ou d'une prestation.",sr:"Code de déontologie CAC, Titre préliminaire",kw:["mission","légal","réglementaire","certification","prestation","contractuelle","hors obligation","distinction","indépendance"],tip:"C'est une question classique. Donnez la définition de chaque terme et expliquez pourquoi la distinction est importante (régime d'indépendance différent)."},
{id:"v5c27",p:"CAC",th:"Déontologie",ty:"qcm",q:"Le CAC qui découvre un fait délictueux dans l'exercice de sa mission doit :",ch:["Le signaler au président du tribunal de commerce","Le révéler au procureur de la République","En informer le H2A","Le mentionner dans son rapport général"],a:1,ex:"Art. L. 823-12 : révélation des faits délictueux au procureur de la République, sans que cette révélation puisse engager sa responsabilité.",sr:"C. com., art. L. 823-12"},
{id:"v5c28",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quelles sont les cinq « dispositions complémentaires » du Titre II du code de déontologie applicables au CAC certifiant les comptes ?",a:"Les 5 dispositions complémentaires sont : 1) les liens personnels, financiers et professionnels (art. 22), 2) les liens entre les membres de l'équipe de contrôle et l'entité (art. 23), 3) les honoraires (art. 25), 4) la co-certification (art. 24), 5) la durée du mandat et la rotation (art. 26). Ces dispositions renforcent le socle commun du Titre I.",sr:"Code de déontologie CAC, Titre II",kw:["liens personnels","financiers","professionnels","équipe de contrôle","honoraires","co-certification","durée","rotation","mandat"],tip:"Les 5 dispositions sont numérotées dans le Titre II. Citez les articles correspondants pour montrer votre maîtrise du texte."},
{id:"v5c29",p:"CAC",th:"Déontologie",ty:"qcm",q:"Le socle commun du Titre I du code de déontologie s'applique à :",ch:["Uniquement aux CAC certifiant les comptes","Uniquement aux CAC intervenant dans les EIP","Tous les CAC quelle que soit la nature de leur mission ou prestation","Uniquement aux CAC personnes physiques"],a:2,ex:"Le Titre I constitue un socle commun applicable à tous les CAC, quelle que soit la nature de leur mission ou prestation.",sr:"Code de déontologie CAC, Titre I"},
{id:"v5c30",p:"CAC",th:"Déontologie",ty:"qcm",q:"L'article 8 du code de déontologie impose que dans un co-commissariat, les CAC :",ch:["Partagent les honoraires à parts égales","Établissent un programme de travail commun et coordonné","Signent un rapport distinct chacun","Désignent un lead auditor"],a:1,ex:"Art. 8 : les co-commissaires établissent un programme de travail commun et coordonné, échangent et partagent les éléments collectés.",sr:"Code de déontologie CAC, art. 8 / NEP 100"},

// ── CAC — QUALITÉ / NORMES (10 questions) ──

{id:"v5c31",p:"CAC",th:"Qualité",ty:"qcm",q:"Le paragraphe 8 de la NEP 200 définit les limites inhérentes à l'audit. Laquelle n'en fait PAS partie ?",ch:["Recours au jugement","Utilisation de sondages","Insuffisance du contrôle interne","Limites inhérentes au contrôle interne"],a:2,ex:"NEP 200 §8 : limites = recours au jugement, sondages, limites inhérentes au contrôle interne, plupart des éléments probants concordants plutôt que concluants.",sr:"NEP 200, §8"},
{id:"v5c32",p:"CAC",th:"Qualité",ty:"qrc",q:"Qu'est-ce que le seuil de signification et comment le CAC l'utilise-t-il dans sa mission ?",a:"Le seuil de signification est le montant au-delà duquel une anomalie est susceptible d'influencer le jugement de l'utilisateur des comptes. Le CAC le détermine lors de la planification (plan de mission) et l'utilise pour orienter ses travaux, évaluer les anomalies détectées et déterminer si les comptes sont réguliers et sincères dans leur ensemble.",sr:"NEP 320 / NEP 200",kw:["seuil de signification","montant","anomalie","influencer","jugement","utilisateur","planification","orienter","travaux","réguliers","sincères"],tip:"Donnez la définition (aspect qualitatif), puis expliquez les 3 usages : planification, évaluation des anomalies, opinion."},
{id:"v5c33",p:"CAC",th:"Qualité",ty:"qcm",q:"Le rapport du CAC sur les comptes annuels mentionne obligatoirement :",ch:["Le détail des honoraires perçus","L'opinion, les justifications des appréciations et les vérifications spécifiques","Le nom de tous les collaborateurs ayant participé","Le détail des anomalies corrigées"],a:1,ex:"Art. L. 823-9 : opinion sur la régularité, sincérité et image fidèle + justifications des appréciations + vérifications spécifiques.",sr:"C. com., art. L. 823-9"},
{id:"v5c34",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les conséquences possibles d'un refus de certifier les comptes par le CAC ?",a:"Le refus de certifier a pour conséquence que les comptes ne peuvent pas être approuvés par l'assemblée générale en l'état. L'entité peut être amenée à modifier ses comptes et les représenter. Les délibérations approuvant les comptes sur la base de comptes non certifiés peuvent être frappées de nullité. Le CAC doit exposer les motifs de son refus dans son rapport.",sr:"Note d'information CNCC / C. com., art. L. 823-9",kw:["refus","certifier","approbation","assemblée générale","modifier","comptes","nullité","délibérations","motifs","rapport"],tip:"Distinguez les conséquences juridiques (nullité des délibérations) des conséquences pratiques (obligation de corriger et re-présenter les comptes)."},
{id:"v5c35",p:"CAC",th:"Qualité",ty:"qcm",q:"La procédure d'alerte du CAC est déclenchée lorsqu'il relève des faits :",ch:["Constitutifs de fraude","De nature à compromettre la continuité de l'exploitation","D'irrégularité comptable","Contraires au code de déontologie"],a:1,ex:"Art. L. 234-1 et s. C. com. : la procédure d'alerte vise les faits de nature à compromettre la continuité de l'exploitation.",sr:"C. com., art. L. 234-1"},
{id:"v5c36",p:"CAC",th:"Qualité",ty:"qrc",q:"Décrivez les étapes de la procédure d'alerte du CAC dans une SA.",a:"Phase 1 : le CAC informe le président du conseil d'administration (ou du directoire) et lui demande des explications. Phase 2 : en l'absence de réponse sous 15 jours ou si la continuité reste compromise, le CAC invite le CA à délibérer et informe le président du tribunal. Phase 3 : si le CA ne se réunit pas ou si les décisions ne garantissent pas la continuité, le CAC informe le président du tribunal et établit un rapport spécial pour l'assemblée générale. Phase 4 : si la continuité reste compromise après l'AG, le CAC informe le président du tribunal de commerce.",sr:"C. com., art. L. 234-1 à L. 234-4",kw:["président","conseil d'administration","15 jours","délibérer","tribunal","rapport spécial","assemblée générale","continuité","exploitation"],tip:"4 phases progressives. L'erreur classique est de confondre les délais et les interlocuteurs à chaque étape. Le président du tribunal est informé dès la phase 2."},
{id:"v5c37",p:"CAC",th:"Qualité",ty:"qcm",q:"L'avis technique de la CNCC sur la vérification de la « publication sincère » concerne :",ch:["Les sociétés cotées","Les associations faisant appel à la générosité du public","Les administrations publiques","Les fondations reconnues d'utilité publique uniquement"],a:1,ex:"La vérification de la publication sincère des comptes annuels par les organismes faisant appel à la générosité du public relève d'un avis technique CNCC.",sr:"CNCC, Avis technique avril 2022"},
{id:"v5c38",p:"CAC",th:"Qualité",ty:"qcm",q:"Le CAC ALPE (audit légal des petites entreprises) est soumis à un mandat de :",ch:["3 exercices","6 exercices","4 exercices","Durée libre"],a:0,ex:"NEP 911 : le mandat ALPE est de 3 exercices (au lieu de 6 pour le mandat classique).",sr:"NEP 911 / Art. L. 821-44"},
{id:"v5c39",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelle différence y a-t-il entre la NEP 100 relative à l'audit réalisé par plusieurs CAC et le co-commissariat prévu par la loi ?",a:"Le co-commissariat est imposé par la loi pour certaines entités (EIP notamment, art. L. 821-39). La NEP 100 encadre la répartition des travaux entre co-commissaires : travaux communs (au moins 50% des diligences d'audit), travaux répartis, revue réciproque, et rapport conjoint. Chaque co-commissaire reste responsable de l'ensemble des travaux.",sr:"NEP 100 §21 / C. com., art. L. 821-39",kw:["co-commissariat","loi","EIP","NEP 100","répartition","travaux communs","50%","revue réciproque","rapport conjoint","responsable"],tip:"Distinguez la base légale (obligation de co-commissariat) de la base normative (NEP 100 pour la mise en œuvre). Les travaux communs représentent au moins 50%."},
{id:"v5c40",p:"CAC",th:"Qualité",ty:"qcm",q:"La mission de vérification des informations RSE (art. L. 225-102-1) par le CAC est qualifiée de :",ch:["Mission légale principale","Mission ALPE","Attestation de présence et de sincérité","Organisme tiers indépendant (OTI)"],a:3,ex:"La vérification RSE est confiée à un organisme tiers indépendant (OTI), qui peut être un CAC accrédité par le COFRAC.",sr:"Art. L. 225-102-1 / Décret 2012-557"},

// ── CAC — RESPONSABILITÉ (10 questions) ──

{id:"v5c41",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Le délit d'entrave aux fonctions du CAC est puni de :",ch:["Un an d'emprisonnement et 15 000 € d'amende","Cinq ans d'emprisonnement et 75 000 € d'amende","Six mois d'emprisonnement et 7 500 € d'amende","Trois ans d'emprisonnement et 45 000 € d'amende"],a:1,ex:"Art. L. 820-4, 2° : 5 ans d'emprisonnement et 75 000 € d'amende pour quiconque fait obstacle aux fonctions du CAC.",sr:"C. com., art. L. 820-4"},
{id:"v5c42",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les huit sanctions disciplinaires applicables au CAC selon l'article L. 821-71 du Code de commerce ?",a:"Les 8 sanctions sont : 1) avertissement, 2) blâme, 3) interdiction temporaire d'exercer certaines missions ou prestations, 4) retrait de la mission de contrôle légal pour une entité déterminée, 5) interdiction temporaire d'exercer (max 5 ans), 6) radiation de la liste, 7) interdiction définitive d'inscription, 8) sanction pécuniaire (250 000 € max personne physique, 1 M€ max personne morale).",sr:"C. com., art. L. 821-71",kw:["avertissement","blâme","interdiction temporaire","retrait","mission","radiation","interdiction définitive","sanction pécuniaire","250 000","1 M€"],tip:"Listez les 8 sanctions dans l'ordre de gravité croissante. N'oubliez pas la sanction pécuniaire avec ses plafonds distincts PP/PM."},
{id:"v5c43",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La responsabilité pénale du CAC pour confirmation d'informations mensongères est prévue par :",ch:["Art. L. 820-4, 1°","Art. L. 821-71","Art. L. 823-12","Art. L. 234-1"],a:0,ex:"Art. L. 820-4, 1° : délit de confirmation d'informations mensongères sur la situation de la personne ou de l'entité.",sr:"C. com., art. L. 820-4, 1°"},
{id:"v5c44",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quels sont les trois procédures disciplinaires possibles à l'encontre d'un CAC et comment se déroulent-elles ?",a:"1) La procédure de droit commun : instruction par le rapporteur, audience devant la Commission des sanctions du H2A, décision motivée. 2) La procédure simplifiée : pour les faits simples et de faible gravité, instruction rapide et décision sans audience. 3) La composition administrative : accord entre le rapporteur et le CAC sur une sanction, homologué par la Commission des sanctions.",sr:"C. com., art. L. 821-70 et s. / Fiche CNCC n°4",kw:["droit commun","rapporteur","Commission des sanctions","H2A","procédure simplifiée","composition administrative","accord","homologué"],tip:"Les 3 procédures sont distinctes. La composition administrative est la plus récente (accord amiable homologué). Ne confondez pas avec la procédure disciplinaire de l'Ordre des EC."},
{id:"v5c45",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Qui peut saisir le rapporteur général du H2A pour déclencher une procédure disciplinaire CAC ?",ch:["Uniquement le procureur de la République","Le garde des Sceaux, le H2A lui-même, le procureur, le président de la CRCC ou le président de la CNCC","N'importe quel tiers","Le client du CAC uniquement"],a:1,ex:"Art. L. 821-70 : le rapporteur général peut être saisi par le garde des Sceaux, le H2A, le procureur, les présidents de CRCC et de CNCC.",sr:"C. com., art. L. 821-70"},
{id:"v5c46",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Le recours contre une décision de la Commission des sanctions du H2A se fait devant :",ch:["La Cour de cassation","Le Conseil d'État","La Cour d'appel de Paris","Le tribunal administratif"],a:1,ex:"Le H2A est une autorité administrative : ses décisions relèvent du Conseil d'État (recours en excès de pouvoir).",sr:"Art. L. 821-75 C. com."},
{id:"v5c47",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelle est la responsabilité civile du CAC et comment est-elle limitée ?",a:"Le CAC est responsable civilement des fautes et négligences commises dans l'exercice de ses fonctions (art. L. 823-13). Sa responsabilité est engagée tant à l'égard de la personne ou entité contrôlée que des tiers. Toutefois, sa responsabilité ne peut être engagée pour les informations ou divulgations de faits auxquelles il procède en application de la loi (révélation au procureur, déclaration de soupçon TRACFIN). L'assurance professionnelle est obligatoire.",sr:"C. com., art. L. 823-13 / Art. L. 823-12",kw:["responsabilité civile","fautes","négligences","entité contrôlée","tiers","révélation","procureur","TRACFIN","assurance","obligatoire"],tip:"Distinguez la responsabilité de droit commun (fautes/négligences) des immunités légales (révélation, TRACFIN). N'oubliez pas l'obligation d'assurance."},
{id:"v5c48",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La non-révélation de faits délictueux par le CAC est sanctionnée par :",ch:["Une sanction disciplinaire uniquement","5 ans d'emprisonnement et 75 000 € d'amende","2 ans d'emprisonnement et 30 000 € d'amende","Une amende civile"],a:1,ex:"Art. L. 820-4 : la non-révélation est assimilée au délit prévu par le même article (5 ans et 75 000 €).",sr:"C. com., art. L. 820-4"},
{id:"v5c49",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Les cinq étapes d'une procédure disciplinaire CAC menée jusqu'au recours sont :",ch:["Plainte → instruction → audience → décision → appel","Saisine rapporteur → instruction → audience Commission sanctions → décision → recours Conseil d'État","Signalement → conciliation → arbitrage → décision → pourvoi","Plainte CRCC → chambre régionale → chambre nationale → Cour d'appel → cassation"],a:1,ex:"Procédure H2A : saisine du rapporteur général → instruction → audience devant la Commission des sanctions → décision motivée → recours devant le Conseil d'État.",sr:"C. com., art. L. 821-70 et s."},
{id:"v5c50",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelle est la différence entre la responsabilité disciplinaire du CAC (H2A) et celle de l'EC (chambres de discipline de l'Ordre) ?",a:"Pour le CAC : la discipline relève du H2A (Commission des sanctions), autorité administrative indépendante. Le rapporteur général instruit, la Commission sanctionne, le recours va au Conseil d'État. Pour l'EC : la discipline relève des chambres de discipline des conseils régionaux (1ère instance) et de la chambre nationale (appel), avec recours devant le Conseil d'État. Les sanctions diffèrent : le CAC encourt 8 sanctions dont la sanction pécuniaire (250 000 € PP), l'EC 5 sanctions sans sanction pécuniaire.",sr:"C. com., art. L. 821-70 et s. / Ord. 1945, art. 53",kw:["H2A","Commission des sanctions","rapporteur","Conseil d'État","chambres de discipline","conseil régional","chambre nationale","8 sanctions","5 sanctions","sanction pécuniaire","250 000"],tip:"Tableau comparatif idéal : organe compétent, voies de recours, nombre et nature des sanctions. Le piège est de confondre les deux systèmes."},
