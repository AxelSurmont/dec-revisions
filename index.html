// ── H2A FAQ — Rotation des cabinets (EIP) ──

{id:"v7g1",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelle est la durée maximale de la mission de certification des comptes d'un CAC unique dans une EIP ? Comment peut-elle être prolongée ?",a:"La durée maximale est de 10 ans (art. L. 821-45-I C. com.). Elle peut être prolongée : 1) À 16 ans si, au terme des 10 ans, l'EIP procède à un appel d'offres et décide de renouveler le mandat pour 6 exercices supplémentaires (conditions des §2 à 5 de l'art. 16 du règlement UE 537/2014). 2) À 24 ans si, au terme des 10 ans, l'EIP recourt à plusieurs CAC (co-commissariat) qui présentent un rapport conjoint (art. 17 §4b du règlement UE). 3) Au-delà de 24 ans, la H2A peut, à titre exceptionnel et sur demande, accorder une prolongation de 2 ans maximum (art. L. 821-45-III).",sr:"C. com., art. L. 821-45 / H2A FAQ §2 / Règl. UE 537/2014, art. 17",kw:["10 ans","16 ans","appel d'offres","renouveler","24 ans","co-commissariat","rapport conjoint","H2A","exceptionnelle","2 ans"],tip:"Question clé EIP. 3 paliers : 10→16 (AO), 10→24 (co-CAC), +2 ans H2A. Les chiffres sont à retenir par cœur."},
{id:"v7g2",p:"CAC",th:"Exercice",ty:"qrc",q:"Le délai de viduité du CAC d'une EIP est-il applicable aux membres de son réseau ? Quelle est sa durée ?",a:"Oui. Art. L. 821-45-IV C. com. : le CAC — ou un membre de son réseau au sein de l'UE — ne peut accepter de mandat auprès de l'EIP dont il a certifié les comptes avant l'expiration d'une période de 4 ans suivant la fin de son mandat. Ce délai de viduité vise à prévenir le risque de familiarité et s'applique au cabinet comme aux membres de son réseau.",sr:"C. com., art. L. 821-45-IV / H2A FAQ §2.5",kw:["viduité","4 ans","réseau","UE","mandat","EIP","familiarité","cabinet"],tip:"Le délai de viduité de 4 ans est propre aux EIP. Il s'applique au cabinet ET à son réseau."},

// ── H2A FAQ — SACC (Services Autres que la Certification des Comptes) ──

{id:"v7g3",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quel est le dispositif de plafonnement des honoraires de SACC (services autres que la certification) pour les EIP ? Comment se calcule-t-il ?",a:"Art. L. 821-66-II C. com. : le total des honoraires de SACC facturés par le CAC à l'EIP (ou à ses mère/filles) est plafonné à 70% de la moyenne des honoraires de certification facturés au cours des 3 derniers exercices à cette EIP et, le cas échéant, à ses mère/filles. Conditions d'application : l'entité doit être EIP depuis au moins 3 exercices et le CAC doit détenir le mandat depuis au moins 3 exercices. La H2A peut autoriser un dépassement exceptionnel pour 2 exercices max.",sr:"C. com., art. L. 821-66-II / H2A FAQ §4.6-4.7",kw:["70%","moyenne","3 exercices","honoraires","certification","SACC","EIP","mère","filles","plafonnement","H2A","dépassement"],tip:"La règle des 70% est un piège fréquent au DEC. Attention au dénominateur (inclut mère et filles) et au numérateur (SACC facturés)."},
{id:"v7g4",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quel est le dispositif de plafonnement des honoraires reçus d'une EIP par rapport au total des honoraires du CAC (règle des 15%) ?",a:"Art. 4 §3 du règlement UE 537/2014 : lorsque le total des honoraires reçus d'une EIP (certification + SACC) dépasse 15% du total des honoraires du cabinet pendant chacun des 3 derniers exercices consécutifs, le CAC en informe le comité d'audit. Le comité décide, sur la base de critères objectifs, si le CAC peut continuer à certifier les comptes pendant une période supplémentaire de 2 exercices maximum. Le numérateur comprend tous les honoraires reçus de l'EIP ; le dénominateur comprend le CA total du cabinet.",sr:"Règl. UE 537/2014, art. 4 §3 / H2A FAQ §5.1-5.2",kw:["15%","total","honoraires","cabinet","3 exercices","comité d'audit","critères objectifs","2 exercices","supplémentaire"],tip:"La règle des 15% est complémentaire de celle des 70%. Les deux doivent être maîtrisées."},

// ── H2A FAQ — Appel d'offres EIP ──

{id:"v7g5",p:"CAC",th:"Exercice",ty:"qcm",q:"La procédure d'AO pour la désignation du CAC d'une EIP est-elle une procédure de marché public ?",ch:["Oui, elle relève du droit des marchés publics","Non, c'est une procédure privée que l'EIP est libre de déterminer","Oui, publiée au JOUE","Non, elle est organisée par la H2A"],a:1,ex:"Art. 16 §3 règlement UE 537/2014 : l'EIP est libre de déterminer la procédure de sélection. Ce n'est pas un marché public. Les candidats répondent sur invitation.",sr:"Règl. UE 537/2014, art. 16 §3 / H2A FAQ §1.1"},
{id:"v7g6",p:"CAC",th:"Exercice",ty:"qcm",q:"L'EIP doit-elle organiser un AO pour la désignation du CAC suppléant ?",ch:["Non, le suppléant est exempt d'AO","Oui, l'AO porte sur le titulaire ET le suppléant","Oui, mais uniquement si l'EIP a plus de 500 salariés","Non, le suppléant est nommé par la H2A"],a:1,ex:"H2A FAQ §1.8 : l'AO porte sur la désignation des CAC titulaire ET suppléant, sans distinction. Le suppléant est soumis aux mêmes conditions de désignation.",sr:"H2A FAQ §1.8 / C. com., art. L. 821-40"},

// ── H2A FAQ — Rotation des signataires ──

{id:"v7g7",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelle est la durée maximale pendant laquelle un associé d'audit principal peut signer les rapports sur les comptes d'une EIP ? Quel est le délai de viduité applicable ?",a:"Art. L. 821-45-VI C. com. : le signataire (associé d'audit principal) ne peut exercer sa mission auprès de la même EIP pendant plus de 6 exercices. Il ne peut participer à nouveau à la certification des comptes de cette EIP avant l'expiration d'un délai de 3 ans suivant la fin de sa mission. Ce délai de viduité de 3 ans pour le signataire est distinct du délai de 4 ans applicable au cabinet.",sr:"C. com., art. L. 821-45-VI / H2A FAQ §3",kw:["signataire","associé d'audit","6 exercices","3 ans","viduité","EIP","participer","certification"],tip:"Ne confondez pas : viduité du cabinet = 4 ans ; viduité du signataire = 3 ans."},

// ── NEP 330 — Procédures d'audit ──

{id:"v7g8",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les deux grandes catégories de procédures d'audit que le CAC met en œuvre en réponse à son évaluation des risques (NEP 330) ?",a:"Les deux catégories sont : 1) Les tests de procédures : ils visent à évaluer l'efficacité des contrôles internes de l'entité. Le CAC les utilise lorsqu'il s'appuie sur le contrôle interne dans son évaluation du risque. 2) Les contrôles de substance : ils visent à détecter les anomalies significatives au niveau des assertions. Ils comprennent les tests de détail et les procédures analytiques. La NEP 330 §21 impose des contrôles de substance pour chaque catégorie significative, indépendamment de l'évaluation des risques.",sr:"NEP 330 §05, §10, §21",kw:["tests de procédures","contrôle interne","efficacité","contrôles de substance","tests de détail","procédures analytiques","assertions","significatif","obligatoire"],tip:"L'obligation de contrôles de substance pour tous les comptes significatifs est un point important (NEP 330 §21)."},

// ── NEP 250 — Non-respect des textes ──

{id:"v7g9",p:"CAC",th:"Qualité",ty:"qrc",q:"Comment le CAC prend-il en compte le risque d'anomalies significatives résultant du non-respect de textes légaux et réglementaires (NEP 250) ?",a:"Le CAC doit : 1) Distinguer les textes relatifs à l'établissement des comptes (vérification directe de leur application) et les textes non relatifs aux comptes mais pouvant avoir des conséquences financières (amendes, litiges). 2) S'enquérir auprès de la direction des textes applicables, des procédures de conformité et des litiges en cours. 3) Prendre connaissance de la correspondance des autorités administratives. 4) En cas de non-respect identifié, évaluer l'incidence sur les comptes et sur son rapport, et communiquer avec les organes mentionnés à l'art. L. 821-63.",sr:"NEP 250 §04-13",kw:["textes légaux","réglementaires","établissement des comptes","conséquences financières","direction","correspondance","autorités","non-respect","incidence","opinion"],tip:"La NEP 250 distingue bien deux catégories de textes avec des diligences différentes."},

// ── NEP 530 — Sélection des éléments ──

{id:"v7g10",p:"CAC",th:"Qualité",ty:"qcm",q:"Les trois méthodes de sélection des éléments à contrôler prévues par la NEP 530 sont :",ch:["Sondage, observation, entretien","Sélection de tous les éléments, sélection d'éléments spécifiques, sondages","Contrôle exhaustif, contrôle partiel, contrôle par exception","Tests de détail, procédures analytiques, demandes de confirmation"],a:1,ex:"NEP 530 §04 : les 3 méthodes sont la sélection de tous les éléments, la sélection d'éléments spécifiques et les sondages (statistiques ou non).",sr:"NEP 530, §04-07"},

// ── NEP 450 — Évaluation des anomalies ──

{id:"v7g11",p:"CAC",th:"Qualité",ty:"qrc",q:"Comment le CAC évalue-t-il les anomalies relevées au cours de l'audit (NEP 450) ? Que doit-il faire des anomalies non corrigées ?",a:"Le CAC doit : 1) Récapituler toutes les anomalies relevées au cours de l'audit, autres que celles manifestement insignifiantes. 2) Communiquer à la direction les anomalies relevées et demander leur correction. 3) Si la direction refuse la correction, comprendre les raisons et les prendre en compte dans l'évaluation du caractère significatif. 4) Évaluer si les anomalies non corrigées, prises individuellement ou en cumulé, sont significatives. 5) Si elles le sont, modifier son opinion (réserve ou refus). 6) Obtenir une déclaration écrite de la direction confirmant qu'elle estime les anomalies non corrigées non significatives.",sr:"NEP 450 §04-12",kw:["récapituler","insignifiantes","communiquer","direction","correction","refus","cumulé","significatives","opinion","réserve","déclaration écrite"],tip:"Le processus en 6 étapes est structurant. La déclaration écrite de la direction est un point clé souvent oublié."},

// ── NEP 600 — Comptes consolidés ──

{id:"v7g12",p:"CAC",th:"Qualité",ty:"qrc",q:"Quels sont les principes spécifiques applicables à l'audit des comptes consolidés (NEP 600) en ce qui concerne les travaux des CAC des composants ?",a:"Le CAC du groupe doit : 1) Déterminer les composants significatifs et les risques d'anomalies significatives au niveau du groupe. 2) Pour les composants significatifs, déterminer la nature et l'étendue des travaux à réaliser. 3) Communiquer aux CAC des composants les instructions d'audit (seuil de signification, risques identifiés, calendrier). 4) Évaluer la compétence et l'indépendance des CAC des composants. 5) Prendre connaissance de leurs travaux et évaluer s'ils sont suffisants et appropriés. 6) Communiquer avec eux sur les anomalies identifiées et les faiblesses de contrôle interne.",sr:"NEP 600 §08-28",kw:["groupe","composants","significatifs","instructions","seuil","risques","compétence","indépendance","suffisants","appropriés","anomalies","faiblesses"],tip:"La NEP 600 organise la relation entre le CAC groupe et les CAC des composants. Le mot-clé est « instructions d'audit »."},

// ── NEP 240 — Fraudes ──

{id:"v7g13",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les principales obligations du CAC en matière de prise en considération de la possibilité de fraudes (NEP 240) ?",a:"Le CAC doit : 1) Maintenir un esprit critique et une vigilance tout au long de l'audit. 2) S'entretenir avec la direction sur le risque de fraude et les mesures mises en place. 3) Identifier et évaluer les risques d'anomalies significatives résultant de fraudes. 4) Le risque d'anomalie significative résultant de fraudes portant sur la comptabilisation des produits est présumé (sauf démonstration contraire). 5) Concevoir des procédures d'audit imprévisibles. 6) En cas d'identification d'une fraude, en évaluer l'incidence sur l'audit, communiquer avec la direction et les organes mentionnés à l'art. L. 821-63.",sr:"NEP 240 §05-31",kw:["esprit critique","entretien","direction","risque de fraude","produits","présumé","imprévisibles","incidence","communication","organes"],tip:"La présomption de risque de fraude sur les produits est un point essentiel de la NEP 240."},

// ── NI 11 — Comptes consolidés ──

{id:"v7g14",p:"CAC",th:"Qualité",ty:"qcm",q:"Lors de l'audit des comptes consolidés, le CAC du groupe doit-il obligatoirement auditer tous les composants ?",ch:["Oui, chaque composant doit faire l'objet d'un audit complet","Non, le CAC du groupe détermine les composants significatifs et adapte ses travaux","Oui, mais uniquement les filiales à plus de 50% du capital","Non, il se fie uniquement aux travaux des CAC locaux"],a:1,ex:"NEP 600 §11 : le CAC du groupe identifie les composants significatifs et détermine les travaux appropriés (audit, procédures analytiques, ou examen limité) en fonction des risques.",sr:"NEP 600, §11 / NI XI"},

// ── NI 5 — Opérations sur le capital ──

{id:"v7g15",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les diligences du CAC en cas de réduction de capital non motivée par des pertes ?",a:"Le CAC doit : 1) Vérifier les causes et conditions de la réduction projetée (rapport du CA/directoire). 2) Établir un rapport sur l'opération projetée présentant son appréciation sur les causes et conditions de la réduction. 3) Le rapport doit être mis à la disposition des actionnaires avant l'AG. 4) S'assurer que l'opération ne porte pas atteinte à l'égalité des actionnaires. 5) Vérifier la conformité de la procédure aux textes applicables (art. L. 225-204 C. com.).",sr:"C. com., art. L. 225-204 / NI V Tome 1",kw:["réduction de capital","pertes","rapport","causes","conditions","actionnaires","AG","égalité","procédure"],tip:"La réduction de capital non motivée par des pertes nécessite un rapport spécifique du CAC distinct du rapport général."},

// ── H2A FAQ — Rapport de transparence ──

{id:"v7g16",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quel est le contenu minimal du rapport de transparence que doit publier le CAC d'une EIP ?",a:"Art. L. 821-5 C. com. / Art. 13 Règlement UE 537/2014 : le rapport contient au minimum : 1) La description de la structure juridique et du système de gouvernance. 2) La description du réseau et de ses membres. 3) La description du système de contrôle qualité interne. 4) La date du dernier contrôle qualité externe (H2A). 5) La liste des EIP dont les comptes sont certifiés. 6) La déclaration d'indépendance et la politique de formation continue. 7) Le chiffre d'affaires total et sa ventilation (certification vs SACC). Il est publié dans les 4 mois suivant la clôture de l'exercice du CAC.",sr:"Art. 13 Règl. UE 537/2014 / C. com., art. L. 821-5 / H2A FAQ §6",kw:["rapport de transparence","structure","gouvernance","réseau","contrôle qualité","H2A","EIP","indépendance","formation","chiffre d'affaires","4 mois"],tip:"Le rapport de transparence est propre aux CAC d'EIP. Son contenu détaillé est un sujet fréquent au DEC."},

// ── NEP 500 — Éléments probants ──

{id:"v7g17",p:"CAC",th:"Qualité",ty:"qcm",q:"Selon la NEP 500, les éléments probants obtenus par le CAC doivent être :",ch:["Suffisants uniquement","Appropriés uniquement","Suffisants et appropriés","Exhaustifs et certains"],a:2,ex:"NEP 500 §06 : le CAC collecte des éléments suffisants (quantité) et appropriés (qualité/pertinence) pour fonder son opinion.",sr:"NEP 500, §06"},

// ── Conventions réglementées — Compléments ──

{id:"v7g18",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelle est la procédure d'autorisation et de contrôle des conventions réglementées dans les SA à conseil d'administration ?",a:"La procédure comporte 4 étapes : 1) L'intéressé (administrateur, DG) informe le conseil d'administration de la convention projetée. 2) Le conseil d'administration autorise la convention préalablement à sa conclusion (art. L. 225-38). 3) Le CAC est informé de toutes les conventions autorisées et établit un rapport spécial présenté à l'AG. 4) L'AG statue sur le rapport spécial du CAC (approbation ou non). L'approbation ne purge pas les vices éventuels. La non-approbation n'entraîne pas automatiquement la nullité de la convention.",sr:"C. com., art. L. 225-38 à L. 225-42 / NI IX / NEP 9510",kw:["intéressé","conseil d'administration","autorisation","préalable","conclusion","rapport spécial","AG","approbation","non-approbation","nullité"],tip:"Les 4 étapes séquentielles sont à maîtriser. Le piège : la non-approbation par l'AG n'annule pas automatiquement la convention."},

// ── NEP 700 — Rapport sur les comptes ──

{id:"v7g19",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les quatre formes d'opinion que le CAC peut exprimer dans son rapport sur les comptes annuels (NEP 700) ?",a:"Les 4 formes d'opinion sont : 1) Certification sans réserve : les comptes sont réguliers, sincères et donnent une image fidèle. 2) Certification avec réserve(s) : désaccord ou limitation identifié(e) mais non significatif(ve) au point de remettre en cause l'ensemble des comptes. 3) Refus de certifier pour désaccord : désaccord significatif et diffus remettant en cause l'image fidèle. 4) Refus de certifier pour limitation : impossibilité de mettre en œuvre les diligences estimées nécessaires (limitation significative et diffuse). Le CAC peut également formuler des observations (ne modifiant pas l'opinion) et des paragraphes d'emphase.",sr:"NEP 700 §12-20",kw:["certification sans réserve","avec réserve","refus","désaccord","limitation","image fidèle","significatif","diffus","observations"],tip:"Les 4 formes d'opinion sont fondamentales. L'observation ne modifie pas l'opinion — elle attire l'attention."},

// ── NEP 260/265 — Communications ──

{id:"v7g20",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles communications le CAC doit-il adresser aux organes mentionnés à l'article L. 821-63 du code de commerce (NEP 260) ?",a:"Le CAC communique aux organes (CA, CS, comité d'audit) : 1) L'étendue et le calendrier des travaux d'audit. 2) Les faiblesses significatives de contrôle interne identifiées (NEP 265). 3) Les anomalies significatives relevées, corrigées ou non. 4) Les événements et circonstances susceptibles de remettre en cause la continuité d'exploitation. 5) Les questions relatives à l'indépendance du CAC. 6) Toute autre question résultant de l'audit qu'il estime significative. Pour les EIP : communication des Key Audit Matters (points clés de l'audit, NEP 701).",sr:"NEP 260 §07-14 / NEP 265",kw:["organes","L. 821-63","étendue","calendrier","faiblesses","contrôle interne","anomalies","continuité","indépendance","questions significatives","KAM"],tip:"Les communications aux organes de gouvernance sont structurantes. Pour les EIP, les KAM s'ajoutent."},

// ── Compléments CAC QRC divers ──

{id:"v7g21",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les trois limites inhérentes à l'audit reconnues par la NEP 200 ?",a:"Les trois limites sont : 1) L'utilisation de techniques de sondage : le CAC ne contrôle pas l'exhaustivité des opérations mais procède par sélection d'éléments. 2) Les limites inhérentes au contrôle interne : le contrôle interne ne peut fournir qu'une assurance raisonnable et non absolue. 3) Le fait que la plupart des éléments probants sont de nature plus convaincante que concluante : ils ne constituent pas des certitudes mais des présomptions de régularité et sincérité. Ces limites expliquent pourquoi l'audit ne fournit qu'une assurance raisonnable (et non absolue).",sr:"NEP 200 §11 / DEC Mai 2022 Q13",kw:["sondage","exhaustivité","contrôle interne","assurance raisonnable","absolue","éléments probants","convaincante","concluante","présomptions"],tip:"Question tombée au DEC mai 2022 (3 points). Les 3 limites justifient l'assurance raisonnable (et non absolue)."},
{id:"v7g22",p:"CAC",th:"Exercice",ty:"qrc",q:"Donnez une définition du plan de mission et du programme de travail du CAC.",a:"Le plan de mission (NEP 300 §08) définit l'approche générale des travaux : seuil de signification, risques identifiés, répartition des travaux dans le temps, composition de l'équipe, calendrier d'intervention. Le programme de travail (NEP 300 §09) est la mise en œuvre détaillée du plan de mission : nature, étendue et calendrier précis des procédures d'audit à réaliser pour chaque assertion et catégorie d'opérations, soldes et informations en annexe.",sr:"NEP 300, §08-09 / Art. R. 823-11 C. com. / DEC Mai 2022 Q14",kw:["plan de mission","approche générale","seuil","risques","équipe","calendrier","programme de travail","nature","étendue","procédures","assertions"],tip:"Question tombée au DEC mai 2022. Le plan est stratégique (approche globale), le programme est opérationnel (diligences détaillées)."},
{id:"v7g23",p:"CAC",th:"Exercice",ty:"qrc",q:"Quels sont les quatre indices d'appartenance du CAC à un réseau au sens de l'article 29 du code de déontologie ?",a:"Les indices d'appartenance à un réseau (art. 29 code déontologie) sont : 1) Un intérêt économique commun (partage de revenus, de moyens). 2) Un contrôle ou une direction commune. 3) Une politique commune de contrôle qualité. 4) Une stratégie commerciale commune. L'existence d'un ou plusieurs de ces indices crée une présomption d'appartenance au réseau. Le CAC doit en tirer les conséquences en matière d'indépendance (interdictions et limitations étendues aux membres du réseau).",sr:"Code déontologie CAC, art. 29 / DEC Mai 2021 Q16",kw:["réseau","intérêt économique","contrôle","direction","qualité","stratégie commerciale","présomption","indépendance","membres"],tip:"Question tombée au DEC mai 2021. Les 4 indices sont cumulables (un seul suffit à créer la présomption)."},
{id:"v7g24",p:"CAC",th:"Déontologie",ty:"qrc",q:"L'article 12 du code de déontologie fixe les critères de détermination des honoraires du CAC. Quels sont-ils ?",a:"Art. 12 : la rémunération est en rapport avec l'importance des diligences à mettre en œuvre. Les critères d'appréciation sont : 1) La taille et la complexité de l'entité auditée (CA, total bilan, nombre de salariés). 2) La nature et l'importance des risques identifiés (secteur d'activité, environnement réglementaire). 3) Les qualifications et l'expérience des personnes affectées à la mission. 4) Le temps nécessaire à l'accomplissement de la mission. Le barème d'heures fixé réglementairement sert de base à la fixation des honoraires.",sr:"Code déontologie CAC, art. 12 / DEC Mai 2021 Q17",kw:["honoraires","diligences","taille","complexité","risques","qualifications","expérience","temps","barème d'heures"],tip:"Question tombée au DEC mai 2021. Les 4 critères de l'art. 12 doivent être cités."},

// ── NEP 265 — Faiblesses du contrôle interne ──

{id:"v7g25",p:"CAC",th:"Qualité",ty:"qcm",q:"Le CAC doit-il communiquer toutes les faiblesses de contrôle interne identifiées lors de l'audit ?",ch:["Oui, toutes sans exception","Non, uniquement les faiblesses significatives","Oui, mais uniquement pour les EIP","Non, il n'a aucune obligation de communication"],a:1,ex:"NEP 265 §08 : seules les faiblesses significatives de contrôle interne sont communiquées par écrit aux organes mentionnés à l'art. L. 821-63 et à la direction.",sr:"NEP 265, §08"},

// ── NI 9 — Conventions réglementées compléments ──

{id:"v7g26",p:"CAC",th:"Exercice",ty:"qcm",q:"Les conventions réglementées conclues entre la société et un actionnaire détenant plus de 10% des droits de vote dans une SA sont-elles soumises à la procédure d'autorisation ?",ch:["Non, seuls les dirigeants et administrateurs sont concernés","Oui, si la convention porte sur des opérations courantes conclues à des conditions normales","Oui, elles sont soumises à autorisation préalable du CA","Non, elles sont interdites"],a:2,ex:"Art. L. 225-38 C. com. : les conventions entre la société et un actionnaire disposant de plus de 10% des droits de vote sont soumises à autorisation préalable du CA et au rapport spécial du CAC.",sr:"C. com., art. L. 225-38 / NI IX"},

// ── H2A FAQ — Comité spécialisé ──

{id:"v7g27",p:"CAC",th:"Exercice",ty:"qcm",q:"Les EIP sont-elles toutes tenues de se doter d'un comité spécialisé (comité d'audit) ?",ch:["Oui, toutes les EIP sans exception","Non, certaines EIP peuvent être dispensées si un organe existant exerce les fonctions du comité","Oui, mais uniquement les sociétés cotées","Non, seules les EIP de plus de 500 salariés"],a:1,ex:"Art. L. 821-67 C. com. : certaines EIP peuvent être dispensées de constituer un comité spécialisé distinct si un organe existant (CA, CS) en exerce les fonctions.",sr:"C. com., art. L. 821-67 / H2A FAQ §8"},

// ── NEP 230 — Documentation ──

{id:"v7g28",p:"CAC",th:"Qualité",ty:"qcm",q:"Le CAC doit constituer un dossier de travail documentant l'audit. Le délai de conservation du dossier est de :",ch:["3 ans","5 ans","6 ans","10 ans"],a:2,ex:"Art. R. 823-10 C. com. : le dossier est conservé pendant 6 ans. La NEP 230 §10 précise que le CAC assemble le dossier dans les 60 jours suivant la signature du rapport.",sr:"C. com., art. R. 823-10 / NEP 230, §10"},

// ── Complément procédure alerte ──

{id:"v7g29",p:"CAC",th:"Exercice",ty:"qrc",q:"Décrivez les étapes de la procédure d'alerte du CAC dans les sociétés anonymes.",a:"La procédure d'alerte (art. L. 234-1 C. com.) comporte 4 phases : Phase 1 : le CAC demande des explications au dirigeant sur les faits de nature à compromettre la continuité d'exploitation (réponse sous 15 jours). Phase 2 : si la réponse est insuffisante ou en l'absence de réponse, le CAC invite le CA/CS à en délibérer (convocation sous 8 jours, délibération sous 15 jours). Phase 3 : si la continuité reste compromise, le CAC informe le président du tribunal de commerce. Phase 4 : si le CAC constate l'absence de décisions satisfaisantes, il informe l'AG dans un rapport spécial.",sr:"C. com., art. L. 234-1 / NEP 570",kw:["alerte","4 phases","dirigeant","explications","15 jours","CA","8 jours","tribunal de commerce","AG","rapport spécial"],tip:"Les 4 phases séquentielles avec les délais précis sont essentielles. Le piège est de confondre les délais entre les phases."},

// ── Complément QRC CAC Déontologie ──

{id:"v7g30",p:"CAC",th:"Déontologie",ty:"qrc",q:"Que désignent les termes « mission » et « prestation » dans le code de déontologie du CAC ?",a:"Art. L. 821-2-III et IV C. com. : une « mission » est une intervention du CAC prévue par la loi ou le règlement dans le cadre de son mandat (certification des comptes, interventions légales). Une « prestation » est un service fourni par le CAC en dehors de toute obligation légale, à la demande d'une entité ou d'un tiers (attestations contractuelles, due diligence, audits contractuels). Le code de déontologie s'applique aux deux mais avec des règles différentes : le Titre I (socle commun) à toutes, les Titres II et III aux seules missions légales.",sr:"C. com., art. L. 821-2-III et IV / Code déontologie / DEC Nov 2021 Q18",kw:["mission","loi","règlement","mandat","certification","prestation","service","contractuel","attestation","Titre I","Titre II","Titre III"],tip:"Question tombée au DEC nov 2021. La distinction mission/prestation structure tout le code de déontologie du CAC."},

// ═══════════════════════════════════════════════
// V7 COMPLÉMENT — NEP manquantes : 501, 550, 710, 9605, 2410
// ═══════════════════════════════════════════════

{id:"v7h1",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les applications spécifiques du caractère probant des éléments collectés prévues par la NEP 501 ?",a:"La NEP 501 traite de 3 applications spécifiques : 1) L'assistance à l'inventaire physique des stocks : le CAC assiste à la prise d'inventaire, réalise des contrôles de comptage et vérifie la fiabilité des procédures de l'entité. Si le CAC ne peut pas assister à l'inventaire, il met en œuvre des procédures alternatives. 2) La demande de confirmation des litiges et contentieux : le CAC demande à la direction de fournir une information complète et obtient communication des courriers échangés avec les avocats. 3) L'information sectorielle : le CAC vérifie la concordance de l'information sectorielle avec les données comptables sous-jacentes.",sr:"NEP 501 §01-14",kw:["inventaire physique","stocks","comptage","procédures alternatives","litiges","contentieux","avocats","information sectorielle","concordance"],tip:"La NEP 501 est le complément pratique de la NEP 500. L'assistance à l'inventaire est le point le plus fréquemment testé."},
{id:"v7h2",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les principales diligences du CAC concernant les relations et transactions avec les parties liées (NEP 550) ?",a:"Le CAC doit : 1) Identifier les parties liées de l'entité et la nature de leurs relations. 2) Évaluer le risque d'anomalies significatives lié à ces relations et transactions. 3) Mettre en œuvre des procédures d'audit pour identifier les transactions avec les parties liées non déclarées. 4) Vérifier le traitement comptable des transactions identifiées (conformité au référentiel comptable). 5) Obtenir des déclarations écrites de la direction confirmant l'exhaustivité des informations communiquées sur les parties liées. 6) Communiquer avec les organes mentionnés à l'art. L. 821-63 sur les éléments relevés.",sr:"NEP 550 §05-24",kw:["parties liées","relations","transactions","risque","non déclarées","traitement comptable","déclarations écrites","exhaustivité","communication","organes"],tip:"La NEP 550 est liée aux conventions réglementées (NI IX) mais va plus loin : elle couvre toutes les parties liées, pas uniquement les dirigeants."},
{id:"v7h3",p:"CAC",th:"Qualité",ty:"qcm",q:"Lorsque les comptes de l'exercice précédent ont été certifiés avec réserve par le prédécesseur, le CAC entrant doit, au titre de la NEP 710 :",ch:["Ignorer la réserve si les comptes de l'exercice en cours sont corrects","Évaluer si la réserve a toujours une incidence sur les comptes de l'exercice et en tirer les conséquences sur son rapport","Reprendre automatiquement la même réserve dans son rapport","Demander au prédécesseur de lever sa réserve"],a:1,ex:"NEP 710 §06 : le CAC évalue si les motifs de la réserve antérieure ont une incidence sur les comptes de l'exercice. Si oui, il en tient compte dans son opinion ; si non, il peut ne pas la reprendre.",sr:"NEP 710, §06"},
{id:"v7h4",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les principales obligations du CAC en matière de lutte contre le blanchiment des capitaux et le financement du terrorisme (NEP 9605) ?",a:"La NEP 9605 prévoit : 1) Identification et vérification de l'identité du client et du bénéficiaire effectif (acceptation du mandat). 2) Classification des risques de blanchiment. 3) Vigilance constante : pendant la mission, le CAC est attentif aux opérations atypiques, complexes ou inhabituelles. 4) Déclaration de soupçon à TRACFIN : le CAC déclare personnellement les opérations dont il sait ou soupçonne qu'elles proviennent d'une infraction (peine >1 an) ou sont liées au financement du terrorisme. 5) Confidentialité absolue de la déclaration. 6) Conservation des documents pendant 5 ans. 7) Lien avec l'obligation de révélation : si le CAC sait (et non seulement soupçonne), il révèle concomitamment au procureur.",sr:"NEP 9605 §10-78",kw:["identification","bénéficiaire effectif","classification","risques","vigilance","opérations atypiques","déclaration de soupçon","TRACFIN","personnellement","confidentialité","5 ans","révélation","procureur","concomitamment"],tip:"La NEP 9605 est centrale. Le point clé est la distinction soupçon (→ TRACFIN seul) vs connaissance certaine (→ TRACFIN + procureur)."},
{id:"v7h5",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les principales caractéristiques de l'examen limité de comptes intermédiaires réalisé par le CAC (NEP 2410) ?",a:"La NEP 2410 prévoit que : 1) L'examen limité fournit une assurance modérée (et non raisonnable comme l'audit complet). 2) Les procédures consistent principalement en des entretiens avec la direction et des procédures analytiques (pas de contrôles de substance détaillés). 3) Le CAC s'entretient avec la direction sur : le risque de fraude, les changements comptables, les opérations non courantes, les hypothèses de continuité, les événements postérieurs. 4) Le rapport d'examen limité exprime une conclusion sous forme négative : « nous n'avons pas relevé d'anomalies significatives ». 5) Le CAC n'est pas tenu de mettre en œuvre des procédures de détection d'événements postérieurs après la signature de son rapport.",sr:"NEP 2410 §01-25",kw:["examen limité","intermédiaires","assurance modérée","entretiens","procédures analytiques","conclusion négative","pas relevé","anomalies significatives","fraude","continuité","événements postérieurs"],tip:"L'examen limité se distingue de l'audit par le niveau d'assurance (modéré vs raisonnable) et la nature des travaux (entretiens + analytique vs contrôles de substance)."},

// ═══════════════════════════════════════════════
// V7 PASSE 8 — RÉÉQUILIBRAGE QRC EC + Secret professionnel + Contrôle qualité
// ═══════════════════════════════════════════════

// ── SECRET PROFESSIONNEL — Compléments manquants ──

{id:"v7i1",p:"CAC",th:"Déontologie",ty:"qcm",q:"Le secret professionnel du CAC est opposable à toute personne, sauf :",ch:["Au président du tribunal de commerce","Aux auxiliaires de justice","À la H2A et aux agents de contrôle qualité","Au procureur de la République"],a:1,ex:"Art. L. 821-61 C. com. : le secret professionnel ne peut être opposé au CAC sauf par les auxiliaires de justice (avocats).",sr:"C. com., art. L. 821-61"},
{id:"v7i2",p:"CAC",th:"Déontologie",ty:"qrc",q:"Dans quels cas le CAC est-il délié du secret professionnel en vertu de la loi ?",a:"Le CAC est délié du secret professionnel dans les cas suivants : 1) Révélation des faits délictueux au procureur de la République (art. L. 821-10 C. com.). 2) Signalement des irrégularités à l'AG (art. L. 821-10). 3) Déclaration de soupçon à TRACFIN (art. L. 561-15 CMF). 4) Réponse au droit de communication de TRACFIN. 5) Communication aux organes mentionnés à l'art. L. 821-63 (CA, CS, comité d'audit). 6) Communication avec le co-commissaire aux comptes. 7) Communication dans le cadre des contrôles de la H2A. 8) Communication avec les autorités de contrôle prudentiel (ACPR, AMF) dans certains cas.",sr:"C. com., art. L. 821-10, L. 821-61 / Art. L. 561-15 CMF",kw:["révélation","faits délictueux","procureur","signalement","irrégularités","AG","TRACFIN","organes","L. 821-63","co-commissaire","H2A","ACPR","AMF"],tip:"Le CAC a beaucoup plus de cas de levée du secret que l'EC. La révélation au procureur est la plus emblématique."},

// ── CONTRÔLE QUALITÉ — Compléments manquants ──

{id:"v7i3",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les conditions pour être candidat aux fonctions de contrôleur qualité de l'Ordre des EC ?",a:"Les conditions (art. 170 décret 2012-432 / arrêté 3/05/2012) sont : 1) Être expert-comptable inscrit au Tableau de l'Ordre. 2) Avoir au moins 5 ans d'inscription au Tableau. 3) Exercer effectivement l'activité d'expertise comptable. 4) Avoir bénéficié d'un contrôle de qualité favorable ou sans observation majeure. 5) S'engager à respecter la confidentialité des informations recueillies. 6) Ne pas avoir fait l'objet de sanctions disciplinaires. Les contrôleurs sont désignés par les conseils régionaux.",sr:"Art. 170 décret 2012-432 / Contrôle qualité en pratique 2018 / DEC Mai 2024 Q1",kw:["5 ans","inscription","Tableau","exercer","effectivement","contrôle favorable","confidentialité","sanctions","conseils régionaux"],tip:"Question tombée au DEC mai 2024 (2 points). Les 6 conditions doivent être citées."},
{id:"v7i4",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les conclusions possibles à l'issue d'un contrôle de qualité EC et quelles suites peuvent être données ?",a:"Les conclusions possibles sont : 1) Contrôle satisfaisant : pas d'observation. 2) Contrôle avec recommandations d'amélioration : le contrôlé doit mettre en œuvre les recommandations. 3) Contrôle avec observations significatives : le CROEC peut demander un plan d'action avec suivi à court terme. 4) Contrôle insatisfaisant : le CROEC peut saisir la chambre de discipline en cas de manquements graves. La lettre de conclusion est signée par le président du CROEC. Un contrôle complémentaire peut être programmé pour vérifier la mise en œuvre des recommandations.",sr:"Art. 170-176 décret 2012-432 / Arrêté 3/05/2012 / Contrôle qualité en pratique",kw:["satisfaisant","recommandations","amélioration","observations significatives","plan d'action","insatisfaisant","chambre de discipline","lettre de conclusion","CROEC","complémentaire"],tip:"Les suites du contrôle vont de la simple recommandation jusqu'à la saisine disciplinaire. C'est un spectre progressif."},
{id:"v7i5",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les conclusions possibles d'un contrôle qualité LBC-FT pour un EC ?",a:"Les conclusions possibles du contrôle LBC-FT (arrêté 7/12/2020) sont : 1) Conformité : le dispositif LBC-FT est conforme aux obligations. 2) Conformité avec recommandations : des améliorations sont nécessaires mais le dispositif est globalement satisfaisant. 3) Non-conformité : le dispositif présente des carences significatives. En cas de non-conformité, le CROEC peut : engager des poursuites disciplinaires, informer TRACFIN des manquements graves et délibérés, ou demander un contrôle de suivi.",sr:"Arrêté 7/12/2020 / NPLAB / DEC Mai 2022 Q2",kw:["conformité","recommandations","non-conformité","carences","disciplinaires","TRACFIN","manquements","graves","délibérés","suivi"],tip:"Question tombée au DEC mai 2022. Les 3 niveaux de conclusion et les suites possibles sont à connaître."},

// ── QRC MIROIRS EC — Exercice professionnel ──

{id:"v7i6",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les missions pouvant être exercées par les EC ? Citez les quatre catégories du cadre de référence.",a:"Les 4 catégories sont : 1) Les missions relevant de la prérogative d'exercice exclusive (art. 2 al. 1 et 2 ord. 1945) : tenue, révision, appréciation des comptabilités, attestation de régularité et sincérité. 2) Les autres missions de l'article 2 (organisation, analyse économique, juridique et financière). 3) Les missions légales prévues par des textes spécifiques (comptes de campagne, CSE, visa fiscal, tiers de confiance, CIF). 4) Les missions prévues par l'article 22 (études et travaux d'ordre statistique, économique, numérique, consultations juridiques, activités commerciales accessoires).",sr:"Art. 2, 22 ord. 1945 / Cadre de référence / DEC Mai 2021 Q8",kw:["prérogative exclusive","tenue","révision","attestation","article 2","organisation","analyse","missions légales","comptes de campagne","CSE","article 22","études","numérique","consultations juridiques","activités commerciales"],tip:"Question récurrente au DEC. Les 4 catégories structurent tout le périmètre d'intervention de l'EC."},
{id:"v7i7",p:"EC",th:"Exercice",ty:"qrc",q:"Qu'est-ce que le mandat implicite créé par la loi PACTE et quelles sont ses limites ?",a:"Le mandat implicite (art. 151 décret 2012-432 modifié) permet aux EC d'agir auprès de l'administration fiscale et des organismes sociaux sans produire un mandat signé pour chaque démarche. C'est une présomption simple de mandat. Limites : 1) Ne confère pas le pouvoir de représentation en justice (art. 22 al. 5 ord. 1945). 2) Exception : un mandat exprès reste nécessaire pour la création du compte fiscal d'un particulier, la définition du mot de passe et la modification de l'adresse mail. 3) Le dépassement des pouvoirs contractualisés engage la responsabilité civile, pénale et disciplinaire de l'EC.",sr:"Art. 151 décret 2012-432 / Loi PACTE 2019 / Profession EC 2025 §C",kw:["mandat implicite","PACTE","présomption simple","administration fiscale","organismes sociaux","représentation en justice","interdit","compte fiscal","particulier","mot de passe","responsabilité"],tip:"Le mandat implicite a 3 limites essentielles. L'exception du compte fiscal du particulier est un piège classique."},
{id:"v7i8",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les différentes formes d'exercice de la profession d'EC et leurs conditions ?",a:"Les formes d'exercice (art. 12 ord. 1945) sont : 1) À titre individuel (en nom propre, y compris sous le statut d'EI depuis 2022). 2) En qualité de salarié d'un autre EC, d'une AGC, d'une succursale ou d'une SEC/SPE. 3) En qualité de mandataire social d'une SEC ou SPE. 4) En qualité d'EC en entreprise (art. 13, loi PACTE). Ces formes sont compatibles entre elles. Le statut de micro-entrepreneur est incompatible. Les SEC doivent respecter la règle des 2/3 de droits de vote détenus par des EC.",sr:"Art. 12, 13, 7 ord. 1945 / Loi 2022-172",kw:["individuel","EI","salarié","AGC","succursale","SEC","SPE","mandataire social","EC en entreprise","compatibles","micro-entrepreneur","incompatible","2/3"],tip:"Connaître les 4 formes d'exercice et leurs conditions est fondamental."},

// ── QRC MIROIRS EC — Déontologie ──

{id:"v7i9",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les règles de communication et de démarchage applicables aux EC ?",a:"Les règles (art. 152 décret 2012-432) sont : 1) Les opérations de communication sont autorisées sous réserve qu'elles soient décentes, exercées avec dignité, sans allégation inexacte ni élément susceptible d'induire en erreur. 2) Elles doivent être exemptes de tout élément comparatif ou dénigrant. 3) Le démarchage (sollicitation personnalisée) est autorisé depuis la loi PACTE, par voie postale ou numérique. 4) L'appel téléphonique non sollicité et le démarchage physique restent proscrits. 5) Les cabinets mixtes (EC/CAC) doivent respecter les deux réglementations applicables.",sr:"Art. 152 décret 2012-432 / Profession EC 2025 §E",kw:["communication","décentes","dignité","inexacte","comparatif","dénigrant","démarchage","sollicitation personnalisée","postale","numérique","appel téléphonique","interdit","cabinets mixtes"],tip:"Le démarchage est autorisé depuis PACTE, mais avec des limites strictes sur la forme et le contenu."},
{id:"v7i10",p:"EC",th:"Déontologie",ty:"qrc",q:"Quels sont les principes fondamentaux du code de déontologie EC (chapitre II du décret 2012-432) ?",a:"Les principes fondamentaux sont : 1) Indépendance (art. 145-146) : l'EC ne doit subir aucune pression et doit éviter les situations de conflits d'intérêts. 2) Compétence (art. 145) : obligation de maintenir un niveau de compétence suffisant par la formation continue. 3) Secret professionnel et discrétion (art. 147). 4) Obligation de la lettre de mission (art. 151). 5) Acceptation/maintien de la mission (art. 150) : l'EC ne peut accepter que des missions qu'il est en mesure de réaliser. 6) Devoir de conseil (art. 155). 7) Confraternité (art. 161-164). 8) Non-immixtion dans la gestion du client.",sr:"Art. 141-169 décret 2012-432",kw:["indépendance","conflits d'intérêts","compétence","formation continue","secret professionnel","discrétion","lettre de mission","acceptation","maintien","devoir de conseil","confraternité","non-immixtion"],tip:"Les principes du code de déontologie EC sont distincts de ceux du CAC. Citez les articles."},
{id:"v7i11",p:"EC",th:"Déontologie",ty:"qrc",q:"L'EC découvre que son client fait de la saisie comptable réalisée par une entreprise de services informatiques non inscrite à l'Ordre. Quelle attitude doit-il adopter ?",a:"L'EC doit : 1) Informer son client que la saisie comptable constitue de la tenue de comptabilité, relevant de la prérogative d'exercice exclusive (art. 2 ord. 1945). 2) Le mettre en garde que le recours à un prestataire non inscrit constitue un exercice illégal (art. 20 ord. 1945). 3) Exiger que le client mette fin à cette situation (soit en internalisant, soit en confiant la saisie à un EC inscrit). 4) Si le client refuse, l'EC doit refuser la mission ou s'en retirer (art. 150) pour ne pas couvrir l'exercice illégal. 5) Il peut informer le conseil régional de l'Ordre. L'EC ne doit pas dénoncer directement au procureur (secret professionnel).",sr:"Art. 2, 20 ord. 1945 / Art. 150 décret 2012-432 / DEC Mai 2025 Q9",kw:["saisie comptable","tenue de comptabilité","prérogative exclusive","exercice illégal","art. 20","informer","mettre en garde","exiger","refuser","retirer","couvrir","conseil régional","secret professionnel"],tip:"Question tombée au DEC mai 2025. L'attitude suit la logique informer → mettre en garde → exiger → refuser."},
{id:"v7i12",p:"EC",th:"Déontologie",ty:"qrc",q:"Quels sont les éléments que doit contenir la lettre de mission de l'EC ?",a:"La lettre de mission (art. 151 décret 2012-432 / NPMQ §10) doit contenir : 1) La nature et l'objet de la mission. 2) Les obligations respectives des parties (travaux EC, obligations du client). 3) Le calendrier d'exécution. 4) Les conditions de rémunération (honoraires et modalités de paiement). 5) Le cas échéant, les mandats d'agir (mandat fiscal, mandat social). 6) Les conditions de résiliation. 7) La référence aux normes professionnelles applicables. 8) La clause de responsabilité (le cas échéant). 9) L'obligation de recourir à la conciliation préalable en cas de litige (art. 161).",sr:"Art. 151 décret 2012-432 / NPMQ §10",kw:["nature","objet","obligations","parties","calendrier","rémunération","honoraires","mandats","résiliation","normes","responsabilité","conciliation"],tip:"La lettre de mission est obligatoire pour toute mission EC. Citez au moins 6 éléments."},

// ── QRC MIROIRS EC — Qualité ──

{id:"v7i13",p:"EC",th:"Qualité",ty:"qrc",q:"Quels sont les objectifs et le contenu de la NPMQ (Norme Professionnelle de Maîtrise de la Qualité) ?",a:"La NPMQ vise à garantir la qualité des travaux réalisés par les EC. Elle couvre : 1) Responsabilité de l'encadrement : le responsable de la structure est garant de la qualité. 2) Règles d'éthique : respect du code de déontologie, indépendance. 3) Acceptation et maintien des missions : évaluation des risques avant acceptation. 4) Ressources humaines : compétences, formation, affectation du personnel. 5) Réalisation des missions : supervision, revue de dossiers, revue indépendante pour les missions à risque. 6) Suivi du système de maîtrise de la qualité : contrôle interne, amélioration continue.",sr:"NPMQ §01-38 / Cadre de référence",kw:["encadrement","éthique","déontologie","acceptation","maintien","ressources humaines","compétences","formation","supervision","revue de dossiers","revue indépendante","suivi","amélioration"],tip:"La NPMQ est l'une des 3 normes transversales. Ses 6 composantes structurent l'organisation du cabinet."},
{id:"v7i14",p:"EC",th:"Qualité",ty:"qrc",q:"Comment l'EC conduit-il les contrôles par épreuves dans une mission de présentation (NP 2300) et quelle conclusion en tire-t-il ?",a:"L'EC réalise des contrôles par épreuves (NP 2300 §11) en vérifiant : 1) L'existence de pièces justificatives pour les enregistrements. 2) La pertinence de l'imputation comptable. 3) Le respect de la séparation des exercices. Si les contrôles ne révèlent pas d'anomalies : attestation sans réserve (cohérence et vraisemblance). Si des anomalies limitées sont identifiées : attestation avec réserve. Si des anomalies significatives et diffuses sont identifiées : refus d'attester. En présence d'un CAC : l'EC délivre un simple compte-rendu de travaux (et non une attestation).",sr:"NP 2300 §11, §16-18",kw:["pièces justificatives","imputation","séparation des exercices","sans réserve","cohérence","vraisemblance","avec réserve","refus d'attester","compte-rendu de travaux","CAC"],tip:"Les 3 conclusions (sans réserve, avec réserve, refus) et la distinction présence/absence du CAC sont essentielles."},
{id:"v7i15",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les différences entre la mission de procédures convenues (NP 4400) et la mission de compilation (NP 4410) ?",a:"La mission de procédures convenues (NP 4400) : 1) L'EC met en œuvre des procédures définies contractuellement avec le client. 2) Il n'exprime aucune assurance. 3) Il rapporte les constatations factuelles résultant de ses travaux. 4) Les conclusions sont à usage exclusif du client. La mission de compilation (NP 4410) : 1) L'EC collecte, classe et présente des informations financières. 2) Il n'exprime aucune assurance. 3) Il n'est pas tenu de vérifier l'exactitude des informations. 4) Il identifie sa prestation par une mention sur les documents. Point commun : aucune assurance n'est exprimée dans les deux cas.",sr:"NP 4400 / NP 4410 / Cadre de référence",kw:["procédures convenues","contractuellement","constatations factuelles","usage exclusif","compilation","collecte","classe","présente","aucune assurance","exactitude","mention"],tip:"La différence fondamentale : procédures convenues = exécution de diligences prédéfinies ; compilation = mise en forme d'informations fournies."},

// ── QRC MIROIRS EC — Responsabilité ──

{id:"v7i16",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les sanctions disciplinaires encourues par un EC en cas de manquement à ses obligations déontologiques ?",a:"Les sanctions (art. 53 ord. 1945) sont, par ordre de gravité : 1) L'avertissement. 2) Le blâme. 3) La suspension temporaire (maximum 5 ans) du droit d'exercer tout ou partie de l'activité. 4) La radiation du Tableau de l'Ordre. Sanctions complémentaires : interdiction de faire partie des conseils de l'Ordre pendant 10 ans max, publication de la décision dans un journal, mise à la charge du professionnel des frais de la procédure. En matière LBC-FT (art. 53 bis) : les sanctions spécifiques incluent un avertissement ou un blâme avec ou sans sanction pécuniaire.",sr:"Art. 53, 53 bis, 54 ord. 1945",kw:["avertissement","blâme","suspension","5 ans","radiation","Tableau","interdiction","conseils","10 ans","publication","frais","LBC-FT","sanction pécuniaire"],tip:"Les 4 sanctions principales + les sanctions complémentaires sont à connaître avec précision."},
{id:"v7i17",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quels sont les critères de mise en œuvre de la responsabilité civile contractuelle de l'EC ?",a:"Les 3 critères cumulatifs sont : 1) Une faute : manquement à une obligation contractuelle (défaut de diligence, non-respect des normes professionnelles, erreur de conseil, défaut de mise en garde). 2) Un préjudice : dommage subi par le client (perte financière, redressement fiscal, pénalités). 3) Un lien de causalité : le préjudice doit être la conséquence directe de la faute. L'EC est tenu d'une obligation de moyens (et non de résultat) : il ne garantit pas l'absence d'erreurs mais doit mettre en œuvre tous les moyens requis par les normes. La prescription est de 5 ans (art. 2224 Code civil), avec un point de départ glissant (jour où le créancier a connu ou aurait dû connaître les faits).",sr:"Art. 1231-1 Code civil / Art. 2224 / DEC Mai 2022 Q9",kw:["faute","manquement","obligation contractuelle","préjudice","dommage","lien de causalité","directe","obligation de moyens","résultat","5 ans","prescription","point de départ glissant"],tip:"Les 3 critères classiques (faute, préjudice, lien de causalité) + l'obligation de moyens sont fondamentaux."},
{id:"v7i18",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les caractéristiques de l'assurance responsabilité civile professionnelle (RCP) obligatoire de l'EC ?",a:"L'assurance RCP (art. 17 ord. 1945 / art. 139-140 décret 2012-432) présente les caractéristiques suivantes : 1) Elle est obligatoire pour tout EC et toute structure inscrite. 2) Le Conseil national négocie un contrat groupe avec un assureur. 3) Montants minimaux : 500 000 € par sinistre et 1 000 000 € par année. 4) Garantie subséquente d'une durée minimale de 10 ans après la fin de l'activité. 5) La couverture porte sur la réparation des conséquences pécuniaires des fautes professionnelles. 6) Les missions gratuites sont couvertes par le contrat groupe. 7) Le défaut d'assurance constitue un manquement disciplinaire.",sr:"Art. 17 ord. 1945 / Art. 139-140 décret 2012-432",kw:["obligatoire","contrat groupe","500 000","sinistre","1 000 000","année","subséquente","10 ans","fautes professionnelles","missions gratuites","couvertes","défaut","disciplinaire"],tip:"Les montants 500k€/sinistre et 1M€/an + la garantie subséquente de 10 ans sont des chiffres à retenir."},

// ── QRC MIROIRS — Secret professionnel EC approfondissement ──

{id:"v7i19",p:"EC",th:"Déontologie",ty:"qrc",q:"Le secret professionnel de l'EC est-il absolu ? Analysez les cas de levée légale et les limites.",a:"Le secret professionnel de l'EC est d'ordre public et absolu (art. 21 ord. 1945 / art. 226-13 Code pénal). Même l'accord du client ne suffit pas à en délier l'EC. Les cas de levée légale sont limitativement prévus par la loi : 1) Déclaration de soupçon à TRACFIN (art. L. 561-15 CMF). 2) Réponse au droit de communication de TRACFIN (art. L. 561-25 CMF). 3) Défense personnelle : information ouverte contre l'EC ou poursuites engagées à son encontre (art. 21 al. 4). 4) Actions devant les chambres de discipline. 5) Contrôle LBC-FT de l'Ordre. En dehors de ces cas : toute révélation est pénalement sanctionnée (1 an, 15 000 €). L'EC ne peut pas dénoncer les infractions de son client au procureur (contrairement au CAC).",sr:"Art. 21 ord. 1945 / Art. 226-13 CP / Art. L. 561-15, L. 561-22, L. 561-25 CMF",kw:["absolu","ordre public","accord du client","insuffisant","levée légale","limitativement","TRACFIN","droit de communication","défense personnelle","information ouverte","poursuites","discipline","LBC-FT","1 an","15 000","dénoncer","procureur","interdit"],tip:"L'absolutisme du secret est le principe. Les exceptions sont limitatives et légales. La grande différence avec le CAC est l'absence d'obligation de révélation au procureur."},

// ── QRC MIROIRS — Structures d'exercice EC ──

{id:"v7i20",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les conditions de détention de capital et de droits de vote dans une société d'expertise comptable (SEC) ?",a:"Art. 7-I ord. 1945 : 1) Les droits de vote doivent être détenus à plus de 2/3 par des professionnels de l'expertise comptable (EC inscrits, salariés autorisés art. 83 ter/quater, ou personnes/entités exerçant la profession dans un État UE/EEE). 2) Il n'y a PAS de condition de détention minimale du capital (seuls les droits de vote sont réglementés). 3) Les tiers (non-EC) peuvent détenir jusqu'à 1/3 des droits de vote. 4) Pour les sociétés mixtes EC/CAC, les tiers peuvent détenir jusqu'à un tiers des droits de vote. 5) Les fonctions de gérant, DG, président, membres du directoire doivent être exercées par au moins 2/3 d'EC.",sr:"Art. 7-I ord. 1945",kw:["2/3","droits de vote","capital","pas de condition","tiers","1/3","sociétés mixtes","gérant","DG","président","directoire"],tip:"Le piège classique est de confondre capital et droits de vote. Seuls les droits de vote sont réglementés (2/3)."},

// ── QRC MIROIRS — Procédure de succession entre EC ──

{id:"v7i21",p:"EC",th:"Déontologie",ty:"qrc",q:"Décrivez la procédure que doit suivre l'EC pressenti lorsqu'il est contacté par un client souhaitant changer d'expert-comptable.",a:"La procédure (art. 163-164 décret 2012-432) est : 1) L'EC pressenti doit informer par écrit le confrère prédécesseur de sa nomination. 2) Il doit s'assurer que les honoraires du prédécesseur sont réglés ou qu'un plan de paiement est en cours. 3) Si les honoraires ne sont pas réglés, l'EC pressenti ne doit pas accepter la mission tant que le litige n'est pas résolu. 4) Il doit se renseigner auprès du prédécesseur sur les raisons du changement (sans que le prédécesseur ne viole son secret professionnel). 5) Exceptions : la lettre de l'art. 163 n'est pas obligatoire si le prédécesseur est radié, décédé, ou si le changement est à l'initiative du client sans démarche du successeur.",sr:"Art. 163-164 décret 2012-432 / DEC Mai 2024 Q10",kw:["informer","écrit","prédécesseur","nomination","honoraires","réglés","plan de paiement","refuser","raisons","changement","secret professionnel","radié","décédé"],tip:"Question tombée au DEC mai 2024 (3 points). Les 5 étapes de la procédure sont séquentielles et obligatoires."},

// ── QRC MIROIRS — Serment et inscriptions ──

{id:"v7i22",p:"EC",th:"Exercice",ty:"qrc",q:"Quels sont les thèmes abordés dans la prestation de serment lors de l'inscription à l'Ordre des EC ?",a:"Le serment de l'EC (art. 3 ord. 1945) porte sur : 1) L'exercice de la profession avec conscience, indépendance, probité et humanité. 2) Le respect des lois dans l'exercice de la profession. 3) Le secret professionnel. 4) L'engagement de ne pas prêter son concours à des actes frauduleux. Le serment est prêté devant le tribunal judiciaire (anciennement TGI). Il est distinct du serment du CAC qui est prêté devant la cour d'appel et porte sur honneur, probité et indépendance.",sr:"Art. 3 ord. 1945 / DEC Nov 2021 Q8",kw:["conscience","indépendance","probité","humanité","lois","secret professionnel","actes frauduleux","tribunal judiciaire","cour d'appel","CAC","honneur"],tip:"Question tombée au DEC nov 2021. Le serment EC et le serment CAC sont distincts. Attention aux différences de formulation et de juridiction."},

// ── QRC MIROIRS — Honoraires ──

{id:"v7i23",p:"EC",th:"Déontologie",ty:"qrc",q:"Quels sont les modes de rémunération possibles pour les EC et quelles sont les limitations ?",a:"Les modes de rémunération (art. 24 ord. 1945 / art. 158 décret 2012-432) sont : 1) Honoraires de diligence : rémunération du temps et du travail effectué (mode principal). 2) Honoraires de succès (complémentaires) : liés à la réalisation d'un objectif prédéterminé. Limitations : les honoraires de succès ne peuvent PAS être le seul mode de rémunération (des honoraires de diligence sont toujours requis). Missions exclues des honoraires de succès : prérogative d'exercice exclusive (tenue, révision) et missions participant à l'établissement de l'assiette fiscale ou sociale. 3) Les commissions sont interdites (art. 24 al. 1) : l'EC ne peut être rémunéré que par ses clients, exclusivement sous forme d'honoraires. 4) Les honoraires sont fixés librement, sans barème.",sr:"Art. 24 ord. 1945 / Art. 158 décret 2012-432 / Profession EC 2025 §D",kw:["honoraires de diligence","honoraires de succès","complémentaires","objectif","prérogative exclusive","assiette fiscale","sociale","commissions","interdites","clients","librement","barème"],tip:"Les honoraires de succès depuis la loi PACTE sont autorisés mais avec des exclusions importantes. Les commissions restent totalement interdites."},

// ── QRC MIROIRS — Discipline EC ──

{id:"v7i24",p:"EC",th:"Responsabilité",ty:"qrc",q:"Décrivez la procédure disciplinaire applicable à un EC devant la chambre régionale de discipline.",a:"La procédure (art. 49-53 ord. 1945 / art. 186-195 décret 2012-432) est : 1) Saisine : par le président du conseil régional, le Commissaire du Gouvernement, ou la partie plaignante (après conciliation obligatoire art. 161). 2) Instruction : le président de la chambre désigne un rapporteur qui instruit le dossier. 3) Convocation : l'EC est convoqué au moins 1 mois avant l'audience. 4) Audience : en principe publique ; l'EC peut demander le huis clos. Il peut être assisté d'un avocat. 5) Délibération : hors la présence des parties et du Commissaire du Gouvernement. 6) Décision motivée : prononcé de la sanction ou relaxe. 7) Appel possible devant la chambre nationale dans un délai d'1 mois (effet suspensif).",sr:"Art. 49-53 ord. 1945 / Art. 186-195 décret 2012-432",kw:["saisine","président","Commissaire du Gouvernement","plaignante","conciliation","rapporteur","convocation","1 mois","audience","publique","huis clos","avocat","délibération","motivée","sanction","relaxe","appel","chambre nationale","suspensif"],tip:"Les 7 étapes de la procédure sont séquentielles. La conciliation préalable et l'effet suspensif de l'appel sont des points clés."},

// ── QRC pendants CAC Exercice ──

{id:"v7j1",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelle est la durée du mandat du CAC et quels en sont les modes de cessation ?",a:"Le mandat du CAC est de 6 exercices (art. L. 821-44 C. com.). Modes de cessation : 1) Arrivée du terme normal (6 exercices). 2) Non-renouvellement à l'issue du mandat. 3) Démission pour motif légitime (art. 28 code déontologie). 4) Récusation par le tribunal de commerce (art. L. 821-49). 5) Révocation pour juste motif par le tribunal de commerce sur demande de l'entité, d'un actionnaire, ou du ministère public. 6) Caducité anticipée pour atteinte de la durée maximale EIP. 7) Décès. Exception : le mandat peut être limité à 3 exercices pour les nominations volontaires ou dans les « petits groupes » (art. L. 821-46).",sr:"C. com., art. L. 821-44 à L. 821-49",kw:["6 exercices","terme","non-renouvellement","démission","motif légitime","récusation","tribunal de commerce","révocation","juste motif","caducité","EIP","3 exercices","volontaire","petits groupes"],tip:"Les 7 modes de cessation sont à connaître. La distinction démission (initiative CAC) et révocation (initiative tribunal) est essentielle."},
{id:"v7j2",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les différences entre la mission ALPE (NEP 911) et la mission PE (NEP 912) ?",a:"Mission ALPE (NEP 911) : 1) Mandat de 3 exercices. 2) Concerne les entités qui désignent un CAC volontairement ou dans le cadre des « petits groupes ». 3) Approche simplifiée adaptée à la taille. Mission PE (NEP 912) : 1) Mandat classique de 6 exercices. 2) Concerne les petites entreprises soumises à l'obligation légale de désigner un CAC. 3) Approche adaptée mais plus complète que l'ALPE. Points communs : les deux NEP adaptent la démarche d'audit à la taille et à la complexité de l'entité. Le barème d'heures de l'art. D. 821-188 ne s'applique pas à la mission ALPE.",sr:"NEP 911 / NEP 912 / C. com., art. L. 821-46",kw:["ALPE","3 exercices","volontaire","petits groupes","PE","6 exercices","obligation légale","adaptée","barème d'heures","ne s'applique pas"],tip:"La distinction ALPE (3 ans, volontaire) vs PE (6 ans, obligatoire) est fondamentale."},
{id:"v7j3",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les principales incompatibilités et interdictions applicables au CAC ?",a:"Les incompatibilités (art. L. 821-25 à L. 821-37 C. com.) incluent : 1) Interdiction de toute activité commerciale (art. L. 822-10). 2) Incompatibilité avec les fonctions de dirigeant, administrateur, salarié de l'entité auditée (et pendant 5 ans avant). 3) Interdiction de percevoir toute rémunération autre que les honoraires. 4) Pour les EIP : liste de services interdits (art. 5 du règlement UE 537/2014) : tenue de comptabilité, services fiscaux, services juridiques, services de paie, évaluation, conception de systèmes d'information financière. 5) Pour les non-EIP : approche risque/sauvegarde (art. 19 code déontologie). 6) Liens familiaux avec les dirigeants de l'entité.",sr:"C. com., art. L. 821-25 à L. 821-37 / Code déonto. art. 19 / Règl. UE 537/2014, art. 5",kw:["activité commerciale","interdite","dirigeant","salarié","5 ans","rémunération","EIP","services interdits","tenue","fiscaux","juridiques","paie","évaluation","non-EIP","risque/sauvegarde","liens familiaux"],tip:"La liste des services interdits EIP vs l'approche risque/sauvegarde non-EIP est une distinction fondamentale post-PACTE."},

// ── QRC pendants CAC Qualité ──

{id:"v7j4",p:"CAC",th:"Qualité",ty:"qrc",q:"Quels sont les objectifs et le contenu de la lettre de mission du CAC (NEP 210) ?",a:"La NEP 210 prévoit que la lettre de mission définit les termes et conditions de l'intervention. Elle contient : 1) La nature et l'étendue des missions (certification, vérifications spécifiques). 2) Les obligations respectives (CAC et entité). 3) Le rappel de l'obligation d'information du CAC par la direction. 4) Le budget d'honoraires et les conditions de facturation. 5) Le calendrier d'intervention. 6) Le recours éventuel à des experts ou collaborateurs. 7) Les conditions de renouvellement et de révocation. La lettre est établie pour la durée du mandat et peut faire l'objet d'avenants en cas de modification des conditions.",sr:"NEP 210 §06-10",kw:["lettre de mission","termes","conditions","nature","étendue","certification","obligations","information","honoraires","calendrier","experts","collaborateurs","renouvellement","avenants"],tip:"La lettre de mission CAC couvre toute la durée du mandat (6 ou 3 exercices). Elle est distincte de la lettre de mission EC (annuelle)."},
{id:"v7j5",p:"CAC",th:"Qualité",ty:"qrc",q:"Quels sont les trois stades d'utilisation des procédures analytiques dans l'audit et en quoi consistent-elles ?",a:"Les procédures analytiques (NEP 520) sont utilisées à 3 stades : 1) Planification (NEP 315) : elles aident le CAC à comprendre l'activité de l'entité et à identifier les risques d'anomalies significatives (comparaisons intersectorielles, tendances, ratios). 2) Contrôles de substance (NEP 330) : elles sont utilisées pour détecter les anomalies significatives au niveau des assertions. Le CAC détermine les montants attendus et les écarts acceptables. 3) Revue de la cohérence d'ensemble (NEP 520 §07) : en fin d'audit, le CAC vérifie la cohérence globale des comptes avec sa connaissance de l'entité. Si des variations inattendues sont identifiées, le CAC détermine les procédures complémentaires nécessaires.",sr:"NEP 520 §03-09 / NEP 315 / NEP 330",kw:["planification","risques","comparaisons","tendances","contrôles de substance","assertions","montants attendus","écarts","revue","cohérence d'ensemble","variations inattendues","complémentaires"],tip:"Les 3 stades sont distincts : prise de connaissance, détection, conclusion. C'est un fil rouge de l'audit."},
{id:"v7j6",p:"CAC",th:"Qualité",ty:"qrc",q:"La direction refuse de fournir au CAC les déclarations écrites demandées (NEP 580). Quelles sont les conséquences ?",a:"Le refus de la direction a les conséquences suivantes : 1) Le CAC considère ce refus comme une limitation à l'étendue de ses travaux. 2) Il s'entretient avec la direction pour comprendre les raisons du refus. 3) Il réévalue l'intégrité de la direction et l'incidence sur la fiabilité des autres déclarations et éléments probants. 4) Il en tire les conséquences sur son opinion : selon la gravité, il peut formuler une réserve pour limitation ou un refus de certifier pour impossibilité de mettre en œuvre les diligences estimées nécessaires. 5) Dans les cas les plus graves, il peut envisager de démissionner de son mandat si les conditions de poursuite de la mission ne sont plus réunies.",sr:"NEP 580 §14-16",kw:["refus","limitation","s'entretient","raisons","intégrité","fiabilité","opinion","réserve","refus de certifier","impossibilité","démissionner"],tip:"Le refus de la lettre d'affirmation est un signal d'alerte majeur sur l'intégrité de la direction."},
{id:"v7j7",p:"CAC",th:"Qualité",ty:"qrc",q:"Le CAC identifie une estimation comptable complexe avec un risque inhérent élevé (NEP 540). Quelles procédures d'audit peut-il mettre en œuvre ?",a:"Le CAC peut (NEP 540 §12-20) : 1) Évaluer la méthode utilisée par la direction et vérifier qu'elle est appropriée au regard du référentiel comptable. 2) Tester les données et hypothèses sous-jacentes utilisées par la direction. 3) Vérifier le fonctionnement des contrôles de l'entité relatifs aux estimations. 4) Développer sa propre estimation indépendante (point estimate) ou son propre intervalle pour évaluer le caractère raisonnable. 5) Recourir à un expert (NEP 620) pour évaluer la méthode ou les hypothèses. 6) Examiner les événements postérieurs à la clôture confirmant ou infirmant l'estimation. 7) Procéder à un examen rétrospectif du dénouement des estimations de l'exercice précédent.",sr:"NEP 540 §12-20",kw:["méthode","données","hypothèses","contrôles","estimation indépendante","point estimate","intervalle","expert","événements postérieurs","rétrospectif","dénouement"],tip:"Les 7 procédures sont alternatives ou cumulatives selon le niveau de risque. L'estimation indépendante est la plus puissante."},

// ── QRC pendants EC Exercice ──

{id:"v7j8",p:"EC",th:"Exercice",ty:"qrc",q:"Qui exerce la tutelle sur l'Ordre des EC et quel est le rôle du Commissaire du Gouvernement ?",a:"La tutelle est exercée par le ministre chargé de l'Économie (art. 56 ord. 1945). Le Commissaire du Gouvernement (art. 56-58) : 1) Est nommé par le ministre. 2) Assiste aux séances du conseil régional et du Conseil national, avec voix consultative. 3) Peut faire appel des décisions d'inscription ou de refus d'inscription au Tableau. 4) Peut saisir la chambre de discipline (pouvoir de poursuite disciplinaire). 5) Assiste aux audiences de la chambre de discipline mais n'assiste PAS au délibéré. 6) Peut déférer les décisions au Comité national du Tableau. 7) Veille au respect des lois et règlements par la profession.",sr:"Art. 56-58 ord. 1945",kw:["tutelle","ministre","Économie","Commissaire du Gouvernement","voix consultative","appel","inscription","saisir","discipline","audience","délibéré","déférer","Comité national"],tip:"Le Commissaire du Gouvernement est le bras armé de la tutelle. Il a un rôle de surveillance et de poursuite, mais ne participe pas au délibéré."},
{id:"v7j9",p:"EC",th:"Exercice",ty:"qrc",q:"L'EC peut-il exercer l'activité d'agent immobilier ? Justifiez.",a:"Non. L'activité d'agent immobilier est une activité commerciale à titre principal, incompatible avec la profession d'EC (art. 22 al. 5 ord. 1945). Les raisons sont : 1) L'agent immobilier est un intermédiaire commercial, ce qui est incompatible avec l'indépendance de l'EC. 2) L'activité de gestion immobilière implique le maniement de fonds de tiers, ce qui est restreint pour l'EC. 3) L'agent immobilier perçoit des commissions, or l'EC ne peut être rémunéré que par ses clients sous forme d'honoraires (art. 24 ord. 1945). En revanche, l'EC peut réaliser des missions de conseil en immobilier (évaluation, optimisation fiscale) dans le cadre de l'article 22.",sr:"Art. 22 al. 5, art. 24 ord. 1945 / DEC Mai 2023 Q5",kw:["agent immobilier","incompatible","activité commerciale","intermédiaire","indépendance","maniement de fonds","commissions","honoraires","conseil","évaluation"],tip:"Question tombée au DEC mai 2023. L'interdiction porte sur l'ACTIVITÉ d'agent immobilier, pas sur le conseil en immobilier."},

// ── QRC pendants EC Qualité ──

{id:"v7j10",p:"EC",th:"Qualité",ty:"qrc",q:"Selon la NPLAB, quels sont les quatre critères de classification des risques d'un cabinet d'EC en matière LBC-FT ?",a:"Les 4 critères de classification des risques (NPLAB §19) sont : 1) Les caractéristiques des clients : nature juridique, secteur d'activité, profil de risque (PPE, pays à risque, secteurs sensibles). 2) Les activités exercées par le cabinet : certaines missions génèrent plus de risques (ex : accompagnement de restructurations, création de sociétés). 3) La localisation géographique : zones à risque identifiées par le GAFI ou l'UE. 4) Les missions proposées : la nature des missions (comptable, juridique, fiscale) influence le niveau de risque. Ces critères permettent d'attribuer un niveau de vigilance (standard ou renforcée) à chaque relation d'affaires.",sr:"NPLAB §19 / DEC Mai 2021 Q1",kw:["classification","risques","caractéristiques","clients","activités","localisation géographique","missions","GAFI","UE","vigilance","standard","renforcée"],tip:"Question tombée au DEC mai 2021 (2 points). Les 4 critères sont à citer précisément."},
{id:"v7j11",p:"EC",th:"Qualité",ty:"qrc",q:"Décrivez les caractéristiques de la mission d'examen d'informations financières prévisionnelles (NP 3530).",a:"La NP 3530 encadre l'examen d'informations prévisionnelles (budgets, business plans, prévisionnels d'exploitation). Caractéristiques : 1) L'EC vérifie que les hypothèses retenues sont cohérentes et documentées. 2) Il s'assure que les informations prévisionnelles sont établies sur la base de ces hypothèses. 3) Il exprime une assurance modérée sur le caractère raisonnable des hypothèses. 4) Il ne se prononce PAS sur la réalisation effective des prévisions (ce sont des projections par nature incertaines). 5) Le rapport mentionne les hypothèses retenues et les réserves éventuelles. 6) Il attire l'attention sur le fait que les résultats réels pourront différer significativement des prévisions.",sr:"NP 3530 / Cadre de référence",kw:["informations prévisionnelles","budgets","business plans","hypothèses","cohérentes","documentées","assurance modérée","raisonnable","réalisation","incertaines","résultats réels","différer"],tip:"Le point clé est que l'EC ne garantit PAS la réalisation des prévisions. Il vérifie la cohérence des hypothèses."},

// ── QRC pendants EC Responsabilité ──

{id:"v7j12",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les sanctions disciplinaires spécifiques en matière LBC-FT applicables à l'EC et par qui sont-elles prononcées ?",a:"Art. 53 bis ord. 1945 : les sanctions spécifiques LBC-FT sont prononcées par la Commission nationale des sanctions en matière LBC-FT (distincte des chambres de discipline). Sanctions possibles : 1) Avertissement. 2) Blâme. 3) Interdiction temporaire d'exercice (3 ans max). 4) Radiation du Tableau. 5) Sanction pécuniaire (max 1 000 000 € pour une personne physique). Les sanctions peuvent être assorties d'une publication. La saisine est faite par le président du Conseil national ou le Commissaire du Gouvernement. TRACFIN peut signaler des manquements au Conseil supérieur.",sr:"Art. 53 bis ord. 1945 / Art. L. 561-36 CMF",kw:["LBC-FT","Commission nationale","sanctions","avertissement","blâme","interdiction","3 ans","radiation","sanction pécuniaire","1 000 000","publication","TRACFIN","signaler"],tip:"La Commission LBC-FT est distincte des chambres de discipline classiques. Les montants sont plus élevés (1M€ max)."},
{id:"v7j13",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les conséquences de l'avertissement du président de la chambre de discipline EC ? En quoi diffère-t-il des sanctions disciplinaires classiques ?",a:"L'avertissement du président (art. 53 al. 3 ord. 1945) : 1) N'est PAS une sanction disciplinaire — c'est une mesure d'avertissement préventive. 2) Il est prononcé par le président de la chambre régionale de discipline (et non par la chambre elle-même). 3) Il n'est pas inscrit au dossier disciplinaire. 4) Il ne peut pas faire l'objet d'un appel. 5) Il ne constitue pas un antécédent disciplinaire. Différence avec les sanctions disciplinaires (avertissement, blâme, suspension, radiation) : celles-ci sont prononcées par la chambre collégiale après audience contradictoire, sont inscrites au dossier, sont susceptibles d'appel et constituent des antécédents.",sr:"Art. 53 al. 3 ord. 1945",kw:["avertissement du président","pas une sanction","préventive","pas inscrit","dossier","pas d'appel","pas d'antécédent","chambre collégiale","audience contradictoire","susceptible d'appel"],tip:"Le piège est de confondre l'avertissement du président (mesure préventive) avec l'avertissement disciplinaire (sanction)."},

// ── QRC pendants CAC Responsabilité ──

{id:"v7j14",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les sanctions pénales spécifiques au CAC (art. L. 821-7 à L. 821-9 C. com.) ?",a:"Les infractions pénales spécifiques sont : 1) Art. L. 821-7 : usage illicite du titre de CAC ou exercice illégal — 1 an d'emprisonnement et 15 000 € d'amende. 2) Art. L. 821-8 : violation des incompatibilités (exercice de fonctions incompatibles), confirmation d'informations mensongères, non-révélation de faits délictueux au procureur — 5 ans d'emprisonnement et 75 000 € d'amende. 3) Art. L. 821-9 : non-respect du secret professionnel — 6 mois d'emprisonnement et 7 500 € d'amende. À noter : l'élément intentionnel est requis pour toutes ces infractions. La prescription est de 6 ans (délits).",sr:"C. com., art. L. 821-7 à L. 821-9",kw:["usage illicite","1 an","15 000","incompatibilités","mensongères","non-révélation","5 ans","75 000","secret professionnel","6 mois","7 500","intentionnel","6 ans","prescription"],tip:"Les 3 articles avec leurs peines sont à retenir. L'art. L. 821-8 est le plus sévère (5 ans/75k€)."},
{id:"v7j15",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Comment se déroule la procédure disciplinaire du CAC devant la Commission des sanctions de la H2A ?",a:"La procédure (art. L. 821-73 à L. 821-82 C. com.) : 1) Saisine du rapporteur général de la H2A par : le 1er président de la Cour des comptes, un président de chambre régionale, le procureur général, le président de l'AMF/ACPR/H2A, le président de la CNCC ou d'une CRCC (art. L. 821-73). Auto-saisine possible. 2) Enquête du rapporteur général (pouvoirs d'investigation : documents, auditions, accès aux locaux). 3) Notification des griefs à la personne poursuivie. 4) Convocation devant la Commission des sanctions (1 mois minimum avant l'audience, 2 mois minimum après notification des griefs). 5) Audience publique (huis clos possible sur demande du CAC). 6) Délibération hors présence des parties et du rapporteur général. 7) Décision motivée (sanction ou relaxe).",sr:"C. com., art. L. 821-73 à L. 821-82 / Fiche CNCC n°4",kw:["rapporteur général","saisine","1er président","Cour des comptes","CRCC","CNCC","AMF","ACPR","enquête","pouvoirs","griefs","Commission des sanctions","1 mois","2 mois","audience publique","huis clos","délibération","motivée"],tip:"Les 7 étapes sont analogues à la procédure EC mais avec des acteurs différents (H2A au lieu de l'Ordre). Les pouvoirs d'enquête du rapporteur sont très étendus."},
