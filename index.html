// ── DEC Mai 2022 — Questions non couvertes ──

{id:"v7c1",p:"EC",th:"Déontologie",ty:"qcm",q:"Un maire et un député peuvent-ils être qualifiés de personnes politiquement exposées (PPE) en matière LBC-FT ?",ch:["Oui, les deux","Non, aucun des deux","Oui, uniquement le député","Non, uniquement les chefs d'État et de gouvernement"],a:0,ex:"Art. L. 561-10 CMF et NPLAB : les PPE incluent les personnes exerçant des fonctions politiques (parlementaires, maires, etc.) et leurs proches.",sr:"Art. L. 561-10 CMF / NPLAB / DEC Mai 2022 Q1"},
{id:"v7c2",p:"EC",th:"Déontologie",ty:"qcm",q:"Lors de la reprise d'un dossier par un confrère, l'EC sortant est-il délié du secret professionnel vis-à-vis de son confrère successeur ?",ch:["Oui, automatiquement","Non, le secret professionnel subsiste","Oui, si le client l'autorise par écrit","Oui, uniquement pour les informations fiscales"],a:1,ex:"Le secret professionnel subsiste vis-à-vis du confrère successeur. C'est au client de transmettre les informations ou d'autoriser expressément la communication.",sr:"Art. 21 ord. 1945 / Secret professionnel 2021 / DEC Mai 2022 Q4"},
{id:"v7c3",p:"EC",th:"Déontologie",ty:"qcm",q:"L'EC sortant doit-il informer son confrère successeur qu'il a effectué une déclaration de soupçon auprès de TRACFIN ?",ch:["Oui, c'est obligatoire","Non, la confidentialité de la déclaration est absolue","Oui, si le client l'autorise","Oui, dans le cadre du « secret partagé »"],a:1,ex:"Art. L. 574-1 CMF : la révélation de l'existence ou du contenu d'une déclaration de soupçon est un délit pénal. La confidentialité est absolue, même vis-à-vis du successeur.",sr:"Art. L. 574-1 CMF / DEC Mai 2022 Q5"},
{id:"v7c4",p:"EC",th:"Responsabilité",ty:"qcm",q:"Une sanction disciplinaire peut-elle être prononcée contre un EC pour non-paiement de ses cotisations à la CAVEC ?",ch:["Non, la CAVEC n'est pas un organisme ordinal","Oui, le non-paiement des cotisations professionnelles constitue un manquement disciplinaire","Non, seule une procédure civile est possible","Oui, mais uniquement un avertissement"],a:1,ex:"Le non-paiement des cotisations (y compris CAVEC) constitue un manquement aux obligations professionnelles pouvant justifier une sanction disciplinaire.",sr:"DEC Mai 2022 Q6 / CNOEC 2025"},
{id:"v7c5",p:"EC",th:"Déontologie",ty:"qrc",q:"Citez trois situations qui obligent l'expert-comptable à mettre à jour la lettre de mission de son client.",a:"Les situations obligeant une mise à jour sont notamment : 1) Changement dans la nature, l'étendue ou les conditions de la mission (ex : ajout d'une mission sociale, passage à une mission de présentation). 2) Modification de la structure juridique du client (transformation, fusion, scission). 3) Changement de dirigeant ou de représentant légal du client. 4) Modification des honoraires ou des conditions financières. 5) Évolution réglementaire impactant la mission (ex : nouveau référentiel comptable). 6) Changement dans la structure du cabinet (fusion de cabinets, changement de responsable de mission).",sr:"Art. 151 décret 2012-432 / DEC Mai 2022 Q10",kw:["nature","étendue","mission","structure juridique","dirigeant","honoraires","conditions","réglementaire","cabinet","responsable"],tip:"Question tombée au DEC mai 2022. Citez 3 situations concrètes et distinctes."},
{id:"v7c6",p:"CAC",th:"Exercice",ty:"qcm",q:"Un CAC peut-il déléguer ses mandats à un autre CAC pour mener les missions de certification, en ne conservant que la signature des rapports ?",ch:["Oui, c'est la pratique courante","Non, le CAC ne peut pas déléguer ses pouvoirs ni la responsabilité de sa mission","Oui, avec l'accord du client","Oui, si les deux CAC sont dans le même réseau"],a:1,ex:"Art. 10 code déontologie / Art. L. 821-60 C. com. : le CAC peut se faire assister mais ne peut déléguer ni ses pouvoirs ni la responsabilité de sa mission.",sr:"Code déonto. CAC, art. 10 / DEC Mai 2022 Q11"},
{id:"v7c7",p:"CAC",th:"Qualité",ty:"qcm",q:"L'article 31 du code de déontologie (rotation EIP) mentionne trois catégories de personnes exerçant des fonctions sensibles au sein de l'entité auditée. Laquelle n'en fait PAS partie ?",ch:["Les personnes en charge de la direction financière","Les personnes en charge de l'élaboration des comptes","Les personnes exerçant un pouvoir de décision en matière comptable","Les membres du comité d'audit"],a:3,ex:"Art. 31 : les fonctions sensibles sont celles en charge de la direction financière, de l'élaboration des comptes, ou exerçant un pouvoir de décision en matière comptable. Les membres du comité d'audit ne sont pas mentionnés dans cette liste.",sr:"Code déontologie CAC, art. 31 / DEC Mai 2022 Q15"},
{id:"v7c8",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les trois conditions qui doivent être réunies pour engager la responsabilité pénale d'un CAC ?",a:"Les trois conditions cumulatives sont : 1) Un élément légal : un texte d'incrimination (art. L. 821-7 à L. 821-9 C. com.). 2) Un élément matériel : l'acte prohibé (usage illicite du titre, violation des incompatibilités, confirmation d'informations mensongères, non-révélation de faits délictueux). 3) Un élément intentionnel (ou moral) : la conscience de commettre l'infraction. Les juges ont parfois tendance à présumer l'élément intentionnel en raison de la qualité professionnelle du CAC.",sr:"C. com., art. L. 821-7 à L. 821-9 / DEC Mai 2022 Q16",kw:["élément légal","texte","incrimination","élément matériel","acte prohibé","élément intentionnel","moral","conscience","présumer","qualité professionnelle"],tip:"Question tombée au DEC mai 2022. Les 3 éléments classiques du droit pénal appliqués au CAC. Le piège : oublier l'élément intentionnel."},

// ── DEC Mai 2023 — Questions non couvertes (QCM) ──

{id:"v7c9",p:"EC",th:"Déontologie",ty:"qcm",q:"Au sein d'un cabinet d'EC, la condition pour pouvoir réaliser une consultation juridique est :",ch:["Il n'y a pas de condition à respecter","Le cabinet doit obligatoirement et exclusivement assurer préalablement une mission d'ordre comptable","Le cabinet doit assurer une mission comptable ou d'accompagnement déclaratif/administratif permanent ou habituel, ou les consultations doivent être directement liées aux travaux comptables","Il n'est pas possible de réaliser des consultations juridiques, elles sont réservées aux avocats"],a:2,ex:"Art. 22 al. 8 et 10 ord. 1945 : consultations juridiques autorisées si accessoires d'une mission comptable permanente/habituelle OU directement liées aux travaux comptables.",sr:"Art. 22 al. 8 et 10 ord. 1945 / DEC Mai 2023 Q9"},
{id:"v7c10",p:"EC",th:"Exercice",ty:"qcm",q:"Le taux d'encadrement en expertise comptable est de :",ch:["1 EC pour 15 collaborateurs, quelles que soient leurs missions","1 EC pour 15 collaborateurs effectuant des missions comptables","1 EC pour 10 collaborateurs, quelles que soient leurs missions","1 EC pour 10 collaborateurs effectuant des missions comptables"],a:0,ex:"Art. 19 ord. 1945 : 15 salariés comptables par professionnel inscrit. Ce ratio s'applique à tous les collaborateurs comptables, quelle que soit la mission.",sr:"Art. 19 ord. 1945 / DEC Mai 2023 Q10"},
{id:"v7c11",p:"CAC",th:"Exercice",ty:"qcm",q:"Pour s'inscrire sur la liste des CAC, le candidat doit s'adresser à :",ch:["Un tribunal de commerce","La Compagnie nationale des CAC","Une Compagnie régionale des CAC","La H2A"],a:3,ex:"Depuis la réforme, la H2A (anciennement H3C) est compétente pour l'inscription sur la liste des CAC.",sr:"C. com., art. L. 821-13 / DEC Mai 2023 Q11"},
{id:"v7c12",p:"CAC",th:"Déontologie",ty:"qcm",q:"Dans le code de déontologie CAC, la suppression de la liste des services interdits (pour les non-EIP) a été remplacée par :",ch:["Une modification de l'article sur la confraternité","La suppression de la notion d'intérêt général","Une modification de l'article sur l'impartialité","Une approche risque-sauvegarde"],a:3,ex:"Pour les non-EIP, la liste des services interdits a été remplacée par l'approche risque/sauvegarde (art. 19 code déonto.) : identifier les risques sur l'indépendance et mettre en place des mesures de sauvegarde.",sr:"Code déontologie CAC, art. 19 / DEC Mai 2023 Q12"},
{id:"v7c13",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC d'une société cotée sur un marché réglementé est exempté de :",ch:["Déclaration de soupçon à TRACFIN","Révélation des faits délictueux","Identification du bénéficiaire effectif","Identification du client"],a:2,ex:"Art. L. 561-9 II CMF : exemption de l'obligation d'identification du bénéficiaire effectif pour les sociétés cotées sur un marché réglementé (présomption de transparence).",sr:"Art. L. 561-9 II CMF / DEC Mai 2023 Q13"},

// ── DEC Nov 2021 — Questions non couvertes ──

{id:"v7c14",p:"CAC",th:"Exercice",ty:"qcm",q:"La continuité d'exploitation est appréciée par le CAC sur une période de :",ch:["6 mois à compter de la date du rapport","12 mois à compter de la clôture de l'exercice","24 mois à compter de la clôture","La durée du mandat"],a:1,ex:"NEP 570 §5 : la continuité d'exploitation est appréciée sur une période de 12 mois à compter de la clôture de l'exercice.",sr:"NEP 570, §5"},
{id:"v7c15",p:"CAC",th:"Qualité",ty:"qcm",q:"Le rapport du CAC doit-il mentionner les justifications des appréciations pour les entités non-EIP ?",ch:["Non, uniquement pour les EIP","Oui, mais de manière simplifiée (NEP 702)","Oui, de manière détaillée (NEP 701)","C'est au choix du CAC"],a:1,ex:"NEP 702 : les non-EIP font l'objet de justifications des appréciations simplifiées. Les EIP sont soumises à la NEP 701 (Key Audit Matters).",sr:"NEP 701 et NEP 702"},

// ── H2A FAQ — Questions non couvertes ──

{id:"v7c16",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC d'une SA peut-il être rémunéré pour une prestation de conseil en recrutement du directeur financier de l'entité auditée ?",ch:["Oui, c'est une prestation autorisée","Non, c'est un service interdit car il y a risque d'autorévision","Oui, si le comité d'audit l'autorise","Non, sauf si l'entité n'est pas une EIP"],a:1,ex:"Le recrutement d'un directeur financier crée un risque d'autorévision (le CAC serait amené à auditer des comptes préparés par une personne qu'il a contribué à recruter).",sr:"Code déonto. CAC, art. 5 / H2A FAQ"},

// ── Code de déontologie 2026 — Nouveautés ──

{id:"v7c17",p:"EC",th:"Déontologie",ty:"qcm",q:"Le code de déontologie des EC est constitué des articles :",ch:["1 à 50 du décret 2012-432","141 à 169 du décret 2012-432","200 à 250 du décret 2012-432","100 à 140 du décret 2012-432"],a:1,ex:"Le code de déontologie constitue le chapitre II du titre III du décret 2012-432 (articles 141 à 169).",sr:"Décret 2012-432, art. 141 à 169"},
{id:"v7c18",p:"EC",th:"Déontologie",ty:"qcm",q:"L'article 155 du code de déontologie EC porte sur :",ch:["Le secret professionnel","L'indépendance","Le devoir de conseil","La lettre de mission"],a:2,ex:"Art. 155 : devoir d'information et de conseil. L'EC informe son client de ses obligations et formule recommandations et mises en garde.",sr:"Art. 155 décret 2012-432"},
{id:"v7c19",p:"EC",th:"Déontologie",ty:"qcm",q:"Le décret n°2025-506 du 10 juin 2025 a modifié l'article 161 du code de déontologie EC. La principale modification porte sur :",ch:["La suppression de la conciliation obligatoire","Le renforcement de la conciliation avec délais précis (2 mois pour engager, 4 mois pour conclure)","La suppression de l'arbitrage","Le transfert de la conciliation au tribunal de commerce"],a:1,ex:"Décret 2025-506 : la conciliation entre EC est renforcée avec des délais obligatoires (2 mois pour engager, 4 mois pour mener à terme), sous peine d'irrecevabilité de la plainte.",sr:"Art. 161 décret 2012-432 modifié par décret 2025-506"},

// ── Compléments thématiques restants ──

{id:"v7c20",p:"CAC",th:"Qualité",ty:"qcm",q:"Le CAC qui utilise les travaux d'un expert-comptable intervenant dans l'entité contrôlée applique la norme :",ch:["NEP 610","NEP 620","NEP 630","NEP 700"],a:2,ex:"NEP 630 : utilisation des travaux d'un expert-comptable intervenant dans l'entité. Le CAC apprécie si ces travaux peuvent contribuer à la formation de son opinion.",sr:"NEP 630"},
{id:"v7c21",p:"CAC",th:"Qualité",ty:"qcm",q:"La NEP relative à l'intervention d'un expert désigné par le CAC pour l'assister dans ses travaux est la :",ch:["NEP 610","NEP 620","NEP 630","NEP 540"],a:1,ex:"NEP 620 : intervention d'un expert. Le CAC évalue la compétence et l'objectivité de l'expert et utilise ses travaux comme éléments probants.",sr:"NEP 620"},
{id:"v7c22",p:"CAC",th:"Qualité",ty:"qcm",q:"La NEP relative à la prise en connaissance et l'utilisation des travaux de l'audit interne est la :",ch:["NEP 600","NEP 610","NEP 620","NEP 630"],a:1,ex:"NEP 610 : le CAC détermine si les travaux de l'audit interne peuvent être utilisés et évalue leur qualité et leur fiabilité.",sr:"NEP 610"},
{id:"v7c23",p:"EC",th:"Déontologie",ty:"qcm",q:"Le montant du plafond des cadeaux que le CAC peut solliciter ou accepter est fixé par :",ch:["Le code de déontologie directement","Un arrêté du ministre de la Justice","Le règlement intérieur de la CNCC","La H2A"],a:1,ex:"Art. 14 code déontologie CAC : il est interdit de solliciter ou accepter des cadeaux sauf si la valeur n'excède pas un plafond fixé par arrêté du ministre de la Justice.",sr:"Code déontologie CAC, art. 14"},
{id:"v7c24",p:"CAC",th:"Exercice",ty:"qcm",q:"La NEP applicable à la mission ALPE (audit légal des petites entreprises nommé pour 3 exercices) est la :",ch:["NEP 911","NEP 912","NEP 200","NEP 300"],a:0,ex:"NEP 911 : mission ALPE (3 exercices). La NEP 912 concerne la mission PE (petites entreprises, 6 exercices).",sr:"NEP 911 / NEP 912"},
{id:"v7c25",p:"CAC",th:"Exercice",ty:"qcm",q:"La NEP applicable à la mission de certification des comptes des petites entreprises nommées pour 6 exercices est la :",ch:["NEP 911","NEP 912","NEP 200","NEP 700"],a:1,ex:"NEP 912 : mission PE (petites entreprises nommées pour 6 exercices). Adaptée à la taille et à la complexité de l'entité.",sr:"NEP 912"},

// ── DEC Nov 2024 — Questions EC non encore couvertes ──

{id:"v7d1",p:"EC",th:"Exercice",ty:"qcm",q:"Un expert-comptable peut-il recourir au statut d'entrepreneur individuel (EI) créé par la loi n°2022-172 ?",ch:["Non, c'est incompatible avec la profession","Oui, il bénéficie de la séparation automatique des patrimoines","Oui, mais uniquement sous le statut de micro-entrepreneur","Non, sauf autorisation du conseil régional"],a:1,ex:"La loi du 14 février 2022 permet à tout EC d'exercer sous le statut d'EI avec séparation automatique patrimoine personnel/professionnel. Le statut de micro-entrepreneur est en revanche incompatible.",sr:"Loi 2022-172 / CNOEC 2025 / DEC Nov 2024 Q1"},
{id:"v7d2",p:"EC",th:"Responsabilité",ty:"qcm",q:"Un EC stagiaire est sanctionné par :",ch:["Le tribunal judiciaire","La chambre de discipline et/ou le conseil régional de l'Ordre","La H2A","Le comité national du Tableau uniquement"],a:1,ex:"Art. 4 ord. 1945 / art. 76 décret 2012-432 : l'EC stagiaire est soumis au contrôle disciplinaire de l'Ordre. Les chambres de discipline et le conseil régional sont compétents.",sr:"Art. 4 ord. 1945 / Art. 76 décret 2012-432 / DEC Nov 2024 Q2"},
{id:"v7d3",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les conditions nécessaires pour qu'une personne physique puisse solliciter son inscription au Tableau de l'Ordre des EC ?",a:"Les conditions d'inscription (art. 3-II ord. 1945) sont : 1) Jouissance des droits civils. 2) Absence de condamnation criminelle ou correctionnelle de nature à entacher l'honorabilité de la profession. 3) Être titulaire du diplôme d'expertise comptable (DEC) ou d'un titre reconnu équivalent. 4) Présenter les garanties de moralité jugées nécessaires par le conseil régional. La condition de nationalité a été supprimée en 2010.",sr:"Art. 3-II ord. 1945 / DEC Nov 2024 Q3",kw:["droits civils","condamnation","honorabilité","DEC","diplôme","moralité","conseil régional","nationalité","supprimée","2010"],tip:"Question tombée au DEC nov 2024. N'oubliez pas que la condition de nationalité a été supprimée."},
{id:"v7d4",p:"EC",th:"Responsabilité",ty:"qrc",q:"Citez quatre personnes pouvant interjeter appel d'une décision de la chambre régionale de discipline de l'Ordre des EC.",a:"Peuvent faire appel (art. 53 et 189 décret 2012-432) : 1) L'intéressé (le professionnel sanctionné). 2) Le Commissaire du Gouvernement. 3) L'auteur de la plainte. 4) Le président du conseil régional concerné. L'appel est porté devant la chambre nationale de discipline. Le délai d'appel et l'appel sont suspensifs.",sr:"Art. 53 ord. 1945 / Art. 189 décret 2012-432 / DEC Nov 2024 Q4",kw:["intéressé","Commissaire du Gouvernement","auteur","plainte","président","conseil régional","chambre nationale","suspensif"],tip:"Question tombée au DEC nov 2024. 4 personnes sont habilitées. L'effet suspensif de l'appel est un point important à mentionner."},
{id:"v7d5",p:"EC",th:"Déontologie",ty:"qcm",q:"Un EC souhaite publier sur un réseau social : « Votre EC ne vous donne pas satisfaction — contactez-nous ». Est-ce possible ?",ch:["Oui, la communication est libre","Non, c'est une allégation dénigrant un confrère, contraire à l'art. 152 et 161","Oui, si c'est factuel","Non, sauf si le post est sponsorisé"],a:1,ex:"Art. 152 : la communication doit être exempte de tout élément comparatif ou dénigrant. Art. 161 : obligation de loyauté envers les confrères. Ce post dénigre implicitement les confrères.",sr:"Art. 152 et 161 décret 2012-432 / DEC Nov 2024 Q6"},
{id:"v7d6",p:"EC",th:"Déontologie",ty:"qrc",q:"Dans quels cas la lettre prévue à l'article 163 du code de déontologie (confraternité lors de la succession) n'est-elle PAS obligatoire ?",a:"La lettre de l'article 163 (informer le prédécesseur de sa nomination et s'assurer du règlement de ses honoraires) n'est pas obligatoire lorsque : 1) Le client change d'EC de sa propre initiative sans que le successeur ait fait de démarche auprès de lui. 2) L'ancien EC a été radié du Tableau. 3) L'ancien EC est décédé sans qu'un remplaçant ait été désigné. Dans les cas de changement à l'initiative du client, le successeur est néanmoins tenu de vérifier le règlement des honoraires du prédécesseur.",sr:"Art. 163 et 164 décret 2012-432 / DEC Nov 2024 Q7",kw:["article 163","prédécesseur","nomination","honoraires","initiative du client","radié","décédé","successeur","vérifier"],tip:"Question tombée au DEC nov 2024. L'erreur classique est de croire que l'obligation est absolue dans tous les cas."},
{id:"v7d7",p:"EC",th:"Exercice",ty:"qrc",q:"Quel est le rôle du Conseil national de l'Ordre des EC auprès de la profession ?",a:"Le Conseil national (art. 1, 29 et 37 ord. 1945) a pour missions : 1) Assurer la défense de l'honneur et de l'indépendance de la profession. 2) Présenter aux pouvoirs publics toute demande relative à la profession. 3) Exercer tous les droits réservés à la partie civile (constitution de partie civile, citation directe). 4) Établir le règlement intérieur (art. 60). 5) Fixer le barème des cotisations d'assurance (art. 140). 6) Coordonner l'action des conseils régionaux. 7) Assurer le secrétariat des instances nationales (chambre nationale de discipline, comité national du Tableau).",sr:"Art. 1, 29, 37, 60 ord. 1945 / DEC Nov 2024 Q8",kw:["honneur","indépendance","pouvoirs publics","partie civile","règlement intérieur","cotisations","assurance","coordonner","conseils régionaux","chambre nationale","comité national"],tip:"Question tombée au DEC nov 2024. Structurez en listant les 7 missions principales du CN."},
{id:"v7d8",p:"EC",th:"Qualité",ty:"qcm",q:"La mission de mise en état des comptes de campagne électorale (art. L.52-12 Code électoral) relève de :",ch:["La prérogative d'exercice exclusive (art. 2 ord. 1945)","Une mission légale spécifique","Une mission d'attestation particulière (NP 3100)","Une mission de procédures convenues (NP 4400)"],a:2,ex:"La mise en état des comptes de campagne est une mission d'attestation particulière (NP 3100) : l'EC met le compte en état d'examen et s'assure de la présence des pièces justificatives.",sr:"Art. L.52-12 Code électoral / NP 3100 / DEC Nov 2024 Q9"},
{id:"v7d9",p:"EC",th:"Déontologie",ty:"qcm",q:"Les honoraires entre un EC et son client sont-ils soumis à un barème ?",ch:["Oui, un barème indicatif est fixé par le conseil régional","Oui, un barème obligatoire est fixé par le Conseil national","Non, les honoraires sont fixés librement (art. 158)","Oui, un barème est fixé par arrêté ministériel"],a:2,ex:"Art. 158 décret 2012-432 : les honoraires sont fixés librement en fonction de l'importance des diligences, de la difficulté des cas, des frais exposés et de la notoriété. Aucun barème n'est fixé.",sr:"Art. 158 décret 2012-432 / DEC Nov 2024 Q10"},

// ── DEC Nov 2024 CAC — Questions supplémentaires identifiées ──

{id:"v7d10",p:"CAC",th:"Exercice",ty:"qcm",q:"Le barème d'heures figurant à l'article D.821-188 du code de commerce est-il applicable à la mission ALPE (art. L.821-46) ?",ch:["Oui, le même barème s'applique","Non, le barème est spécifique à la mission de certification classique","Oui, mais avec une réduction de 50%","Non, la mission ALPE n'a pas de barème d'heures"],a:1,ex:"Le barème d'heures de l'art. D.821-188 ne s'applique qu'à la mission de certification des comptes annuels classique. La mission ALPE (3 exercices) a ses propres modalités.",sr:"C. com., art. D.821-188 / NEP 911 / DEC Nov 2024 Q11"},
{id:"v7d11",p:"CAC",th:"Exercice",ty:"qcm",q:"En cas de doute sur son appartenance à un réseau national ou international, le CAC doit saisir :",ch:["Le président de la CRCC","Le président de la CNCC","La H2A","Le tribunal de commerce"],a:2,ex:"En cas de doute sur l'appartenance à un réseau, le CAC saisit la H2A qui est compétente pour apprécier cette situation au regard des critères de l'article 29 du code de déontologie.",sr:"Code déonto. CAC, art. 29 / DEC Nov 2024 Q14"},
{id:"v7d12",p:"CAC",th:"Exercice",ty:"qcm",q:"La nature de l'assurance formulée par le CAC dans le cadre de la certification des informations en matière de durabilité (CSRD) est :",ch:["Une assurance raisonnable","Une assurance modérée (limitée)","Aucune assurance","Une assurance absolue"],a:1,ex:"Dans la phase initiale de la CSRD, la certification des informations de durabilité porte sur une assurance modérée (limitée). L'évolution vers une assurance raisonnable est prévue ultérieurement.",sr:"Ord. 2023-1142 / CSRD / DEC Nov 2024 Q16"},

// ── DEC Nov 2021 — Questions EC non encore couvertes ──

{id:"v7d13",p:"EC",th:"Déontologie",ty:"qrc",q:"Quels sont les cas dans lesquels l'EC peut être délié du secret professionnel lors d'une procédure judiciaire ?",a:"L'EC est délié du secret professionnel (art. 21 al. 4 ord. 1945) : 1) En cas d'information ouverte contre lui (mise en examen). 2) En cas de poursuites engagées à son encontre par les pouvoirs publics. 3) Dans les actions intentées devant les chambres de discipline de l'Ordre. Dans ces 3 cas, l'EC peut utiliser des éléments couverts par le secret pour assurer sa défense. En dehors de ces cas, le secret professionnel reste absolu.",sr:"Art. 21 al. 4 ord. 1945 / Secret professionnel 2021",kw:["information ouverte","mise en examen","poursuites","pouvoirs publics","chambres de discipline","défense","absolu","article 21"],tip:"3 cas de levée pour la défense personnelle. Ne confondez pas avec les cas de levée légale (TRACFIN, etc.) qui sont des obligations et non des droits de défense."},

// ── Tableau des infractions au droit des sociétés ──

{id:"v7d14",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La distribution de dividendes fictifs dans une SARL est punie de :",ch:["9 000 € d'amende","5 ans d'emprisonnement et 375 000 € d'amende","6 mois d'emprisonnement et 7 500 € d'amende","2 ans d'emprisonnement et 30 000 € d'amende"],a:1,ex:"Art. L. 241-3, 2° C. com. : distribution de dividendes fictifs = 5 ans et 375 000 €. Même sanction pour les SA (art. L. 242-6, 1°).",sr:"C. com., art. L. 241-3 / Tableau infractions CNCC"},
{id:"v7d15",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La présentation de comptes annuels ne donnant pas une image fidèle dans une SARL est punie de :",ch:["9 000 € d'amende","5 ans d'emprisonnement et 375 000 € d'amende","3 ans d'emprisonnement et 45 000 € d'amende","1 an d'emprisonnement et 15 000 € d'amende"],a:1,ex:"Art. L. 241-3, 3° C. com. : présentation de comptes ne donnant pas une image fidèle = 5 ans et 375 000 €.",sr:"C. com., art. L. 241-3 / Tableau infractions CNCC"},
{id:"v7d16",p:"CAC",th:"Responsabilité",ty:"qcm",q:"L'abus de biens sociaux dans une SARL est puni de :",ch:["3 ans d'emprisonnement et 45 000 €","5 ans d'emprisonnement et 375 000 €","1 an d'emprisonnement et 15 000 €","10 ans d'emprisonnement et 750 000 €"],a:1,ex:"Art. L. 241-3, 4° C. com. : abus de biens ou de crédit sociaux = 5 ans et 375 000 €.",sr:"C. com., art. L. 241-3 / Tableau infractions CNCC"},

// ── LBC-FT — Points non encore couverts ──

{id:"v7d17",p:"EC",th:"Qualité",ty:"qcm",q:"Le gel des avoirs est un dispositif complémentaire du LBC-FT. L'EC doit vérifier si son client figure sur :",ch:["La liste des EIP","La liste des personnes et entités sanctionnées (site gels-avoirs.dgtresor.gouv.fr)","La liste des bénéficiaires effectifs au RBE","La liste des PPE"],a:1,ex:"L'EC doit passer au crible ses clients sur le site gels-avoirs.dgtresor.gouv.fr pour s'assurer qu'il ne contracte pas avec des personnes ou entités sanctionnées (ONU, UE, France).",sr:"CNOEC Exercice professionnel 2025, LBC-FT / NPLAB"},
{id:"v7d18",p:"EC",th:"Qualité",ty:"qcm",q:"Le « secret partagé » en matière LBC-FT permet aux EC de partager l'existence d'une déclaration de soupçon avec :",ch:["Tout confrère EC","Les membres d'un même réseau ou structure d'exercice, ou ceux ayant connaissance d'une même opération pour un même client","Les clients concernés par la déclaration","Les autorités fiscales"],a:1,ex:"Art. L. 561-21 CMF : le secret partagé ne s'applique qu'au sein d'un même réseau/structure ou entre professionnels ayant connaissance d'une même opération pour le même client.",sr:"Art. L. 561-21 CMF / Secret professionnel 2021"},

// ── NI II compléments — Continuité d'exploitation / Alerte ──

{id:"v7d19",p:"CAC",th:"Qualité",ty:"qrc",q:"Le CAC qui estime que la continuité d'exploitation est assurée mais qu'il existe une incertitude significative doit-il modifier son opinion ?",a:"Non, le CAC ne modifie pas son opinion si les comptes donnent une information adéquate dans l'annexe sur l'incertitude. Il formule un paragraphe d'observation (ou de « going concern ») dans son rapport pour attirer l'attention sur la note d'annexe. Si l'annexe ne donne pas une information adéquate, le CAC en tire les conséquences sur son opinion (réserve ou refus).",sr:"NEP 570, §13-15",kw:["continuité","incertitude significative","opinion","paragraphe","observation","annexe","information adéquate","réserve","refus"],tip:"Le piège est de croire que toute incertitude conduit à une réserve. Si l'info en annexe est adéquate, l'opinion n'est pas modifiée — c'est une observation."},

// ── Compléments transversaux — dernières lacunes identifiées ──

{id:"v7d20",p:"EC",th:"Exercice",ty:"qcm",q:"Le Conseil national de l'Ordre des EC est composé :",ch:["Uniquement de membres élus au suffrage direct","Des présidents des conseils régionaux et de membres élus","De membres nommés par le ministre de l'Économie","De représentants des syndicats de la profession"],a:1,ex:"Art. 33 ord. 1945 : le CN est composé des présidents des conseils régionaux (membres de droit) et de membres élus au scrutin secret de liste.",sr:"Art. 33 ord. 1945"},
{id:"v7d21",p:"CAC",th:"Qualité",ty:"qcm",q:"Le rapport de transparence est obligatoire pour les CAC certifiant les comptes :",ch:["De toute entité","Des EIP uniquement","Des entités de plus de 50 salariés","Des sociétés cotées uniquement"],a:1,ex:"Art. L. 821-5 C. com. / Règlement UE 537/2014 : le rapport de transparence est obligatoire pour les CAC qui certifient les comptes d'au moins une EIP.",sr:"C. com., art. L. 821-5 / Règlement UE 537/2014, art. 13"},
{id:"v7d22",p:"EC",th:"Déontologie",ty:"qcm",q:"L'EC soupçonnant son client d'abus de biens sociaux peut-il le dénoncer au procureur de la République ?",ch:["Oui, c'est une obligation légale","Non, il violerait le secret professionnel — seule la déclaration TRACFIN est possible","Oui, avec l'accord du client","Non, il doit en informer le conseil régional"],a:1,ex:"Contrairement au CAC, l'EC n'a pas d'obligation de révélation au procureur. Il est tenu au secret professionnel (art. 21 ord. 1945). Seule la déclaration à TRACFIN est possible si soupçon de blanchiment.",sr:"Art. 21 ord. 1945 / Secret professionnel 2021"},
{id:"v7d23",p:"CAC",th:"Qualité",ty:"qcm",q:"Les NEP relatives aux « autres vérifications » annuelles du CAC comprennent :",ch:["NEP 9510 et NEP 9520","NEP 700 et NEP 701","NEP 200 et NEP 300","NEP 911 et NEP 912"],a:0,ex:"NEP 9510 : vérifications spécifiques (rapport de gestion, gouvernement d'entreprise). NEP 9520 : vérification de la présentation des comptes selon le format ESEF.",sr:"NEP 9510 / NEP 9520"},
{id:"v7d24",p:"EC",th:"Exercice",ty:"qcm",q:"La mission de commissariat aux apports lors d'une transformation de SARL en SA est confiée :",ch:["À l'expert-comptable de la société","Au commissaire aux comptes de la société","À un commissaire à la transformation désigné par le tribunal","À un commissaire aux apports désigné à l'unanimité des associés ou par le tribunal"],a:3,ex:"Art. L. 224-3 C. com. : un commissaire aux apports (ou commissaire à la transformation) est désigné par décision unanime des associés ou, à défaut, par le président du tribunal.",sr:"C. com., art. L. 224-3"},
{id:"v7d25",p:"CAC",th:"Déontologie",ty:"qcm",q:"Le CAC qui intervient dans une prestation (hors mission légale) est-il soumis au code de déontologie ?",ch:["Non, le code ne s'applique qu'aux missions légales","Oui, le Titre I (socle commun) s'applique à toutes les missions et prestations","Oui, mais uniquement aux principes d'indépendance","Non, sauf pour les EIP"],a:1,ex:"Le Titre I du code de déontologie constitue un socle commun applicable à tous les CAC, quelle que soit la nature de leur mission ou prestation.",sr:"Code déontologie CAC, Titre I / Fiche CNCC n°7"},

// ── DEC Mai 2021 EC — Questions non couvertes ──

{id:"v7e1",p:"EC",th:"Qualité",ty:"qcm",q:"La NPLAB prévoit la classification des risques d'un cabinet d'EC selon au moins quatre critères. Lequel n'en fait PAS partie ?",ch:["Caractéristiques des clients","Activités exercées","Localisation géographique","Chiffre d'affaires du cabinet"],a:3,ex:"NPLAB §19 : les 4 critères sont les caractéristiques des clients, les activités, la localisation géographique et les missions proposées. Le CA du cabinet n'en fait pas partie.",sr:"NPLAB §19 / DEC Mai 2021 Q1"},
{id:"v7e2",p:"EC",th:"Qualité",ty:"qcm",q:"Les deux niveaux d'assurance que peut émettre l'EC dans une mission d'attestation particulière (NP 3100) sont :",ch:["Raisonnable et modéré","Raisonnable et absolu","Modéré et aucune assurance","Raisonnable uniquement"],a:0,ex:"NP 3100 : l'attestation particulière peut exprimer une assurance de niveau raisonnable ou de niveau modéré selon les critères applicables.",sr:"NP 3100 / DEC Mai 2021 Q2"},
{id:"v7e3",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les conditions à remplir en matière de détention de capital et de droits de vote pour créer une société d'expertise comptable ?",a:"Art. 7-I ord. 1945 : les EC et personnes autorisées à exercer doivent détenir plus de 2/3 des droits de vote. En revanche, il n'y a pas de disposition sur le capital — seuls les droits de vote sont réglementés. Pour les sociétés mixtes EC/CAC, les tiers peuvent détenir jusqu'à 1/3 des droits de vote.",sr:"Art. 7-I ord. 1945 / DEC Mai 2021 Q3",kw:["2/3","droits de vote","capital","pas de disposition","tiers","1/3","société d'expertise comptable"],tip:"Le piège classique est de confondre capital et droits de vote. Seuls les droits de vote sont réglementés (2/3)."},
{id:"v7e4",p:"EC",th:"Responsabilité",ty:"qrc",q:"Citez deux situations qui peuvent conduire à la mise en cause de la responsabilité pénale de l'EC en tant qu'auteur principal d'une infraction.",a:"L'EC peut voir sa responsabilité pénale engagée comme auteur principal pour : 1) Délit d'omission d'écritures ou de passation d'écritures inexactes ou fictives (art. 1773 CGI). 2) Délit d'organisation de fausses comptabilités (art. 1772-1-1 CGI). 3) Violation du secret professionnel (art. 226-13 Code pénal). 4) Faux et usage de faux. 5) Complicité de l'infraction commise par le client (escroquerie, ABS, travail dissimulé).",sr:"Art. 1773, 1772-1-1 CGI / Art. 226-13 CP / DEC Mai 2021 Q4",kw:["auteur principal","omission d'écritures","écritures fictives","fausses comptabilités","secret professionnel","faux","complicité"],tip:"Question tombée au DEC mai 2021. Citez 2 situations précises avec les articles."},
{id:"v7e5",p:"EC",th:"Exercice",ty:"qrc",q:"Citez au moins deux évolutions apportées par la loi PACTE du 22 mai 2019 à l'exercice de la profession d'EC.",a:"La loi PACTE a apporté notamment : 1) L'autorisation des honoraires de succès à titre complémentaire (sauf prérogative exclusive et assiette fiscale/sociale). 2) Le mandat implicite auprès de l'administration fiscale et des organismes sociaux. 3) La création du statut d'EC en entreprise (art. 13). 4) L'élargissement des activités commerciales accessoires. 5) Le relèvement des seuils de nomination du CAC. 6) La passerelle CAC/EC (art. 83 septies).",sr:"Loi PACTE 2019 / DEC Mai 2021 Q5",kw:["honoraires de succès","mandat implicite","EC en entreprise","activités commerciales","seuils","nomination CAC","passerelle"],tip:"Question tombée au DEC mai 2021. Citez au moins 2 évolutions avec précision."},
{id:"v7e6",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelle est la composition de la chambre régionale de discipline de l'Ordre des EC ?",a:"Art. 49 ord. 1945 : la chambre régionale de discipline est composée de : 1) Un président et un président suppléant, conseillers des tribunaux administratifs ou des cours administratives d'appel, désignés par le vice-président du Conseil d'État. 2) Deux membres titulaires et deux membres suppléants du conseil régional, élus par celui-ci. Le Commissaire du Gouvernement assiste aux audiences mais n'assiste pas au délibéré.",sr:"Art. 49 ord. 1945 / DEC Mai 2021 Q6",kw:["président","conseiller","tribunal administratif","vice-président","Conseil d'État","deux membres","conseil régional","élus","Commissaire du Gouvernement"],tip:"Question tombée au DEC mai 2021. Ne confondez pas avec la chambre nationale (conseillers d'État) ou la Commission des sanctions H2A (CAC)."},
{id:"v7e7",p:"EC",th:"Qualité",ty:"qcm",q:"Les trois textes du schéma général du cadre de référence du référentiel normatif EC applicables à l'ensemble des missions sont :",ch:["Le code de déontologie, la NPMQ et la NPLAB","Le code de commerce, le CGI et l'ordonnance de 1945","Les NP 2300, NP 2400 et NP 3100","Le NPMQ, le NP 2300 et le NP 4400"],a:0,ex:"Le cadre de référence identifie 3 textes transversaux : le code de déontologie, la NPMQ (norme de management de la qualité) et la NPLAB (norme anti-blanchiment).",sr:"Cadre de référence / DEC Mai 2021 Q7"},
{id:"v7e8",p:"EC",th:"Qualité",ty:"qrc",q:"Selon la NP 2300 (mission de présentation), en quoi consistent les contrôles par épreuves sur la qualité des enregistrements comptables ?",a:"Les contrôles par épreuves (NP 2300 §11) consistent à : 1) Veiller à ce que les enregistrements soient appuyés d'une pièce justificative. 2) Vérifier la pertinence de l'imputation comptable (le bon compte est utilisé). 3) Vérifier que l'enregistrement est effectué sur la bonne période (respect du principe de séparation des exercices). Ces contrôles tiennent compte du principe d'importance relative et du caractère significatif.",sr:"NP 2300 §11 / DEC Mai 2021 Q10",kw:["pièce justificative","imputation comptable","bon compte","bonne période","séparation des exercices","importance relative","épreuves"],tip:"Question tombée au DEC mai 2021 (3 points). Les 3 contrôles sont précis et doivent être cités avec exactitude."},

// ── DEC Nov 2021 EC — Questions non couvertes ──

{id:"v7e9",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelle est la différence entre la procédure d'arbitrage et la procédure de conciliation sollicitées auprès du président du conseil régional de l'Ordre des EC ?",a:"L'arbitrage (art. 160 décret 2012-432) : le président du CR tranche le litige. Sa décision s'impose aux parties (caractère contraignant). Il est soumis aux règles des art. 1451 et suivants du CPC. La conciliation (art. 159 et 161) : le président tente de rapprocher les positions. Son rôle est de faciliter un accord amiable. En cas d'échec, les parties conservent leur droit d'agir en justice. La conciliation est un préalable obligatoire à toute plainte (art. 161 modifié 2025).",sr:"Art. 159, 160, 161 décret 2012-432 / DEC Nov 2021 Q2",kw:["arbitrage","tranche","contraignant","1451","CPC","conciliation","amiable","accord","préalable","obligatoire","plainte"],tip:"Question tombée au DEC nov 2021. La différence fondamentale : l'arbitrage est contraignant, la conciliation ne l'est pas."},
{id:"v7e10",p:"EC",th:"Exercice",ty:"qcm",q:"La procédure proposée par le conseil régional lorsqu'un confrère est atteint d'une grave maladie l'empêchant de gérer son cabinet est :",ch:["La radiation du Tableau","L'administration provisoire du cabinet","La suspension disciplinaire","Le transfert obligatoire de clientèle"],a:1,ex:"Art. 166 décret 2012-432 : le président du CR peut proposer un remplaçant provisoire en cas d'empêchement grave (maladie, décès). C'est une mission de confraternité.",sr:"Art. 166 décret 2012-432 / DEC Nov 2021 Q3"},
{id:"v7e11",p:"EC",th:"Déontologie",ty:"qcm",q:"Le client peut-il relever l'EC de son obligation au secret professionnel ?",ch:["Oui, l'accord du client suffit","Non, le secret est d'ordre public et absolu","Oui, si l'accord est écrit et notarié","Non, sauf autorisation du conseil régional"],a:1,ex:"Le secret professionnel de l'EC est d'ordre public. Le consentement du client ne suffit pas à exonérer l'EC de sa responsabilité en cas de violation.",sr:"Art. 21 ord. 1945 / Secret professionnel 2021 / DEC Nov 2021 Q7"},
{id:"v7e12",p:"EC",th:"Qualité",ty:"qcm",q:"Lorsque le contrôleur qualité constate des éléments faisant penser à une opération de blanchiment sur un dossier du confrère contrôlé, il doit :",ch:["Effectuer lui-même une déclaration TRACFIN","Informer le président du conseil régional","Ne rien faire car il est tenu au secret","Informer directement le procureur de la République"],a:1,ex:"Le contrôleur qualité est tenu au secret mais doit informer le président du CR. Les membres du comité LBC-FT de l'Ordre peuvent alors saisir TRACFIN si nécessaire.",sr:"Art. L. 561-28 CMF / DEC Nov 2021 Q9"},

// ── DEC Nov 2022 EC — Questions non couvertes ──

{id:"v7e13",p:"EC",th:"Qualité",ty:"qrc",q:"Quelle est la distinction entre revue de dossiers et revue indépendante d'une mission EC ?",a:"La revue de dossiers (NPMQ §30) est la supervision par le responsable de mission : il s'assure que les travaux ont été réalisés conformément aux normes et que les conclusions sont étayées. La revue indépendante (NPMQ §34) est réalisée par un professionnel qui n'a pas participé à la mission : elle vise à évaluer de manière objective la qualité des travaux, le respect des normes et l'adéquation des conclusions. Elle est obligatoire pour certaines missions à risque élevé.",sr:"NPMQ §30, §34 / DEC Nov 2022 Q3",kw:["revue de dossiers","supervision","responsable de mission","revue indépendante","n'a pas participé","objective","qualité","risque élevé"],tip:"Question tombée au DEC nov 2022. La revue indépendante se distingue par l'indépendance du réviseur par rapport à la mission."},
{id:"v7e14",p:"EC",th:"Qualité",ty:"qcm",q:"Les objectifs de la supervision dans le cadre d'une mission EC comprennent :",ch:["Uniquement la vérification des calculs","L'orientation, la vérification de la qualité des travaux et le développement des compétences des collaborateurs","La fixation des honoraires","Le contrôle du temps passé"],a:1,ex:"NPMQ §30 : la supervision vise à orienter les travaux, vérifier leur qualité et contribuer au développement des compétences des collaborateurs.",sr:"NPMQ §30 / DEC Nov 2022 Q5"},
{id:"v7e15",p:"EC",th:"Déontologie",ty:"qcm",q:"La structure d'exercice EC doit-elle informer son client chaque année de la possibilité de ne pas reconduire le contrat ?",ch:["Oui, c'est obligatoire pour tous les clients","Oui, uniquement pour les clients consommateurs ou non-professionnels","Non, ce n'est jamais obligatoire","Oui, uniquement pour les missions de plus d'un an"],a:1,ex:"Pour les clients consommateurs ou non-professionnels (art. L. 215-1 Code de la consommation), l'EC doit les informer de la possibilité de ne pas reconduire le contrat (tacite reconduction).",sr:"Art. L. 215-1 Code conso. / DEC Nov 2022 Q8"},
{id:"v7e16",p:"EC",th:"Qualité",ty:"qcm",q:"Les deux normes de portée générale applicables à une mission de compilation de comptes (NP 4410) sont :",ch:["Le code de déontologie et la NPMQ","La NPLAB et la NP 2300","Le code de déontologie et la NPLAB","La NPMQ et la NP 3100"],a:0,ex:"La NP 4410 (compilation) est soumise aux deux normes transversales : le code de déontologie et la NPMQ (norme de management de la qualité).",sr:"NP 4410 / Cadre de référence / DEC Nov 2022 Q9"},

// ── DEC Nov 2022 CAC — Questions non couvertes ──

{id:"v7e17",p:"CAC",th:"Déontologie",ty:"qrc",q:"Citez quatre motifs légitimes de démission du CAC personne physique prévus par le code de déontologie.",a:"Les motifs légitimes de démission (art. 28 code déontologie) incluent : 1) La cessation définitive d'activité. 2) Un motif personnel impérieux (maladie grave, déménagement). 3) Des difficultés rencontrées dans l'accomplissement de la mission rendant impossible sa poursuite dans des conditions conformes aux textes. 4) La survenance d'un événement de nature à compromettre le respect des règles d'indépendance ou d'un conflit d'intérêts. Le CAC doit exposer ses motifs à l'organe compétent et en informer la H2A.",sr:"Code déontologie CAC, art. 28 / DEC Nov 2022 Q12",kw:["cessation","activité","motif personnel","maladie","indépendance","conflit d'intérêts","organe compétent","H2A","exposer","motifs"],tip:"Question tombée au DEC nov 2022. L'art. 28 encadre strictement la démission. Le CAC ne peut pas démissionner sans motif légitime."},
{id:"v7e18",p:"CAC",th:"Exercice",ty:"qrc",q:"Citez au moins trois obstacles à la démission d'un CAC personne physique.",a:"Les obstacles à la démission sont : 1) L'absence de motif légitime rendant la démission abusive. 2) Le risque de porter préjudice à l'entité (art. 28 code déontologie). 3) L'impossibilité de démissionner pendant la procédure d'alerte en cours. 4) L'interdiction de démissionner pour se soustraire à l'obligation de révélation de faits délictueux. 5) L'obligation d'exposer ses motifs à l'organe compétent et d'informer la H2A préalablement.",sr:"Code déontologie CAC, art. 28 / C. com., art. L. 823-12 / DEC Nov 2022 Q14",kw:["motif légitime","préjudice","procédure d'alerte","révélation","faits délictueux","organe compétent","H2A"],tip:"Question tombée au DEC nov 2022 (3 points). Le CAC ne peut pas utiliser la démission comme moyen d'échapper à ses obligations légales."},

// ── DEC Nov 2023 EC — Questions non couvertes ──

{id:"v7e19",p:"EC",th:"Exercice",ty:"qcm",q:"Quelle autorité agrée les normes professionnelles applicables aux EC ?",ch:["Le Conseil national de l'Ordre","Le ministre chargé de l'Économie par arrêté","Le Conseil d'État","La H2A"],a:1,ex:"Les normes professionnelles EC sont agréées par arrêté du ministre chargé de l'Économie, après avis du Conseil national de l'Ordre.",sr:"Ord. 1945, art. 60 / DEC Nov 2023 Q1"},
{id:"v7e20",p:"EC",th:"Qualité",ty:"qcm",q:"Les normes professionnelles d'application générale pour les EC sont :",ch:["Le code de déontologie et la NPMQ","Le code de déontologie, la NPMQ et la NPLAB","La NP 2300 et la NP 2400","Le référentiel normatif et le code de commerce"],a:1,ex:"Les 3 normes d'application générale sont : le code de déontologie, la NPMQ et la NPLAB. Elles s'appliquent à toutes les missions.",sr:"Cadre de référence / DEC Nov 2023 Q2"},
{id:"v7e21",p:"EC",th:"Qualité",ty:"qrc",q:"Quels éléments doit comporter la revue indépendante d'une mission ? Citez-en deux.",a:"La revue indépendante (NPMQ §34) doit comporter au minimum : 1) L'examen de l'adéquation des conclusions formulées dans le rapport avec les travaux réalisés et les éléments collectés. 2) L'examen du respect des normes professionnelles applicables à la mission. 3) L'évaluation du caractère approprié des jugements professionnels exercés par le responsable de mission. 4) La vérification que les questions significatives ont été identifiées et traitées.",sr:"NPMQ §34 / DEC Nov 2023 Q3-4",kw:["adéquation","conclusions","rapport","travaux","normes","jugements professionnels","questions significatives"],tip:"Question tombée au DEC nov 2023. Les éléments de la revue indépendante sont différents de ceux de la revue de dossiers (supervision)."},
{id:"v7e22",p:"EC",th:"Exercice",ty:"qcm",q:"La durée maximale consécutive de présidence d'un même conseil régional de l'Ordre des EC est de :",ch:["2 mandats","3 mandats (12 ans)","4 mandats (16 ans)","Sans limitation"],a:2,ex:"Art. 28 ord. 1945 : le président du CR est élu pour 4 ans. La durée maximale consécutive est de 4 mandats (16 ans) selon le règlement intérieur.",sr:"Art. 28 ord. 1945 / RI Ordre / DEC Nov 2023 Q5"},
{id:"v7e23",p:"EC",th:"Exercice",ty:"qcm",q:"Combien de sections comporte le Tableau de l'Ordre des EC ?",ch:["8 sections","10 sections","14 sections","16 sections"],a:2,ex:"Le Tableau comporte 14 sections : personnes physiques EC, sociétés d'EC (SARL, SAS, SA, SASU, EURL, etc.), AGC, SEL, SPE, succursales, EC en entreprise, etc.",sr:"DEC Nov 2023 Q8 / CNOEC 2025"},
{id:"v7e24",p:"EC",th:"Exercice",ty:"qrc",q:"Citez quatre types d'activités interdites aux EC.",a:"Les activités interdites comprennent : 1) Toute activité commerciale à titre principal (agence d'affaires, agent immobilier, courtier). 2) La représentation des clients devant les tribunaux (art. 22 al. 5 ord. 1945). 3) Le maniement de fonds (sauf recouvrement amiable et mandat de paiement). 4) L'exercice de la fonction de représentant fiscal (garant du paiement de l'impôt). 5) La tenue de la comptabilité d'une entreprise dans laquelle l'EC détient des intérêts substantiels.",sr:"Art. 22 ord. 1945 / DEC Nov 2023 Q9",kw:["commerciale","agence d'affaires","agent immobilier","représentation","tribunaux","maniement de fonds","représentant fiscal","intérêts substantiels"],tip:"Question tombée au DEC nov 2023. Citez 4 interdictions distinctes avec les textes correspondants."},

// ── DEC Nov 2023 CAC — Questions non couvertes ──

{id:"v7e25",p:"CAC",th:"Qualité",ty:"qrc",q:"Citez les quatre principales modalités du contrôle d'activité professionnelle des CAC réalisé par la H2A.",a:"Les 4 modalités sont : 1) Le contrôle des missions de certification sélectionnées (vérification du respect des NEP, de l'indépendance, de l'adéquation des ressources). 2) Le contrôle du système de contrôle qualité interne (SMQ) mis en place par le CAC. 3) Le contrôle des autres missions ou prestations fournies aux entités auditées. 4) Le contrôle proportionné à l'ampleur et à la complexité de l'activité du CAC.",sr:"C. com., art. R. 820-45 / DEC Nov 2023 Q15",kw:["missions","certification","NEP","indépendance","contrôle qualité interne","SMQ","prestations","proportionné","complexité"],tip:"Question tombée au DEC nov 2023. Les contrôles sont basés sur une analyse des risques."},
{id:"v7e26",p:"CAC",th:"Qualité",ty:"qrc",q:"Citez quatre missions du comité spécialisé (comité d'audit) prévues par le code de commerce.",a:"Le comité spécialisé (art. L. 821-67 C. com.) a pour missions de : 1) Suivre le processus d'élaboration de l'information financière et formuler des recommandations. 2) Suivre l'efficacité des systèmes de contrôle interne, de gestion des risques et d'audit interne. 3) Suivre la mission de certification des comptes par le CAC et vérifier son indépendance. 4) Émettre une recommandation sur les CAC proposés à la désignation par l'AG. 5) Approuver la fourniture de services autres que la certification.",sr:"C. com., art. L. 821-67 / DEC Nov 2023 Q17",kw:["information financière","contrôle interne","gestion des risques","audit interne","certification","indépendance","recommandation","désignation","services"],tip:"Question tombée au DEC nov 2023. Citez 4 missions parmi les 5. Le comité d'audit est central pour les EIP."},
{id:"v7e27",p:"CAC",th:"Exercice",ty:"qrc",q:"Citez quatre entités où la nomination d'un CAC ne dépend pas d'un seuil.",a:"Entités où la nomination d'un CAC est obligatoire sans condition de seuil : 1) Les entités d'intérêt public (EIP) : établissements de crédit, entreprises d'assurance, sociétés cotées. 2) Les partis politiques et groupements politiques recevant des aides publiques. 3) Les organismes de sécurité sociale. 4) Certains GIE émettant des obligations. 5) Les fondations reconnues d'utilité publique. 6) Les associations ayant une activité économique dépassant certains seuils combinés.",sr:"C. com., art. L. 821-39 et s. / DEC Nov 2023 Q20",kw:["EIP","établissements de crédit","assurance","sociétés cotées","partis politiques","sécurité sociale","GIE","fondations"],tip:"Question tombée au DEC nov 2023. L'obligation légale de nomination hors seuil concerne principalement les EIP et certaines entités d'intérêt général."},

// ── DEC Mai 2024 CAC — Questions non couvertes ──

{id:"v7e28",p:"CAC",th:"Déontologie",ty:"qrc",q:"En quoi consiste l'esprit critique du CAC et pourquoi est-il essentiel ?",a:"L'esprit critique (art. 6 code déontologie / NEP 200 §15) consiste pour le CAC à : 1) Évaluer de manière critique les éléments probants collectés. 2) Remettre en question les informations fournies par la direction. 3) Être attentif aux éléments contradictoires ou aux circonstances inhabituelles. 4) Ne pas se satisfaire d'éléments probants peu fiables ou insuffisants. L'esprit critique est essentiel car il permet de détecter les anomalies significatives, y compris celles résultant de fraudes.",sr:"Code déonto. CAC, art. 6 / NEP 200, §15 / DEC Mai 2024 Q17",kw:["évaluer","critique","éléments probants","remettre en question","direction","contradictoires","inhabituelles","fiables","fraudes","anomalies"],tip:"Question tombée au DEC mai 2024 (3 points). L'esprit critique est un principe fondamental qui irrigue toute la démarche d'audit."},
{id:"v7e29",p:"CAC",th:"Déontologie",ty:"qrc",q:"Que signifie pour un CAC une « situation à risques » au sens du code de déontologie et quelles sont les situations visées ?",a:"Une situation à risques (art. 5 code déontologie / norme de sauvegardes §10) est le fait, pour le CAC, d'être placé en risque de ne pas pouvoir réaliser la mission de façon indépendante et impartiale. Les situations à risques comprennent : le risque d'autorévision (se prononcer sur des éléments résultant de ses propres travaux), le risque d'atteinte à l'impartialité (liens personnels, financiers, professionnels avec l'entité), le risque d'atteinte à l'intégrité, et le risque d'atteinte à l'indépendance.",sr:"Code déonto. CAC, art. 5 / Norme sauvegardes / DEC Mai 2024 Q18-19",kw:["situation à risques","indépendante","impartiale","autorévision","impartialité","liens","personnels","financiers","professionnels","intégrité"],tip:"Questions tombées au DEC mai 2024. Les 4 types de risques sont à citer avec des exemples concrets."},
{id:"v7e30",p:"CAC",th:"Exercice",ty:"qcm",q:"Un CAC non inscrit à l'Ordre des EC peut-il exercer des activités commerciales accessoires ?",ch:["Oui, sans restriction","Non, les activités commerciales sont réservées aux EC inscrits","Oui, s'il est également inscrit à l'Ordre des EC","Non, le CAC ne peut exercer aucune activité commerciale"],a:3,ex:"Art. L. 822-10 C. com. : le CAC ne peut exercer aucune activité commerciale. Les activités commerciales accessoires sont réservées aux EC dans leur structure inscrite à l'Ordre.",sr:"C. com., art. L. 822-10 / DEC Nov 2022 Q19"},

// ── DEC Mai 2023 — Questions QCM non couvertes ──

{id:"v7e31",p:"EC",th:"Déontologie",ty:"qcm",q:"En pratique, la déclinaison de l'obligation de conseil de l'EC se résume à :",ch:["Informer, exiger, refuser","Mettre en garde, exiger, refuser","Informer, mettre en garde, exiger, refuser","Informer, mettre en garde, refuser"],a:2,ex:"L'obligation de conseil se décline en 4 étapes : informer le client, le mettre en garde sur les risques, exiger les corrections nécessaires, et refuser la mission si le client ne se met pas en conformité.",sr:"Art. 155 décret 2012-432 / DEC Mai 2023 Q3"},
{id:"v7e32",p:"EC",th:"Exercice",ty:"qcm",q:"Dans le schéma du référentiel normatif, les activités commerciales et actes d'intermédiaire se situent :",ch:["Dans le cadre des missions","Dans les missions sans assurance","Dans le cadre des activités","Dans les missions d'assurance portant sur des comptes complets historiques"],a:2,ex:"Les activités commerciales accessoires et les actes d'intermédiaire sont des « activités » (et non des « missions ») dans le cadre de référence du référentiel normatif.",sr:"Cadre de référence / DEC Mai 2023 Q4"},
{id:"v7e33",p:"EC",th:"Responsabilité",ty:"qcm",q:"La responsabilité qui ne concerne PAS les experts-comptables est :",ch:["La responsabilité civile quasi-délictuelle","La responsabilité pénale","La responsabilité administrative","La responsabilité disciplinaire"],a:2,ex:"L'EC est soumis à 3 types de responsabilité : civile (contractuelle et quasi-délictuelle), pénale et disciplinaire. La responsabilité administrative ne s'applique pas aux EC.",sr:"CNOEC 2025 Chap. 4 / DEC Mai 2023 Q6"},
{id:"v7e34",p:"EC",th:"Responsabilité",ty:"qcm",q:"La clause de limitation de la durée de prescription de l'action en responsabilité civile EC est FAUSSE si elle prévoit :",ch:["6 mois à compter de la connaissance des faits","12 mois à compter de la connaissance des faits","3 ans à compter de la date de remise de l'attestation","2 ans à compter de la date de remise de l'attestation"],a:0,ex:"Art. 2254 Code civil : la prescription ne peut être réduite à moins d'1 an. Une clause de 6 mois est donc nulle.",sr:"Art. 2254 Code civil / DEC Mai 2023 Q7"},
{id:"v7e35",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC ne peut PAS démissionner de son mandat si :",ch:["Le dirigeant de l'entité décède","Un motif personnel impérieux le justifie","L'entité cesse définitivement son activité","L'entité est placée en redressement judiciaire"],a:3,ex:"Le placement en redressement judiciaire n'est pas un motif légitime de démission. Au contraire, le CAC doit maintenir sa mission et, le cas échéant, mettre en œuvre la procédure d'alerte.",sr:"Code déonto. CAC, art. 28 / DEC Mai 2023 Q19"},

// V7 PASSE 6 — Derniers documents : Profession EC 2025, Fiches CNCC, Conventions régl., H2A FAQ, Normes déonto CAC

// ── La profession d'expertise comptable en 2025 — Sujets non couverts ──

{id:"v7f1",p:"EC",th:"Exercice",ty:"qcm",q:"L'EC peut-il proposer un accompagnement numérique à un nouveau client, sans aucune autre mission ?",ch:["Non, une mission comptable préalable est obligatoire","Oui, au titre de l'article 22 alinéa 9 de l'ordonnance de 1945","Oui, mais uniquement via une filiale non inscrite","Non, sauf autorisation du conseil régional"],a:1,ex:"Art. 22 al. 9 ord. 1945 (modifié PACTE) : les études et travaux d'ordre numérique, environnemental, etc. peuvent être réalisés pour tout client, même sans mission comptable, à condition de ne pas constituer l'activité principale.",sr:"Art. 22 al. 9 ord. 1945 / Profession EC 2025 §B.1"},
{id:"v7f2",p:"EC",th:"Exercice",ty:"qcm",q:"L'EC peut-il être mandataire fiscal de son client ?",ch:["Non, c'est interdit car assimilé à un représentant fiscal","Oui, car le mandataire fiscal agit sous la responsabilité du mandant qui reste seul redevable de la taxe","Oui, mais uniquement pour les clients TVA intracommunautaire","Non, sauf autorisation du ministre"],a:1,ex:"Le mandataire fiscal agit sous la responsabilité exclusive du client mandant. À la différence du représentant fiscal (interdit), le mandataire n'est pas garant du paiement de l'impôt.",sr:"CNOEC Profession EC 2025 §B.8"},
{id:"v7f3",p:"EC",th:"Exercice",ty:"qcm",q:"Un EC peut-il vendre un logiciel informatique à son client dans le prolongement d'une mission de mise en place d'un système d'information ?",ch:["Non, la vente est une activité commerciale interdite","Oui, c'est une activité commerciale accessoire autorisée depuis 2021","Oui, sans restriction ni condition","Non, sauf si le logiciel est gratuit"],a:1,ex:"Art. 22 al. 3 ord. 1945 + norme agréée 2021 : les activités commerciales accessoires sont autorisées dans le prolongement des missions du cabinet. Rémunération exclusivement en honoraires.",sr:"Art. 22 al. 3 ord. 1945 / Profession EC 2025 §B.9"},
{id:"v7f4",p:"EC",th:"Exercice",ty:"qcm",q:"Un EC peut-il créer une société de représentation fiscale ?",ch:["Oui, si elle est inscrite à l'Ordre","Non, le représentant fiscal est garant du paiement de l'impôt, ce qui est assimilé à une agence d'affaires","Oui, via une filiale non inscrite","Oui, si l'activité est accessoire"],a:1,ex:"Le représentant fiscal est solidairement responsable du paiement de la TVA = assimilé à agence d'affaires (art. 22 al. 5 ord. 1945). Interdit dans et hors structure inscrite.",sr:"Art. 22 al. 5 ord. 1945 / Profession EC 2025 §B.3"},
{id:"v7f5",p:"EC",th:"Exercice",ty:"qrc",q:"Citez au moins trois missions légales spécifiques attribuées aux EC par des textes autres que l'ordonnance de 1945.",a:"Parmi les missions légales : 1) Mission d'assistance du comité social et économique (art. L. 2315-87 Code du travail). 2) Mission de présentation des comptes de campagne électorale (art. L. 52-12 Code électoral). 3) Attestation pour les émetteurs de titres-restaurants (art. R. 3262-33 Code du travail). 4) Délivrance du visa fiscal (art. 1649 quater L et M CGI). 5) Mission de tiers de confiance (art. 170 ter CGI). 6) Conseil en investissement financier (art. L. 531-2 CMF). 7) Attestation pour les éco-organismes DEEE (art. L. 541-10-1 Code environnement).",sr:"Profession EC 2025 §A.5 / CNOEC 2025",kw:["comité social économique","comptes de campagne","titres-restaurants","visa fiscal","tiers de confiance","CIF","éco-organismes","missions légales"],tip:"Citez au moins 3 missions avec les articles de loi correspondants. Ces missions sont distinctes de celles de l'ordonnance de 1945."},
{id:"v7f6",p:"EC",th:"Exercice",ty:"qcm",q:"Les missions fiscales (établissement des déclarations fiscales) relèvent-elles de la prérogative d'exercice exclusive de l'EC ?",ch:["Oui, intégralement","Non, seule la tenue de comptabilité relève de la prérogative exclusive","Oui, si elles incluent un arrêté des comptes","Non, elles relèvent de l'article 22"],a:1,ex:"Les missions fiscales ne sont pas dans la prérogative exclusive. Seuls les travaux prévus aux 2 premiers alinéas de l'art. 2 (tenue, révision, attestation) en relèvent.",sr:"Art. 2 ord. 1945 / Profession EC 2025 §A.3"},

// ── Fiche CNCC n°8 — Approche risque/sauvegarde ──

{id:"v7f7",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quelles sont les trois étapes de l'analyse risques et sauvegardes que le CAC doit mener avant d'accepter une mission ou prestation ?",a:"Les 3 étapes sont : Étape 1 — Analyse de la situation et de la mission/prestation pour identifier si elle génère un risque (atteinte à l'indépendance, autorévision, impartialité, intégrité). Étape 2 — Si un risque existe, identifier les mesures de sauvegarde appropriées (éliminer la cause ou en réduire les effets). Étape 3 — Si les mesures de sauvegarde sont insuffisantes, refuser la mission ou y mettre fin.",sr:"Code déonto. CAC, art. 5-III / Norme sauvegardes / Fiche CNCC n°8",kw:["analyse","situation","risque","mesures de sauvegarde","éliminer","réduire","insuffisantes","refuser","mettre fin","trois étapes"],tip:"Les 3 étapes suivent une logique séquentielle. L'erreur classique est d'oublier l'étape 3 (refus si sauvegardes insuffisantes)."},

// ── Fiche CNCC n°7 — Prestations hors mission légale ──

{id:"v7f8",p:"CAC",th:"Exercice",ty:"qcm",q:"Une prestation fournie par un CAC en dehors de toute mission légale doit-elle faire l'objet d'une lettre de mission ?",ch:["Oui, obligatoirement","Non, la lettre de mission est réservée à la certification","Oui, mais uniquement pour les EIP","Non, un simple devis suffit"],a:0,ex:"Art. 10 code déontologie : quelle que soit la mission ou prestation, le CAC établit une lettre de mission définissant les termes et conditions.",sr:"Code déonto. CAC, art. 10 / Fiche CNCC n°7"},
{id:"v7f9",p:"CAC",th:"Exercice",ty:"qcm",q:"Le barème d'heures du CAC s'applique-t-il aux prestations (services et attestations) fournies en dehors de la mission de certification ?",ch:["Oui, le même barème s'applique","Non, le barème ne s'applique qu'aux missions de certification des comptes et ALPE","Oui, avec une réduction de 50%","Non, mais un barème spécifique aux prestations existe"],a:1,ex:"Le barème d'heures (art. D. 821-188 C. com.) ne s'applique qu'aux missions de certification. Les prestations sont facturées librement.",sr:"Fiche CNCC n°7 / DEC Mai 2023 Q14"},

// ── Conventions réglementées ──

{id:"v7f10",p:"CAC",th:"Exercice",ty:"qrc",q:"Quel est le contenu du rapport spécial du CAC sur les conventions réglementées ?",a:"Le rapport spécial (art. L. 225-40 et L. 225-88 C. com. / NEP 9510) doit mentionner pour chaque convention autorisée au cours de l'exercice : 1) L'identité des parties. 2) La nature et l'objet de la convention. 3) Les modalités essentielles (prix, durée, conditions). 4) L'importance des fournitures livrées ou des prestations fournies. Le CAC se prononce sur les conventions nouvelles et donne également un état des conventions antérieures dont l'exécution s'est poursuivie.",sr:"C. com., art. L. 225-40 / NI IX / NEP 9510",kw:["rapport spécial","identité","parties","nature","objet","modalités","prix","durée","fournitures","prestations","conventions antérieures","poursuivies"],tip:"Le rapport spécial est distinct du rapport général. Il porte sur les conventions autorisées (nouvelles + poursuivies)."},

// ── H2A FAQ — Questions complémentaires ──

{id:"v7f11",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC d'une entité non-EIP peut-il fournir des services de conseil fiscal à cette entité ?",ch:["Non, c'est un service interdit pour toutes les entités","Oui, si l'approche risque/sauvegarde le permet","Oui, sans restriction","Non, sauf accord du président de la CRCC"],a:1,ex:"Pour les non-EIP, il n'y a plus de liste de services interdits depuis la PACTE. Le CAC applique l'approche risque/sauvegarde (art. 19 code déontologie) : s'il n'y a pas de risque d'autorévision, le service est autorisé.",sr:"Code déonto. CAC, art. 19 / H2A FAQ"},
{id:"v7f12",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC peut-il exercer sous forme d'association ?",ch:["Oui, sous forme d'association loi 1901","Non, les fonctions de CAC ne peuvent être exercées que par des personnes physiques ou des sociétés de CAC","Oui, sous forme de GIE","Oui, sous forme de coopérative"],a:1,ex:"Art. L. 821-25 C. com. : les fonctions de CAC sont exercées par des personnes physiques ou des sociétés de CAC (formes commerciales ou civiles). L'association n'est pas prévue.",sr:"C. com., art. L. 821-25 / DEC Mai 2024 Q20"},

// ── Secret professionnel — Compléments non couverts ──

{id:"v7f13",p:"EC",th:"Déontologie",ty:"qcm",q:"L'EC peut-il transmettre des informations comptables au conjoint de la gérante de la société cliente ?",ch:["Oui, il fait partie du foyer fiscal","Non, seul le représentant légal signataire de la lettre de mission a droit aux informations","Oui, si le conjoint est associé","Oui, avec l'accord oral de la gérante"],a:1,ex:"Le secret professionnel impose que l'EC ne communique qu'au représentant légal de la société. Le conjoint, même associé, est un tiers au regard de la lettre de mission.",sr:"Secret professionnel 2021 §4 / Art. 21 ord. 1945"},
{id:"v7f14",p:"EC",th:"Déontologie",ty:"qcm",q:"L'EC peut-il partager des informations couvertes par le secret professionnel avec un avocat travaillant sur le même dossier dans une structure distincte ?",ch:["Oui, l'avocat est aussi soumis au secret","Non, aucun partage n'est possible sauf au sein d'une même SPE","Oui, avec l'accord du client","Oui, dans le cadre du secret partagé LBC-FT"],a:1,ex:"Hors SPE et hors cadre LBC-FT, aucune disposition ne lève le secret de l'EC à l'égard d'un avocat dans une structure distincte. L'avocat doit demander les informations directement au client.",sr:"Secret professionnel 2021 §2.3"},

// ── Derniers compléments thématiques ──

{id:"v7f15",p:"EC",th:"Exercice",ty:"qcm",q:"Le statut d'auto-entrepreneur (micro-entrepreneur) est-il compatible avec la profession d'EC ?",ch:["Oui, sans restriction","Non, il est incompatible au niveau social","Oui, mais uniquement pour les missions accessoires","Oui, depuis la loi PACTE 2019"],a:1,ex:"Le statut de micro-entrepreneur est incompatible avec la profession d'EC au niveau social (affiliation au régime des travailleurs non salariés des professions libérales obligatoire).",sr:"CNOEC Profession EC 2025 / Exercice professionnel 2025"},

// V7 PASSE 7 RÉÉQUILIBRAGE — 30 questions CAC (majorité QRC) + NEP détaillées + H2A FAQ + NI
