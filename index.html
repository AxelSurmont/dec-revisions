// ── EC — RESPONSABILITÉ (18 questions) ──

{id:"v6r1",p:"EC",th:"Responsabilité",ty:"qcm",q:"La responsabilité civile de l'EC vis-à-vis de son client est de nature :",ch:["Délictuelle","Contractuelle","Quasi délictuelle","Solidaire"],a:1,ex:"La responsabilité est contractuelle dans les relations EC/client (inexécution ou mauvaise exécution du contrat). Elle est quasi délictuelle vis-à-vis des tiers.",sr:"CNOEC Exercice professionnel 2025, Chap. 4 §1"},
{id:"v6r2",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'EC est en principe tenu envers son client à une obligation :",ch:["De résultat","De moyen","De résultat atténuée","De garantie"],a:1,ex:"L'EC met à disposition toutes les ressources de son art : obligation de moyen. Certaines obligations accessoires peuvent être de résultat (respect des délais de dépôt).",sr:"CNOEC Exercice professionnel 2025, §1.1"},
{id:"v6r3",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les trois conditions nécessaires pour engager la responsabilité civile contractuelle de l'EC ?",a:"Les trois conditions cumulatives sont : 1) une faute (manquement contractuel, négligence, défaut de conseil), 2) un dommage (préjudice matériel, immatériel ou financier subi par le client), 3) un lien de causalité entre la faute et le dommage. Le client doit prouver ces trois éléments. Les juges apprécient souverainement l'étendue de la faute.",sr:"CNOEC Exercice professionnel 2025, Chap. 4 §1",kw:["faute","dommage","lien de causalité","trois conditions","prouver","manquement","préjudice","juges","souverainement"],tip:"Citez les 3 éléments et précisez que la charge de la preuve pèse sur le client. Le défaut de conseil est la plus grande source de contentieux."},
{id:"v6r4",p:"EC",th:"Responsabilité",ty:"qcm",q:"La plus grande source d'actions en responsabilité civile contre l'EC est :",ch:["L'erreur de saisie comptable","Le défaut de conseil","Le retard de dépôt des comptes","La violation du secret professionnel"],a:1,ex:"Le défaut de conseil constitue la plus grande source d'actions en responsabilité. L'EC doit informer, renseigner et mettre en garde son client.",sr:"CNOEC Exercice professionnel 2025, Chap. 4 §1"},
{id:"v6r5",p:"EC",th:"Responsabilité",ty:"qcm",q:"Le délai de prescription de l'action en responsabilité civile contre l'EC est de :",ch:["3 ans","5 ans","10 ans","30 ans"],a:1,ex:"Art. 2224 Code civil (loi du 17 juin 2008) : 5 ans à compter du jour où le titulaire a connu ou aurait dû connaître les faits.",sr:"Art. 2224 Code civil / CNOEC 2025 §1.3"},
{id:"v6r6",p:"EC",th:"Responsabilité",ty:"qrc",q:"En matière de redressement fiscal, quel est le point de départ du délai de prescription de l'action en responsabilité contre l'EC ?",a:"Le délai de prescription court à compter de la date de réalisation du dommage, c'est-à-dire le terme de la procédure contentieuse ou la date de la convention de transaction signée avec l'administration fiscale. La date de notification du redressement ou de l'avis de mise en recouvrement ne constitue pas le point de départ de la prescription, car tant que le sort des réclamations contentieuses n'est pas définitivement connu, le dommage n'est pas réalisé.",sr:"Cass. com. 6/12/2017 ; Cass. 3/03/2021 ; Cass. Civ. 1 29/06/2022",kw:["terme","procédure contentieuse","transaction","dommage réalisé","notification","pas point de départ","réclamations","définitivement"],tip:"Le piège classique est de retenir la date de notification du redressement. La Cour de cassation a confirmé à plusieurs reprises que le dommage n'est réalisé qu'au terme de la procédure."},
{id:"v6r7",p:"EC",th:"Responsabilité",ty:"qcm",q:"Le délai de prescription de l'action en responsabilité civile EC peut être contractuellement réduit à minimum :",ch:["6 mois","1 an","2 ans","3 ans"],a:1,ex:"Art. 2254 Code civil : la prescription ne peut être réduite à moins d'1 an ni étendue à plus de 10 ans. Pas d'aménagement possible avec un client consommateur.",sr:"Art. 2254 Code civil / CNOEC 2025 §1.3"},
{id:"v6r8",p:"EC",th:"Responsabilité",ty:"qcm",q:"Le montant minimum de la garantie d'assurance RCP de l'EC est de :",ch:["100 000 € par sinistre","250 000 € par sinistre","500 000 € par sinistre et 1 M€ par an","1 M€ par sinistre et 2 M€ par an"],a:2,ex:"Art. 138 décret 2012-432 : minimum 500 000 € par sinistre et 1 000 000 € par année d'assurance.",sr:"Art. 138 décret 2012-432"},
{id:"v6r9",p:"EC",th:"Responsabilité",ty:"qcm",q:"La garantie subséquente minimale du contrat d'assurance RCP de l'EC est de :",ch:["3 ans","5 ans","10 ans","15 ans"],a:2,ex:"Art. R 124-2 du Code des assurances : garantie subséquente de 10 ans minimum.",sr:"Art. R 124-2 Code des assurances / CNOEC 2025 §5"},
{id:"v6r10",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quels types de fautes ne sont PAS couverts par l'assurance RCP de l'EC et quelle exception existe pour les salariés ?",a:"Les contrats d'assurance RCP ne couvrent pas les fautes intentionnelles ou pénales, ni les amendes pénales, fiscales ou toute autre sanction (art. L.113-1 Code des assurances). Toutefois, si la faute intentionnelle ou pénale est commise par un salarié du cabinet, elle sera prise en charge par l'assurance RCP en vertu de l'article L 121-2 du Code des assurances : l'assureur est garant des dommages causés par les personnes dont l'assuré est civilement responsable.",sr:"Art. L.113-1 et L.121-2 Code des assurances / CNOEC 2025 §5",kw:["fautes intentionnelles","pénales","amendes","pas couvertes","salarié","exception","L 121-2","civilement responsable","assureur garant"],tip:"Le piège est de croire que la faute pénale d'un salarié n'est jamais couverte. L'art. L 121-2 crée une exception importante."},
{id:"v6r11",p:"EC",th:"Responsabilité",ty:"qcm",q:"Les sanctions pénales pour exercice illégal de la profession d'EC (personne physique) sont prévues par :",ch:["L'article 53 de l'ordonnance de 1945","Les articles 433-17 et 433-25 du Code pénal","L'article L. 820-4 du Code de commerce","L'article 226-13 du Code pénal"],a:1,ex:"Art. 20 ord. 1945 renvoie aux art. 433-17 (1 an d'emprisonnement, 15 000 € d'amende) et 433-25 (75 000 € pour les personnes morales) du Code pénal.",sr:"Art. 20 ord. 1945 / Art. 433-17 et 433-25 Code pénal"},
{id:"v6r12",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'amende maximale pour exercice illégal de la profession d'EC par une personne morale est de :",ch:["15 000 €","45 000 €","75 000 €","100 000 €"],a:2,ex:"Art. 433-25 Code pénal : 75 000 € pour les personnes morales, avec possibilité de peines complémentaires (fermeture, interdiction d'activité).",sr:"Art. 433-25 Code pénal / CNOEC 2025 Chap. 3 §2"},
{id:"v6r13",p:"EC",th:"Responsabilité",ty:"qrc",q:"Comment l'EC complice d'exercice illégal peut-il voir sa responsabilité engagée et sur quels fondements ?",a:"L'EC qui donne une apparence de régularité à des travaux comptables réalisés par un non-membre de l'Ordre est complice d'exercice illégal (art. 121-6 et 121-7 Code pénal). Il encourt les mêmes peines que l'auteur principal. En outre, il peut faire l'objet d'une procédure disciplinaire pour couverture d'exercice illégal et non-respect des règles déontologiques. Le simple visa de complaisance suffit à caractériser la complicité.",sr:"Art. 121-6 et 121-7 Code pénal / Cass. Crim. 6/09/2011 n°11-80.317",kw:["complice","apparence","régularité","121-6","121-7","mêmes peines","disciplinaire","couverture","visa de complaisance"],tip:"Deux procédures distinctes : pénale (complicité) et disciplinaire (couverture d'exercice illégal). Le visa de complaisance suffit (Cass. 2011)."},
{id:"v6r14",p:"EC",th:"Responsabilité",ty:"qcm",q:"La violation du secret professionnel par l'EC est punie par l'article 226-13 du Code pénal de :",ch:["6 mois d'emprisonnement et 7 500 €","1 an d'emprisonnement et 15 000 €","2 ans d'emprisonnement et 30 000 €","5 ans d'emprisonnement et 75 000 €"],a:1,ex:"Art. 226-13 Code pénal : 1 an d'emprisonnement et 15 000 € d'amende pour la révélation d'une information à caractère secret.",sr:"Art. 226-13 Code pénal / Art. 21 ord. 1945"},
{id:"v6r15",p:"EC",th:"Responsabilité",ty:"qcm",q:"La sanction pécuniaire maximale pour manquement LBC-FT de l'EC est de :",ch:["250 000 €","500 000 €","1 000 000 €","Le double de l'avantage retiré"],a:2,ex:"Ord. 2016-1635 / art. 53 bis ord. 1945 : maximum 1 M€. Si l'avantage retiré est déterminable, la sanction peut être le double de cet avantage.",sr:"Art. 53 bis ord. 1945 / Art. L. 561-36-3 CMF"},
{id:"v6r16",p:"EC",th:"Responsabilité",ty:"qrc",q:"La radiation d'un EC du Tableau à sa demande met-elle fin aux poursuites disciplinaires engagées contre lui ?",a:"Non. La radiation à la demande de l'intéressé doit être prononcée mais elle ne soustrait pas l'EC à la procédure disciplinaire en cours pour les agissements commis pendant la période d'inscription (art. 179 décret 2012-432). De plus, les sanctions prononcées à l'encontre de personnes ayant cessé de faire partie de l'Ordre s'appliquent à compter de leur réinscription éventuelle (art. 188 décret 2012-432).",sr:"Art. 179 et 188 décret 2012-432 / CNOEC 2025 §3",kw:["non","radiation","demande","pas soustraire","procédure disciplinaire","agissements","période d'inscription","réinscription","article 179","article 188"],tip:"Deux principes : la radiation n'éteint pas les poursuites + les sanctions s'appliquent à la réinscription. L'erreur classique est de croire que la radiation vaut amnistie."},
{id:"v6r17",p:"EC",th:"Responsabilité",ty:"qcm",q:"Un EC stagiaire peut-il faire l'objet d'une procédure disciplinaire ?",ch:["Non, il n'est pas membre de l'Ordre","Oui, mais uniquement pour les manquements LBC-FT","Oui, il est soumis au contrôle disciplinaire de l'Ordre","Oui, mais devant le tribunal judiciaire uniquement"],a:2,ex:"Art. 4 ord. 1945 et art. 141 décret 2012-432 : les stagiaires sont soumis au contrôle disciplinaire de l'Ordre. La radiation entraîne l'interdiction définitive d'inscription au stage.",sr:"Art. 4 ord. 1945 / Art. 76 décret 2012-432"},
{id:"v6r18",p:"EC",th:"Responsabilité",ty:"qcm",q:"La durée recommandée de conservation des dossiers de travail par l'EC, compte tenu des prescriptions civile, pénale et disciplinaire, est d'au minimum :",ch:["3 ans après la fin de la mission","5 ans après la fin de la mission","8 ans après la fin de la mission","10 ans après la fin de la mission"],a:2,ex:"Prescription civile 5 ans (point de départ glissant), pénale 6 ans (délits), pas de prescription disciplinaire → la prudence impose au minimum 8 ans.",sr:"CNOEC Exercice professionnel 2025, Déontologie §Conservation"},

// ── CAC — RESPONSABILITÉ (17 questions) ──

{id:"v6r19",p:"CAC",th:"Responsabilité",ty:"qcm",q:"L'exercice illégal de la profession de CAC est puni de :",ch:["6 mois d'emprisonnement et 7 500 €","1 an d'emprisonnement et 15 000 €","5 ans d'emprisonnement et 75 000 €","2 ans d'emprisonnement et 30 000 €"],a:1,ex:"Art. L. 821-7 C. com. : 1 an d'emprisonnement et 15 000 € d'amende pour l'usage illicite du titre ou l'exercice illégal.",sr:"C. com., art. L. 821-7"},
{id:"v6r20",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La violation des incompatibilités légales par le CAC est punie de :",ch:["1 an d'emprisonnement et 15 000 €","6 mois d'emprisonnement et 7 500 €","5 ans d'emprisonnement et 75 000 €","2 ans d'emprisonnement et 30 000 €"],a:1,ex:"Art. L. 821-8 C. com. : 6 mois d'emprisonnement et 7 500 € d'amende pour exercice nonobstant les incompatibilités.",sr:"C. com., art. L. 821-8"},
{id:"v6r21",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les trois infractions pénales principales du CAC prévues par les articles L. 821-7 à L. 821-9 du Code de commerce et leurs peines respectives ?",a:"1) Usage illicite du titre / exercice illégal (art. L. 821-7) : 1 an d'emprisonnement et 15 000 € d'amende. 2) Violation des incompatibilités légales (art. L. 821-8) : 6 mois d'emprisonnement et 7 500 € d'amende. 3) Confirmation d'informations mensongères ou défaut de révélation de faits délictueux (art. L. 821-9) : 5 ans d'emprisonnement et 75 000 € d'amende.",sr:"C. com., art. L. 821-7 à L. 821-9",kw:["exercice illégal","1 an","15 000","incompatibilités","6 mois","7 500","informations mensongères","non-révélation","5 ans","75 000"],tip:"Les 3 infractions suivent une gradation de peines. L'art. L. 821-9 (5 ans/75 000 €) est le plus grave. Attention : la non-révélation relève du même article que les informations mensongères."},
{id:"v6r22",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Le délit de confirmation d'informations mensongères et le défaut de révélation de faits délictueux sont prévus par :",ch:["Le même article (L. 821-9)","Deux articles distincts (L. 821-9 et L. 821-10)","L'article L. 820-4 uniquement","Le code de déontologie CAC"],a:0,ex:"Art. L. 821-9 (ancien L. 820-7) prévoit dans le même article ces deux infractions, punies des mêmes peines : 5 ans et 75 000 €.",sr:"C. com., art. L. 821-9"},
{id:"v6r23",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Qui peut saisir le rapporteur général de la H2A pour engager des poursuites disciplinaires contre un CAC ?",ch:["Uniquement le procureur de la République","Le garde des Sceaux, le H2A, le procureur, le premier président de la Cour des comptes, les présidents de l'AMF, de l'ACPR, de la CNCC ou d'une CRCC","N'importe quel tiers lésé","Le client du CAC uniquement"],a:1,ex:"Art. L. 821-73 C. com. : liste limitative des autorités habilitées à saisir le rapporteur général. Le rapporteur peut aussi se saisir d'office en cas de signalement par un tiers.",sr:"C. com., art. L. 821-73 / Fiche CNCC n°4"},
{id:"v6r24",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quels sont les pouvoirs d'enquête du rapporteur général de la H2A dans le cadre d'une procédure disciplinaire CAC ?",a:"Le rapporteur général procède à l'enquête et peut désigner des enquêteurs. Ils peuvent : obtenir du CAC tout document ou information sous quelque forme que ce soit et en exiger copie ; obtenir de toute personne tout document utile ; convoquer et entendre toute personne susceptible de fournir des informations (y compris par visioconférence) ; accéder aux locaux professionnels ; demander à des CAC inscrits sur une liste de procéder à des vérifications ; faire appel à des experts.",sr:"C. com., art. L. 821-74 et R. 821-202 / Fiche CNCC n°4",kw:["rapporteur général","enquêteurs","documents","copie","convoquer","entendre","locaux","vérifications","experts","visioconférence"],tip:"Les pouvoirs sont très étendus. Le CAC peut se faire assister d'un conseil à toutes les étapes (art. L. 821-78 et L. 821-77)."},
{id:"v6r25",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La prescription de l'action disciplinaire contre le CAC est de :",ch:["3 ans","5 ans","6 ans","Imprescriptible"],a:2,ex:"Art. L. 821-73 C. com. : les faits remontant à plus de 6 ans ne peuvent faire l'objet d'une sanction s'il n'a été fait pendant ce délai aucun acte tendant à leur recherche, constatation ou sanction.",sr:"C. com., art. L. 821-73"},
{id:"v6r26",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La décision disciplinaire de la Commission des sanctions du H2A est-elle exécutoire immédiatement ?",ch:["Non, elle est suspendue par le recours","Oui, même en cas de recours devant le Conseil d'État","Oui, sauf en cas de radiation","Non, un délai de 2 mois est accordé"],a:1,ex:"La décision est exécutoire immédiatement, même en cas de recours. Le CAC peut toutefois demander un référé suspension au Conseil d'État.",sr:"Fiche CNCC n°4 / C. com., art. L. 821-85"},
{id:"v6r27",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Qu'est-ce que la composition administrative dans la procédure disciplinaire du CAC et comment fonctionne-t-elle ?",a:"La composition administrative est une procédure négociée : le rapporteur général et le CAC s'accordent sur une ou plusieurs sanctions. L'accord est soumis à la formation plénière du collège de la H2A pour homologation. La sanction pécuniaire est plafonnée dans ce cadre. Si l'accord n'est pas homologué ou si le CAC refuse la proposition, la procédure classique reprend. C'est une alternative à la procédure contentieuse, inspirée du droit de la concurrence.",sr:"C. com., art. L. 821-78 / Fiche CNCC n°4",kw:["composition administrative","rapporteur général","accord","sanctions","formation plénière","collège","H2A","homologation","alternative","négociée"],tip:"La composition administrative est la procédure la plus récente. Le piège est de la confondre avec la procédure simplifiée (qui reste unilatérale)."},
{id:"v6r28",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La suspension provisoire d'un CAC par le rapporteur général ne peut excéder :",ch:["3 mois","6 mois","1 an","Durée indéfinie"],a:1,ex:"Art. L. 821-76 C. com. : suspension provisoire de 6 mois maximum, en cas de faits d'une particulière gravité, lorsque l'urgence et l'intérêt public le justifient.",sr:"C. com., art. L. 821-76"},
{id:"v6r29",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La limite de garantie minimale de l'assurance RCP du CAC est de :",ch:["500 000 € par sinistre","76 224,51 € par année et par sinistre","250 000 € par sinistre","1 000 000 € par sinistre"],a:1,ex:"Art. A. 821-58 C. com. : pas de limite inférieure à 76 224,51 € par année et par sinistre, avec franchise maximale de 10% des indemnités dues.",sr:"C. com., art. A. 821-58"},
{id:"v6r30",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelle est la différence entre la déclaration de soupçon à TRACFIN et la révélation de faits délictueux au procureur pour le CAC ?",a:"La déclaration à TRACFIN intervient en cas de soupçon ou de bonnes raisons de soupçonner que des opérations portent sur des sommes provenant d'une infraction punie d'au moins 1 an de prison. La révélation au procureur (art. L. 821-10) intervient quand le CAC a connaissance de faits délictueux, c'est-à-dire des éléments tangibles et non de simples soupçons. Les deux obligations peuvent être concomitantes quand le CAC sait que les sommes proviennent d'une infraction. Les soupçons seuls ne constituent pas des faits délictueux.",sr:"NEP-LBC/FT §76-78 / C. com., art. L. 821-10",kw:["soupçon","TRACFIN","révélation","procureur","faits délictueux","tangibles","concomitantes","1 an","prison","infraction"],tip:"Distinguez clairement : soupçon → TRACFIN ; certitude (faits tangibles) → procureur + TRACFIN. Les soupçons ne sont pas des faits délictueux."},
{id:"v6r31",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La publication des décisions disciplinaires du CAC se fait :",ch:["Uniquement au Journal Officiel","Sur le site internet de la H2A, de façon anonyme dans certaines circonstances","Dans la presse professionnelle uniquement","Jamais, elles sont confidentielles"],a:1,ex:"Art. L. 821-84 et R. 821-225 C. com. : publication sur le site de la H2A (anonyme dans certains cas) et éventuellement dans des publications désignées, de façon proportionnée.",sr:"C. com., art. L. 821-84 et R. 821-225"},
{id:"v6r32",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Le défaut de désignation d'un CAC par les dirigeants d'une entité tenue à cette obligation est puni de :",ch:["1 an d'emprisonnement et 15 000 €","2 ans d'emprisonnement et 30 000 €","5 ans d'emprisonnement et 75 000 €","Une contravention de 5e classe"],a:1,ex:"Art. L. 820-4, 1° C. com. : 2 ans d'emprisonnement et 30 000 € d'amende pour le défaut de désignation d'un CAC.",sr:"C. com., art. L. 820-4, 1° / Tableau infractions CNCC"},
{id:"v6r33",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La sanction complémentaire d'inéligibilité aux organismes professionnels prononcée contre un CAC ne peut excéder :",ch:["3 ans","5 ans","10 ans","Durée indéterminée"],a:2,ex:"Art. L. 821-71 C. com. : inéligibilité aux organismes professionnels pendant 10 ans au plus, comme sanction complémentaire.",sr:"C. com., art. L. 821-71"},
{id:"v6r34",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les sanctions disciplinaires complètes applicables au CAC selon l'article L. 821-71, incluant les sanctions complémentaires ?",a:"Les sanctions principales sont : 1) avertissement, 2) blâme, 3) interdiction d'exercer tout ou partie des missions pour max 3 ans, 4) radiation d'une ou des listes, 5) retrait de l'honorariat, 6) publication d'une déclaration indiquant que le rapport ne remplit pas les exigences, 7) interdiction d'exercer des fonctions de direction dans une société de CAC et dans des EIP pour max 3 ans, 8) sanction pécuniaire (250 000 € PP, 1 M€ ou moyenne annuelle des honoraires pour PM). Sanctions complémentaires : inéligibilité aux organismes professionnels (max 10 ans) et injonction de cesser le comportement.",sr:"C. com., art. L. 821-71 / Fiche CNCC n°4",kw:["avertissement","blâme","interdiction","3 ans","radiation","honorariat","publication","direction","pécuniaire","250 000","inéligibilité","injonction"],tip:"La liste est plus longue que les 8 sanctions habituellement citées. N'oubliez pas la publication du rapport défaillant et l'interdiction de fonctions de direction, ajoutées récemment."},
{id:"v6r35",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La sanction pécuniaire maximale pour une personne morale de CAC est la plus élevée des sommes suivantes :",ch:["500 000 € ou la moyenne des honoraires","1 M€ ou la moyenne annuelle des honoraires facturés sur 3 exercices","2 M€ ou le double du chiffre d'affaires","250 000 € dans tous les cas"],a:1,ex:"Art. L. 821-71 : pour une PM, le maximum est la plus élevée entre 1 M€ et la moyenne annuelle des honoraires facturés à l'entité sur l'exercice de la faute et les deux précédents.",sr:"C. com., art. L. 821-71"},

// ── EC — RESPONSABILITÉ compléments (5 questions) ──

{id:"v6r36",p:"EC",th:"Responsabilité",ty:"qcm",q:"Les débats devant la chambre régionale de discipline de l'Ordre des EC sont en principe :",ch:["Toujours à huis clos","Publics, sauf demande contraire de l'intéressé ou atteinte à l'ordre public","Réservés aux membres de l'Ordre","Publics sans exception"],a:1,ex:"Art. 187 décret 2012-432 : débats publics, sauf si le poursuivi demande le huis clos ou si la publicité porterait atteinte à l'ordre public ou à un secret protégé.",sr:"Art. 187 décret 2012-432"},
{id:"v6r37",p:"EC",th:"Responsabilité",ty:"qcm",q:"Lorsqu'un EC est suspendu ou radié, le président du CR désigne un remplaçant. Ce remplaçant a droit :",ch:["Aux honoraires du professionnel remplacé","Aux honoraires correspondant aux travaux qu'il exécute","À une indemnité forfaitaire fixée par le CR","À aucune rémunération, la mission est bénévole"],a:1,ex:"Art. 191 décret 2012-432 : les remplaçants ont droit aux honoraires correspondant aux travaux exécutés pendant la suspension ou la période transitoire.",sr:"Art. 191 décret 2012-432"},
{id:"v6r38",p:"EC",th:"Responsabilité",ty:"qrc",q:"Qui sont les personnes soumises à la compétence disciplinaire des chambres de discipline de l'Ordre des EC depuis le décret de 2018 ?",a:"Les personnes soumises sont : les personnes physiques et morales inscrites au Tableau (dont SEC, SPE, succursales), les salariés visés aux art. 83 ter et 83 quater, les EC stagiaires, les EC honoraires, les professionnels étrangers autorisés. Depuis le décret n°2018-284, sont également soumis les dirigeants non membres de l'Ordre des sociétés d'exercice et les salariés/préposés d'un EC ou d'une personne morale d'EC, du fait de leur implication personnelle dans les manquements LBC-FT.",sr:"Art. 174 décret 2012-432 / Décret 2018-284 / CNOEC 2025",kw:["inscrits","tableau","SEC","SPE","stagiaires","honoraires","étrangers","dirigeants non membres","salariés","préposés","LBC-FT","décret 2018"],tip:"L'extension de 2018 aux dirigeants non-membres et salariés est un piège classique au DEC. Elle ne concerne que les manquements LBC-FT."},
{id:"v6r39",p:"EC",th:"Responsabilité",ty:"qcm",q:"Le Commissaire du Gouvernement assiste-t-il au délibéré de la chambre de discipline de l'Ordre des EC ?",ch:["Oui, avec voix consultative","Oui, avec voix délibérative","Non, il n'assiste pas au délibéré","Oui, mais uniquement en appel"],a:2,ex:"Art. 187 décret 2012-432 : le Commissaire du Gouvernement n'assiste pas au délibéré.",sr:"Art. 187 décret 2012-432"},
{id:"v6r40",p:"EC",th:"Responsabilité",ty:"qcm",q:"La notification des décisions de la chambre régionale de discipline EC doit intervenir dans :",ch:["5 jours francs","10 jours francs","15 jours francs","1 mois"],a:1,ex:"Art. 189 décret 2012-432 : notification par LRAR dans les 10 jours francs à l'intéressé, au Commissaire du Gouvernement, et au président du CR.",sr:"Art. 189 décret 2012-432"},

// ── MIXTE — RESPONSABILITÉ transversal (10 questions) ──

{id:"v6r41",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'EC qui découvre que son client établit de fausses factures et les enregistre en connaissance de cause peut être poursuivi pour :",ch:["Uniquement en disciplinaire","Complicité de l'infraction commise par le client et/ou auteur principal de délits fiscaux","Exercice illégal de la profession","Uniquement au titre de la responsabilité civile"],a:1,ex:"L'EC peut être auteur principal (art. 1773 ou 1772-1-1 CGI) ou complice de l'infraction du client (escroquerie, faux, détournement). Il doit refuser d'enregistrer, mettre en demeure le client, et mettre fin à la mission en cas de refus.",sr:"CNOEC Exercice professionnel 2025, Chap. 4 §2"},
{id:"v6r42",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelle attitude l'EC doit-il adopter lorsqu'il découvre que son client établit de fausses factures ?",a:"L'EC doit : 1) Refuser d'enregistrer les fausses factures pour ne pas constituer l'élément matériel de l'infraction. 2) Adresser un courrier de mise en demeure au client pour écarter sa responsabilité. 3) Imposer au client de rectifier le passé au niveau déclaratif et de s'engager à abandonner ces pratiques. 4) En cas de refus du client, mettre fin à la mission. 5) Conserver son dossier et les correspondances de manière sécurisée pour sa défense. 6) Envisager une déclaration de soupçon à TRACFIN car les fausses factures constituent l'élément matériel du délit de blanchiment (art. 324-1 Code pénal).",sr:"CNOEC Exercice professionnel 2025, Chap. 4 §2",kw:["refuser","enregistrer","mise en demeure","rectifier","abandonner","mettre fin","mission","conserver","dossier","TRACFIN","blanchiment","324-1"],tip:"La réponse doit être complète : refus d'enregistrement + mise en demeure + fin de mission si refus du client + déclaration TRACFIN. N'oubliez pas le lien avec le blanchiment."},
{id:"v6r43",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Le CAC qui conclut que les comptes comportent des anomalies significatives résultant de fraudes susceptibles de qualification pénale doit :",ch:["Informer uniquement la direction","Démissionner immédiatement","Révéler les faits au procureur de la République","Informer la H2A"],a:2,ex:"NEP 240 §31 : quand les anomalies résultent de fraudes susceptibles de qualification pénale, le CAC révèle les faits au procureur.",sr:"NEP 240, §31"},
{id:"v6r44",p:"CAC",th:"Responsabilité",ty:"qcm",q:"La responsabilité civile du CAC peut être engagée :",ch:["Uniquement par l'entité contrôlée","Par l'entité contrôlée et par les tiers","Uniquement par les tiers","Par la H2A"],a:1,ex:"Art. L. 823-13 C. com. : le CAC est responsable tant à l'égard de l'entité contrôlée que des tiers, pour fautes et négligences commises dans l'exercice de ses fonctions.",sr:"C. com., art. L. 823-13"},
{id:"v6r45",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Dans quels cas la responsabilité du CAC ne peut-elle pas être engagée malgré la divulgation d'informations ?",a:"La responsabilité du CAC ne peut être engagée pour les informations ou divulgations de faits auxquelles il procède en application de la loi : la révélation de faits délictueux au procureur de la République (art. L. 821-10 C. com.), la déclaration de soupçon à TRACFIN, et la communication d'irrégularités et inexactitudes à l'assemblée générale. Ces immunités légales protègent le CAC qui agit de bonne foi dans le cadre de ses obligations légales.",sr:"C. com., art. L. 821-10 et L. 823-13 / Art. L. 561-22 CMF",kw:["révélation","procureur","TRACFIN","déclaration de soupçon","immunité","bonne foi","obligations légales","irrégularités","assemblée générale"],tip:"L'immunité ne couvre que les divulgations prévues par la loi. Toute divulgation hors cadre légal engage la responsabilité du CAC."},
{id:"v6r46",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'action disciplinaire contre l'EC peut intervenir :",ch:["Uniquement après une condamnation pénale","Uniquement en l'absence de poursuites pénales","Parallèlement à une action pénale ou civile, ou indépendamment","Uniquement sur plainte du client"],a:2,ex:"L'action disciplinaire peut intervenir parallèlement à une action pénale ou civile, ou en dehors même d'une telle action. Les chambres ne sont pas tenues de prononcer une sanction quand il y a condamnation pénale.",sr:"CNOEC Exercice professionnel 2025, §3"},
{id:"v6r47",p:"EC",th:"Responsabilité",ty:"qcm",q:"La personne frappée d'une peine disciplinaire EC est tenue au paiement :",ch:["Des honoraires de son remplaçant","Des frais résultant de l'action engagée contre elle","D'une amende forfaitaire au CR","D'aucun frais"],a:1,ex:"Art. 190 décret 2012-432 : paiement des frais résultant de l'action, sauf si en appel la chambre nationale décide qu'aucune peine ne doit être infligée.",sr:"Art. 190 décret 2012-432"},
{id:"v6r48",p:"EC",th:"Responsabilité",ty:"qcm",q:"L'EC est tenu à la responsabilité au titre du RGPD depuis :",ch:["Le 1er janvier 2017","Le 25 mai 2018","Le 1er janvier 2020","Le 1er janvier 2025"],a:1,ex:"Le RGPD est entré en application le 25 mai 2018. Les cabinets d'EC sont concernés tant pour leur organisation interne que pour les données de leurs clients.",sr:"CNOEC Exercice professionnel 2025, §4"},
{id:"v6r49",p:"CAC",th:"Responsabilité",ty:"qcm",q:"Le délai de prescription de l'action publique en matière délictuelle (droit commun) applicable aux infractions pénales du CAC est de :",ch:["1 an","3 ans","6 ans","10 ans"],a:2,ex:"Loi du 27 février 2017 : 6 ans pour les délits (dont exercice illégal, informations mensongères, non-révélation). Délai butoir de 12 ans pour les infractions occultes.",sr:"Loi 2017-242 / CPP art. 8"},
{id:"v6r50",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Comparez la prescription de l'action disciplinaire du CAC (H2A) et celle de l'EC (Ordre) : quelles sont les différences fondamentales ?",a:"Pour le CAC : la prescription disciplinaire est de 6 ans (art. L. 821-73 C. com.) si aucun acte tendant à la recherche, constatation ou sanction n'a été fait pendant ce délai. Pour l'EC : il n'existe pas de prescription de l'action disciplinaire devant les chambres de l'Ordre. Les faits peuvent être poursuivis sans limitation de durée. C'est une différence fondamentale qui justifie la conservation prolongée des dossiers par l'EC (minimum 8 ans recommandés).",sr:"C. com., art. L. 821-73 / Ord. 1945, art. 53 / CNOEC 2025",kw:["CAC","6 ans","prescription","acte","recherche","EC","pas de prescription","imprescriptible","illimitée","conservation","dossiers","8 ans"],tip:"C'est une question de comparaison : le CAC bénéficie d'une prescription de 6 ans, l'EC n'en bénéficie pas. Citez les textes et la conséquence pratique (conservation des dossiers)."},

// ═══════════════════════════════════════════════
// V7 PASSE 1 — Questions d'annales DEC (nov 2024, mai 2024, mai 2025, nov 2025) + documents non exploités
// ═══════════════════════════════════════════════

// ── ANNALES DEC — Questions tombées non encore couvertes ──

// Mai 2025 EC
{id:"v7a1",p:"EC",th:"Déontologie",ty:"qcm",q:"Un cabinet d'expertise comptable peut-il référencer le nom et le logo de ses clients sur son site internet ?",ch:["Oui, sans restriction","Non, c'est interdit par le code de déontologie","Oui, avec l'accord écrit préalable du client","Non, sauf pour les clients cotés"],a:2,ex:"L'accord écrit du client est nécessaire (obligation de confidentialité contractuelle, art. 147 et 152 décret 2012-432). L'EC ne peut divulguer des informations sur ses clients sans leur consentement.",sr:"Art. 147 et 152 décret 2012-432 / DEC Mai 2025 Q3"},
{id:"v7a2",p:"EC",th:"Qualité",ty:"qcm",q:"Dans le cadre d'une mission de présentation des comptes (NP 2300) en l'absence de CAC, l'EC délivre une attestation dont le niveau d'assurance est :",ch:["Raisonnable","Modéré","Aucune assurance","Absolu"],a:1,ex:"La NP 2300 exprime une assurance modérée sur la cohérence et la vraisemblance des comptes.",sr:"NP 2300 / DEC Mai 2025 Q4"},
{id:"v7a3",p:"EC",th:"Qualité",ty:"qrc",q:"Dans quelles situations l'expert-comptable doit-il refuser d'accepter une mission ?",a:"L'EC doit refuser une mission lorsque : 1) il ne peut pas la réaliser conformément aux textes légaux, réglementaires et aux normes professionnelles (art. 150 décret) ; 2) il conclut à un manque d'intégrité du client (NPMQ §18) ; 3) il ne dispose pas de la compétence, du temps ou des ressources nécessaires ; 4) il existe un conflit d'intérêts (art. 145) ; 5) son indépendance est compromise (art. 146) ; 6) les honoraires du prédécesseur ne sont pas réglés (art. 163).",sr:"Art. 150, 145, 146, 163 décret 2012-432 / NPMQ §18 / DEC Mai 2025 Q7",kw:["conformité","textes","normes","intégrité","compétence","temps","ressources","conflit d'intérêts","indépendance","honoraires","prédécesseur"],tip:"Question tombée au DEC mai 2025. Structurez en listant les 6 cas principaux avec les articles correspondants."},
{id:"v7a4",p:"EC",th:"Qualité",ty:"qrc",q:"Dans le cadre d'une mission d'examen limité des comptes (NP 2400), citez quatre des cinq conclusions possibles du rapport de l'expert-comptable.",a:"Les 5 conclusions possibles sont : 1) Conclusion sans réserve (rien n'a été relevé remettant en cause la conformité) ; 2) Conclusion avec réserve (désaccord ou limitation sur un ou des éléments identifiés mais non significatifs) ; 3) Conclusion défavorable (désaccord significatif et diffus remettant en cause la conformité) ; 4) Impossibilité de conclure (limitation significative et diffuse empêchant de fonder une conclusion) ; 5) Conclusion avec observation(s) (sans affecter la conclusion, attirer l'attention sur un point).",sr:"NP 2400 §25-30 / DEC Mai 2025 Q8",kw:["sans réserve","avec réserve","défavorable","impossibilité de conclure","observation","désaccord","limitation","conformité"],tip:"Question tombée au DEC mai 2025 (3 points). Citez-en au moins 4 avec une description courte de chacune."},
{id:"v7a5",p:"EC",th:"Déontologie",ty:"qrc",q:"À quelles conditions et moyennant quelle précaution un expert-comptable peut-il réaliser une mission à titre gracieux ?",a:"La fixation des honoraires étant libre, aucune règle déontologique n'interdit une mission gratuite. Mais l'EC doit veiller à : 1) respecter le principe d'indépendance (art. 146) — la gratuité ne doit pas compromettre l'indépendance ; 2) respecter le niveau de diligence requis par les normes professionnelles ; 3) se rapprocher de son assureur pour vérifier la couverture (les missions gratuites n'entrent pas dans le calcul de la prime basée sur le CA, mais le contrat groupe les couvre) ; 4) conclure une lettre de mission obligatoire (art. 151).",sr:"CNOEC Exercice professionnel 2025 §3.1 / Art. 146, 151 décret 2012-432 / DEC Mai 2025 Q10",kw:["libre","gratuit","indépendance","article 146","diligence","normes","assureur","couverture","lettre de mission","obligatoire"],tip:"Question tombée au DEC mai 2025. Les 4 points clés : indépendance, diligence, assurance, lettre de mission."},

// Mai 2025 CAC
{id:"v7a6",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC d'une société tête d'un petit groupe au sens de l'article L. 821-43 peut-il demander des informations aux CAC des filiales significatives ?",ch:["Non, le secret professionnel s'y oppose","Oui, sans restriction","Oui, dans le cadre de la certification des comptes consolidés","Non, sauf accord du dirigeant de la filiale"],a:2,ex:"Art. L. 823-18 C. com. : le CAC du groupe peut demander aux CAC des sociétés du groupe les informations nécessaires à la certification des comptes consolidés.",sr:"C. com., art. L. 823-18 / DEC Mai 2025 Q15"},
{id:"v7a7",p:"CAC",th:"Exercice",ty:"qrc",q:"Le CAC réalisant une prestation pour une entité dans laquelle il n'est pas investi d'une mission de certification a-t-il l'obligation de signaler un fait délictueux porté à sa connaissance ?",a:"Non. L'obligation de révélation des faits délictueux au procureur (art. L. 821-10 C. com.) ne s'applique qu'aux missions de certification et aux missions légales. Pour les prestations (services et attestations hors mission légale), le CAC n'a pas cette obligation de révélation. Toutefois, il reste soumis au code de déontologie (Titre I) et aux obligations LBC-FT (déclaration à TRACFIN si soupçon de blanchiment).",sr:"C. com., art. L. 821-10 / Code déonto. Titre I / DEC Mai 2025 Q18",kw:["non","révélation","faits délictueux","procureur","certification","missions légales","prestations","pas obligation","LBC-FT","TRACFIN"],tip:"Question tombée au DEC mai 2025. Le piège est de croire que l'obligation de révélation s'étend à toutes les interventions du CAC. Elle ne vise que les missions légales."},
{id:"v7a8",p:"CAC",th:"Exercice",ty:"qcm",q:"Qui peut demander l'élaboration d'une norme d'exercice professionnel (NEP) en dehors de la H2A ?",ch:["Le ministère de la Justice, l'AMF","Le ministère de la Justice, l'AMF, l'ANC","Le ministère de la Justice, l'AMF, le Conseil de normalisation des comptes publics","Tout organisme professionnel"],a:2,ex:"Art. L. 820-3 C. com. : le garde des sceaux, l'AMF et le Conseil de normalisation des comptes publics peuvent demander l'élaboration d'une NEP. La CRCC ne le peut pas.",sr:"C. com., art. L. 820-3 / DEC Mai 2025 Q19 / DEC Nov 2025 Q20"},
{id:"v7a9",p:"CAC",th:"Exercice",ty:"qcm",q:"Quel contrôle particulier le CAC d'un organisme faisant appel à la générosité du public percevant plus de 153 000 € de dons doit-il effectuer ?",ch:["Un audit des comptes consolidés","Un contrôle de la publicité sincère des comptes et du compte d'emploi des ressources","Un rapport sur la gouvernance","Un rapport sur la conformité RGPD"],a:1,ex:"Loi du 7 août 1991 : le CAC vérifie la publication sincère des comptes annuels et le compte d'emploi des ressources (CER) qui justifie de l'utilisation des dons.",sr:"Loi 91-772 du 7/08/1991 / DEC Mai 2025 Q17"},

// Nov 2024 CAC
{id:"v7a10",p:"CAC",th:"Exercice",ty:"qcm",q:"Le candidat à l'inscription sur la liste des CAC qui se voit refuser l'inscription par la H2A peut former un recours devant :",ch:["Le tribunal de commerce","La cour d'appel","La juridiction administrative","Le Conseil d'État en premier et dernier ressort"],a:2,ex:"Art. R. 821-68 C. com. : les décisions en matière d'inscription sont susceptibles de recours devant la juridiction administrative.",sr:"C. com., art. R. 821-68 / DEC Nov 2024 Q12"},
{id:"v7a11",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les exigences quantitatives de formation continue pour les CAC inscrits sur la liste de l'article L. 821-13 ?",a:"La formation continue est de 120 heures au cours de 3 années consécutives, avec un minimum de 20 heures par année (art. A. 821-45 C. com.). La déclaration annuelle est faite au plus tard le 31 mars auprès de la H2A ou de son délégataire. Les justificatifs sont conservés pendant 6 ans.",sr:"Art. A. 821-45, R. 821-70 C. com. / DEC Nov 2024 Q18",kw:["120 heures","3 années","consécutives","20 heures","minimum","année","déclaration","31 mars","H2A","justificatifs","6 ans"],tip:"Question tombée au DEC nov 2024. Les chiffres clés : 120h/3 ans, 20h minimum/an, déclaration au 31 mars, conservation 6 ans."},
{id:"v7a12",p:"CAC",th:"Exercice",ty:"qrc",q:"Citez les six types d'actions éligibles à l'obligation de formation continue du CAC.",a:"Les 6 actions éligibles (art. A. 821-46 C. com.) sont : 1) Participation à des séminaires de formation, programmes d'autoformation encadrée ou formations à distance ; 2) Assistance à des colloques ou conférences (max 45h/3 ans) ; 3) Conception ou animation de formations, colloques, conférences ou enseignements (max 20h/an) ; 4) Rédaction et publication de travaux à caractère technique (max 30h/3 ans) ; 5) Participation à des travaux à caractère technique (commissions CNCC, ANC, etc.) (max 20h/3 ans) ; 6) Participation au programme de formation continue particulière (art. L. 821-24 II).",sr:"Art. A. 821-46 C. com. / DEC Nov 2024 Q19",kw:["séminaires","autoformation","colloques","45 heures","conception","animation","20 heures","rédaction","publication","30 heures","travaux techniques","formation particulière"],tip:"Question tombée au DEC nov 2024. Citez les 6 actions AVEC leurs plafonds respectifs — c'est ce qui distingue un bon candidat."},
{id:"v7a13",p:"CAC",th:"Exercice",ty:"qrc",q:"Que comporte la déclaration de prestation annuelle obligatoire du CAC prescrite à l'article D.821-186 du code de commerce ?",a:"La déclaration d'activité annuelle comporte : 1) la liste des personnes et entités auprès desquelles le CAC exerce des missions de certification (en précisant si EIP) ; 2) pour chacune, le total du bilan, des produits d'exploitation et financiers, le nombre d'heures correspondant ; 3) la liste des salariés, leurs mandats, les missions auxquelles ils participent et leurs heures ; 4) pour les autres missions ou prestations : la liste des entités, la nature des missions et le montant total des honoraires facturés ; 5) le remboursement des frais de déplacement et de séjour.",sr:"C. com., art. R. 823-10 (ancien) / DEC Nov 2024 Q20",kw:["liste","entités","certification","EIP","bilan","produits","heures","salariés","mandats","honoraires","frais","déplacement"],tip:"Question tombée au DEC nov 2024. La déclaration est adressée par voie électronique à la CRCC, qui la transmet à la CNCC puis à la H2A."},

// Nov 2025 (QCM)
{id:"v7a14",p:"EC",th:"Qualité",ty:"qcm",q:"À l'issue de ses travaux, l'EC ayant une mission de présentation des comptes dans une entité dotée d'un CAC pourra délivrer :",ch:["Un refus d'attester","Un compte-rendu de mission","Un rapport sur la mission de présentation","Un compte-rendu de travaux"],a:3,ex:"En présence d'un CAC, l'EC ne délivre qu'un compte-rendu de travaux (et non une attestation normée). L'attestation n'est possible qu'en l'absence de CAC.",sr:"NP 2300 §18 / DEC Nov 2025 Q3"},
{id:"v7a15",p:"EC",th:"Déontologie",ty:"qcm",q:"Parmi les missions suivantes, laquelle ne peut PAS être rémunérée au succès ?",ch:["Accompagnement au financement","Accompagnement à la cession d'entreprise","Recouvrement de créances clients","Optimisation des coûts (hors fiscal/social)"],a:2,ex:"Le recouvrement de créances clients relève de la prérogative d'exercice exclusive (art. 22 al. 4 ord. 1945) et ne peut être rémunéré au succès. Les autres missions citées le peuvent.",sr:"Art. 24 ord. 1945 / CNOEC 2025 §3.2 / DEC Nov 2025 Q5"},
{id:"v7a16",p:"CAC",th:"Déontologie",ty:"qcm",q:"En matière de fixation des honoraires du CAC pour une mission de certification, quelle affirmation est ERRONÉE ?",ch:["L'entité contrôlée peut saisir le président de la CRCC pour demander une dérogation au barème","En cas de désaccord, recours devant le bureau de la H2A","Le montant de la vacation horaire est fixé d'un commun accord entre le CAC et l'entité contrôlée","Le déclenchement de la procédure d'alerte peut augmenter les heures de plus d'un tiers"],a:2,ex:"Le montant de la vacation horaire N'EST PAS fixé d'un commun accord : il résulte du barème horaire réglementaire (art. R. 823-14 C. com.).",sr:"C. com., art. R. 823-14, R. 823-15 / DEC Nov 2025 Q13"},
{id:"v7a17",p:"CAC",th:"Déontologie",ty:"qcm",q:"Parmi les conditions de la sollicitation personnalisée du CAC, laquelle est ERRONÉE ?",ch:["Elle doit procurer une information sincère","Elle doit être réalisée sous la forme d'un appel téléphonique","Elle doit exclure tout élément comparatif ou dénigrant","Elle doit préciser les modalités de détermination des honoraires"],a:1,ex:"Art. 15-16 code déontologie : la sollicitation personnalisée est autorisée uniquement par envoi postal ou courrier électronique. L'appel téléphonique est INTERDIT.",sr:"Code déontologie CAC, art. 15-16 / DEC Nov 2025 Q14"},
{id:"v7a18",p:"CAC",th:"Qualité",ty:"qcm",q:"La procédure simplifiée de sanction du CAC ne peut être mise en œuvre que pour :",ch:["Tout manquement professionnel","Les manquements aux obligations de déclaration des honoraires et de formation continue","Les fautes disciplinaires graves","Les manquements LBC-FT uniquement"],a:1,ex:"Art. L. 821-81 C. com. : procédure simplifiée limitée aux manquements répétés aux obligations de déclaration des honoraires et à l'obligation de formation continue. Sanction pécuniaire max 15 000 €.",sr:"C. com., art. L. 821-81 / Fiche CNCC n°4 / DEC Nov 2025 Q18 (remanié)"},

// Mai 2024 EC
{id:"v7a19",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les deux phases complémentaires mises en œuvre lors du contrôle de qualité des EC ?",a:"Le contrôle de qualité comporte deux phases complémentaires : 1) Le contrôle structurel : il porte sur l'organisation générale du cabinet (lettres de mission, assurance, formation continue, LBC-FT, respect du code de déontologie, SMQ). 2) Le contrôle technique : il porte sur les dossiers de travail et les missions réalisées (qualité des diligences, conformité aux normes professionnelles, adéquation des conclusions). Un rapport est établi avec observations et recommandations, servant de base à la lettre de conclusion du président du CROEC.",sr:"Art. 170 décret 2012-432 / Contrôle de qualité en pratique 2018 / DEC Mai 2024 Q2",kw:["contrôle structurel","organisation","cabinet","assurance","déontologie","contrôle technique","dossiers","missions","diligences","normes","rapport","lettre de conclusion"],tip:"Question tombée au DEC mai 2024. Distinguez bien les deux phases : structurel (le cabinet) et technique (les dossiers)."},
{id:"v7a20",p:"EC",th:"Qualité",ty:"qrc",q:"Dans le cadre d'une mission de présentation (NP 2300) en l'absence de CAC, quelles sont les trois conclusions possibles de l'attestation normée de l'EC ?",a:"Les trois conclusions possibles sont : 1) Attestation sans réserve : les comptes sont cohérents et vraisemblables. 2) Attestation avec réserve(s) : un ou des éléments identifiés remettent en cause la cohérence ou la vraisemblance mais de manière limitée. 3) Refus d'attester : les éléments sont significatifs et diffus au point que l'EC ne peut exprimer une assurance modérée sur les comptes.",sr:"NP 2300 §16-17 / DEC Mai 2024 Q7",kw:["attestation","sans réserve","cohérents","vraisemblables","avec réserve","limitée","refus d'attester","significatifs","diffus","assurance modérée"],tip:"Question tombée au DEC mai 2024 (3 points). Attention : en présence d'un CAC, c'est un simple compte-rendu de travaux."},
{id:"v7a21",p:"EC",th:"Exercice",ty:"qcm",q:"Un EC peut-il sous-traiter la tenue de comptabilité à une personne titulaire du DSCG mais non diplômée d'expertise comptable ?",ch:["Oui, si la personne est salariée du cabinet","Oui, sans restriction","Non, cela constituerait de l'exercice illégal","Oui, avec l'accord du conseil régional"],a:2,ex:"La tenue de comptabilité relève de la prérogative d'exercice exclusive (art. 2 ord. 1945). La sous-traiter à un non-inscrit constitue une couverture d'exercice illégal. La personne doit être salariée du cabinet ou inscrite à l'Ordre.",sr:"Art. 2 et 20 ord. 1945 / DEC Mai 2024 Q6"},
{id:"v7a22",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les différentes étapes du devoir de conseil de l'expert-comptable ?",a:"Les étapes du devoir de conseil sont : 1) S'informer : collecter les informations nécessaires auprès du client, ne pas se contenter de ses seules déclarations. 2) Analyser : exercer son jugement professionnel sur la situation du client au regard des textes. 3) Informer et conseiller : donner des informations exactes, formuler des recommandations et des mises en garde (art. 155 code déontologie). 4) Formaliser : consigner le conseil par écrit (lettre, compte-rendu de mission) pour preuve. 5) Suivre : vérifier que le client a pris en compte le conseil donné.",sr:"Art. 155 décret 2012-432 / CNOEC 2025 / DEC Mai 2024 Q9",kw:["informer","collecter","analyser","jugement","conseiller","recommandations","mises en garde","formaliser","écrit","preuve","suivre","article 155"],tip:"Question tombée au DEC mai 2024. Le défaut de conseil est la première source de responsabilité civile — structurez bien les étapes."},
{id:"v7a23",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quelle est la composition de la chambre nationale de discipline de l'Ordre des EC ?",a:"La chambre nationale de discipline est composée de : 1) un président et un président suppléant, conseillers d'État désignés par le vice-président du Conseil d'État ; 2) deux membres titulaires et deux membres suppléants du Conseil national de l'Ordre, élus par celui-ci. La chambre nationale statue en appel des décisions des chambres régionales de discipline. Le Commissaire du Gouvernement assiste aux audiences mais n'assiste pas au délibéré.",sr:"Art. 50 ord. 1945 / DEC Mai 2024 Q5",kw:["président","conseiller d'État","vice-président","deux membres","Conseil national","élus","appel","chambres régionales","Commissaire du Gouvernement"],tip:"Question tombée au DEC mai 2024. Ne confondez pas avec la composition de la Commission des sanctions du H2A (qui concerne les CAC)."},

// Mai 2024 CAC (partie visible dans les corrigés)
{id:"v7a24",p:"CAC",th:"Exercice",ty:"qcm",q:"La formation continue particulière requise pour un CAC n'ayant pas exercé de mission de certification pendant 3 ans est de :",ch:["20 heures","40 heures","60 heures","120 heures"],a:1,ex:"Art. R. 821-71 C. com. : 40 heures dans les 18 mois précédant l'acceptation de la mission (20h programme CNCC obligatoire + 20h formation volontaire).",sr:"C. com., art. R. 821-71"},

// ── DOCUMENTS NON EXPLOITÉS — Secret professionnel EC ──

{id:"v7a25",p:"EC",th:"Déontologie",ty:"qcm",q:"Le secret professionnel de l'EC est sanctionné pénalement par :",ch:["L'article 21 de l'ordonnance de 1945","L'article 226-13 du Code pénal (1 an, 15 000 €)","L'article 433-17 du Code pénal","L'article L. 820-4 du Code de commerce"],a:1,ex:"Art. 21 ord. 1945 renvoie à l'art. 226-13 Code pénal : 1 an d'emprisonnement et 15 000 € d'amende pour révélation d'information à caractère secret.",sr:"Art. 21 ord. 1945 / Art. 226-13 Code pénal / Secret professionnel 2021"},
{id:"v7a26",p:"EC",th:"Déontologie",ty:"qrc",q:"Dans quels cas l'expert-comptable est-il délié du secret professionnel en vertu de la loi ?",a:"L'EC est délié du secret professionnel dans les cas suivants : 1) Déclaration de soupçon à TRACFIN (art. L. 561-15 CMF) — aucune poursuite pour rupture du secret. 2) Réponse au droit de communication de TRACFIN (art. L. 561-25 CMF). 3) Information ouverte contre l'EC ou poursuites engagées par les pouvoirs publics (art. 21 al. 4 ord. 1945). 4) Actions intentées devant les chambres de discipline de l'Ordre. 5) Vis-à-vis des membres du comité LBC-FT et contrôleurs de l'Ordre lors de contrôles LBC-FT.",sr:"Art. 21 ord. 1945 / Art. L. 561-22 CMF / CNOEC Secret professionnel 2021",kw:["TRACFIN","déclaration de soupçon","droit de communication","information ouverte","poursuites","discipline","comité LBC-FT","contrôleurs","délié","secret"],tip:"Listez les 5 cas de levée légale. Le piège classique est de croire que le CAC peut lever le secret pour les mêmes raisons que l'EC — les régimes sont différents."},

// ── DOCUMENTS NON EXPLOITÉS — Contrôle de qualité en pratique ──

{id:"v7a27",p:"EC",th:"Qualité",ty:"qcm",q:"Le contrôlé est informé du contrôle qualité EC au moins :",ch:["30 jours avant","45 jours avant","60 jours avant","90 jours avant"],a:2,ex:"Art. 421 et s. arrêté du 3 mai 2012 : le contrôlé est informé par le CROEC 60 jours au moins avant le contrôle sur place.",sr:"Arrêté 3/05/2012, art. 421 / Contrôle qualité en pratique 2018"},
{id:"v7a28",p:"EC",th:"Qualité",ty:"qcm",q:"Le délai accordé au contrôlé pour demander la récusation du contrôleur qualité EC est de :",ch:["15 jours","30 jours","45 jours","60 jours"],a:1,ex:"Art. 439 arrêté du 3 mai 2012 : le contrôlé dispose de 30 jours pour demander la récusation du ou des contrôleurs.",sr:"Arrêté 3/05/2012, art. 439 / Contrôle qualité en pratique 2018"},

// ── DOCUMENTS NON EXPLOITÉS — Formation continue + H2A FAQ ──

{id:"v7a29",p:"CAC",th:"Qualité",ty:"qcm",q:"La sanction pécuniaire maximale dans le cadre de la procédure simplifiée de sanction du CAC est de :",ch:["5 000 €","10 000 €","15 000 €","50 000 €"],a:2,ex:"Art. L. 821-81 C. com. : la procédure simplifiée ne peut aboutir qu'à une sanction pécuniaire n'excédant pas 15 000 €.",sr:"C. com., art. L. 821-81 / Fiche CNCC n°4"},
{id:"v7a30",p:"CAC",th:"Déontologie",ty:"qcm",q:"Les honoraires du CAC peuvent-ils être proportionnels ou conditionnels ?",ch:["Oui, si accord du client","Non, c'est interdit par l'article 13 du code de déontologie","Oui, pour les prestations hors certification","Non, sauf accord de la H2A"],a:1,ex:"Art. 13 code de déontologie CAC : interdiction des honoraires proportionnels ou conditionnels, quelle que soit la mission ou prestation.",sr:"Code déontologie CAC, art. 13"},

// ── DOCUMENTS NON EXPLOITÉS — Conventions réglementées ──

{id:"v7a31",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC vérifie les conventions réglementées conclues au cours de l'exercice sur la base :",ch:["De sa propre recherche active","Des informations qui lui sont communiquées par les intéressés","De la liste établie par le conseil d'administration","Du registre des conventions tenu par le greffe"],a:1,ex:"Le CAC est informé des conventions par les parties intéressées (dirigeants, actionnaires significatifs). Il n'a pas d'obligation de recherche active des conventions non déclarées.",sr:"C. com., art. L. 225-40 / Conventions réglementées 2014"},

// ── DOCUMENTS NON EXPLOITÉS — NP 2300 et missions EC ──

{id:"v7a32",p:"EC",th:"Qualité",ty:"qcm",q:"La mission de présentation des comptes (NP 2300) peut-elle porter sur des comptes consolidés ?",ch:["Oui, sans restriction","Oui, si l'entité n'est pas dotée d'un CAC","Non, elle n'est pas applicable aux comptes consolidés","Oui, mais uniquement pour les petits groupes"],a:2,ex:"NP 2300 : la mission de présentation n'est pas applicable aux comptes consolidés. L'examen limité (NP 2400) peut en revanche porter sur des comptes consolidés.",sr:"NP 2300 / Cadre de référence"},
{id:"v7a33",p:"EC",th:"Qualité",ty:"qcm",q:"La mission d'examen d'informations financières prévisionnelles est régie par la norme :",ch:["NP 2300","NP 2400","NP 3100","NP 3530"],a:3,ex:"La NP 3530 régit l'examen d'informations financières prévisionnelles (budgets, business plans).",sr:"NP 3530 / Cadre de référence / Réf. normatif 2025"},

// ── Corrigés sessions antérieures — thèmes sous-exploités ──

{id:"v7a34",p:"EC",th:"Déontologie",ty:"qcm",q:"Le serment du CAC est prêté devant :",ch:["Le président du tribunal de commerce","La cour d'appel dont il relève","Le président de la CRCC","Le président de la H2A"],a:1,ex:"Art. L. 821-23 C. com. : le CAC prête serment devant la cour d'appel. Formule : remplir les devoirs avec honneur, probité et indépendance.",sr:"C. com., art. L. 821-23"},
{id:"v7a35",p:"CAC",th:"Déontologie",ty:"qrc",q:"Citez les principes fondamentaux de comportement du CAC tels qu'ils figurent dans la Section 1 du Titre I du code de déontologie.",a:"Les principes fondamentaux de comportement (Section 1, Titre I) sont : 1) Intégrité (art. 3 : honnêteté, droiture, probité) ; 2) Impartialité (art. 4) ; 3) Indépendance et prévention des conflits d'intérêts (art. 5) ; 4) Esprit critique (art. 6) ; 5) Compétence et diligence (art. 7) ; 6) Confraternité (art. 8) ; 7) Secret professionnel et discrétion (art. 9).",sr:"Code déontologie CAC, art. 3 à 9 / DEC Mai 2025 Q16",kw:["intégrité","honnêteté","droiture","probité","impartialité","indépendance","conflits d'intérêts","esprit critique","compétence","diligence","confraternité","secret professionnel","discrétion"],tip:"Question tombée au DEC mai 2025. Les 7 principes doivent être cités avec leurs articles. Attention : sincérité N'EST PAS dans la liste (piège classique)."},

// ── NI II — Événements postérieurs à la clôture ──

{id:"v7b1",p:"CAC",th:"Qualité",ty:"qcm",q:"Après la date de signature de son rapport, le CAC met-il en œuvre des procédures d'audit pour identifier les événements postérieurs ?",ch:["Oui, jusqu'à la date d'approbation des comptes","Oui, pendant 30 jours","Non, il ne met plus en œuvre de procédures","Oui, mais uniquement pour les EIP"],a:2,ex:"NEP 560 §15 : après la date de signature de son rapport, le CAC ne met plus en œuvre de procédures d'audit pour identifier les événements postérieurs.",sr:"NEP 560, §15 / NI II"},
{id:"v7b2",p:"CAC",th:"Qualité",ty:"qrc",q:"Comment le CAC traite-t-il un événement postérieur important dont il a connaissance entre la date de signature de son rapport et la date d'approbation des comptes, lorsque cet événement est survenu après la date d'arrêté ?",a:"Le CAC s'enquiert auprès de l'organe compétent de son intention de communiquer une information sur cet événement à l'organe appelé à statuer sur les comptes. Si aucune communication n'est prévue, le CAC rédige lui-même une communication dont il est donné lecture lors de la réunion de l'organe appelé à statuer ou qui est portée à sa connaissance.",sr:"NEP 560, §18 / NI II",kw:["organe compétent","communication","information","statuer","rédige","lecture","réunion","approbation","connaissance"],tip:"Distinguez les 3 périodes : avant arrêté (traitement comptable), entre arrêté et signature (nouvel arrêté possible), après signature (communication à l'AG)."},

// ── NI IV — Déclarations de la direction ──

{id:"v7b3",p:"CAC",th:"Qualité",ty:"qcm",q:"La lettre d'affirmation de la direction est obtenue par le CAC :",ch:["Avant le début de l'audit","À la date de signature du rapport du CAC ou à une date aussi proche que possible","Dans les 30 jours suivant la clôture","Au moment de l'acceptation du mandat"],a:1,ex:"NEP 580 §12 : les déclarations écrites de la direction sont datées de la même date que le rapport du CAC ou d'une date aussi proche que possible.",sr:"NEP 580, §12 / NI IV"},
{id:"v7b4",p:"CAC",th:"Qualité",ty:"qcm",q:"Si la direction refuse de fournir les déclarations écrites demandées par le CAC, celui-ci doit :",ch:["Poursuivre sa mission normalement","Formuler une réserve pour limitation","En tirer les conséquences sur son opinion, pouvant aller jusqu'au refus de certifier","Informer la H2A"],a:2,ex:"NEP 580 §14-15 : le refus de fournir des déclarations est une limitation à l'étendue des travaux dont le CAC tire les conséquences sur son opinion.",sr:"NEP 580, §14-15 / NI IV"},

// ── NI V — Opérations sur le capital ──

{id:"v7b5",p:"CAC",th:"Exercice",ty:"qcm",q:"Dans le cadre d'une augmentation de capital avec suppression du DPS, le CAC doit établir :",ch:["Un rapport général uniquement","Un rapport spécial sur les conventions réglementées","Un rapport sur l'opération projetée","Un simple compte-rendu de mission"],a:2,ex:"Art. L. 225-135 C. com. : le CAC établit un rapport sur l'opération projetée (suppression du DPS), portant notamment sur le prix d'émission et ses conditions de détermination.",sr:"C. com., art. L. 225-135 / NI V Tome 3"},

// ── NI VII — Confirmation des tiers ──

{id:"v7b6",p:"CAC",th:"Qualité",ty:"qcm",q:"Lorsque le CAC n'obtient pas de réponse à une demande de confirmation des tiers, il doit :",ch:["Formuler une réserve pour limitation","Mettre en œuvre des procédures d'audit alternatives","Considérer l'élément comme confirmé","Relancer le tiers au moins trois fois"],a:1,ex:"NEP 505 §13 : en l'absence de réponse, le CAC met en œuvre des procédures alternatives permettant de collecter les éléments nécessaires.",sr:"NEP 505, §13 / NI VII"},
{id:"v7b7",p:"CAC",th:"Qualité",ty:"qcm",q:"La direction peut-elle refuser l'envoi de demandes de confirmation des tiers par le CAC ?",ch:["Non, elle ne peut jamais s'y opposer","Oui, mais le CAC doit évaluer si le refus est fondé et en tirer les conséquences","Oui, c'est son droit absolu","Non, sauf pour les clients de l'entité"],a:1,ex:"NEP 505 §10-12 : la direction peut refuser, mais le CAC doit évaluer si c'est fondé. Si non fondé, il en tire les conséquences dans son rapport.",sr:"NEP 505, §10-12 / NI VII"},

// ── NI VIII — Procédures analytiques ──

{id:"v7b8",p:"CAC",th:"Qualité",ty:"qcm",q:"Les procédures analytiques sont utilisées par le CAC à quels stades de l'audit ?",ch:["Uniquement lors de la planification","Uniquement en fin d'audit pour la revue d'ensemble","Lors de la planification, pendant l'audit (contrôles de substance) et en fin d'audit","Uniquement pendant l'audit comme contrôle de substance"],a:2,ex:"NEP 520 : les procédures analytiques sont utilisées à 3 stades : planification (prise de connaissance), contrôles de substance (audit), et revue de la cohérence d'ensemble (conclusion).",sr:"NEP 520 / NI VIII"},

// ── NI X — Changements comptables ──

{id:"v7b9",p:"CAC",th:"Qualité",ty:"qrc",q:"Quels sont les trois types de changements comptables que le CAC doit vérifier et quelles sont les diligences correspondantes ?",a:"Les trois types sont : 1) Changement de méthodes comptables : le CAC vérifie que le changement est justifié et que l'information pro forma est correctement établie. 2) Changement d'estimations comptables : le CAC apprécie si les nouvelles estimations reposent sur des hypothèses raisonnables et si l'information en annexe est suffisante. 3) Correction d'erreurs : le CAC vérifie la correcte comptabilisation de la correction et l'information en annexe. Le CAC doit également vérifier la mention de ces changements dans l'annexe et dans le rapport de gestion, et les traiter dans ses justifications des appréciations.",sr:"NEP 730 / NI X / PCG art. 122",kw:["changement de méthodes","estimations","correction d'erreurs","justifié","pro forma","hypothèses","annexe","rapport de gestion","justifications des appréciations"],tip:"3 types distincts avec des diligences différentes. Le changement de méthodes est le plus fréquemment testé au DEC."},

// ── NI XIII — Premier exercice d'un nouveau mandat ──

{id:"v7b10",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les principales diligences du CAC lors du premier exercice de son mandat concernant le bilan d'ouverture ?",a:"Le CAC doit (NEP 510) : 1) Prendre connaissance des conclusions du prédécesseur et consulter son dossier de travail ; 2) Vérifier que les soldes d'ouverture ne contiennent pas d'anomalies significatives susceptibles d'avoir une incidence sur les comptes de l'exercice ; 3) Vérifier que les méthodes comptables ont été appliquées de manière permanente ou que les changements ont fait l'objet d'un traitement approprié ; 4) S'il ne parvient pas à obtenir les éléments suffisants, formuler une réserve ou un refus de certifier.",sr:"NEP 510 / NI XIII",kw:["bilan d'ouverture","prédécesseur","dossier","soldes","anomalies","permanence","méthodes","réserve","refus","premier exercice"],tip:"Le contact avec le prédécesseur est essentiel. Si le prédécesseur a formulé des réserves, le CAC doit en évaluer l'incidence sur l'exercice en cours."},

// ── NI XV — Approche d'audit par les risques ──

{id:"v7b11",p:"CAC",th:"Qualité",ty:"qcm",q:"L'approche d'audit par les risques repose sur l'évaluation du risque d'anomalies significatives qui est le produit de :",ch:["Risque inhérent × risque de contrôle","Risque inhérent × risque de non-détection","Risque de contrôle × risque de non-détection","Risque d'audit × risque de contrôle"],a:0,ex:"Le risque d'anomalies significatives (RAS) = risque inhérent × risque de contrôle. Le risque de non-détection est géré par les procédures d'audit du CAC.",sr:"NEP 200 / NEP 315 / NI XV"},

// ── NI XVI — Attestations ──

{id:"v7b12",p:"CAC",th:"Exercice",ty:"qcm",q:"L'attestation délivrée par le CAC en dehors de sa mission de certification relève de :",ch:["Une mission légale","Une prestation contractuelle","Une mission ALPE","Un mandat judiciaire"],a:1,ex:"Les attestations délivrées par le CAC en dehors de la certification sont des prestations contractuelles (services et attestations), encadrées par le code de déontologie Titre I.",sr:"NI XVI / Code déonto. art. 1 et 2"},

// ── NI XVIII — Vérifications spécifiques ──

{id:"v7b13",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les deux grandes catégories de vérifications spécifiques annuelles du CAC selon la NEP 9510 ?",a:"Les deux catégories sont : 1) Vérifications relatives au rapport de gestion et aux autres documents sur la situation financière et les comptes : le CAC vérifie la sincérité (informations reflétant la situation de l'entité), la concordance avec les comptes, la présence des informations requises par les textes, et relève les éventuelles inexactitudes. 2) Vérifications relatives aux informations relevant du rapport sur le gouvernement d'entreprise : rémunérations des mandataires sociaux (exactitude et sincérité), éléments OPA/OPE (conformité), et autres informations (présence et concordance).",sr:"NEP 9510 / NI XVIII",kw:["rapport de gestion","sincérité","concordance","comptes","informations requises","gouvernement d'entreprise","rémunérations","mandataires sociaux","OPA","inexactitudes"],tip:"La NEP 9510 distingue clairement les deux catégories. Pour le rapport de gestion, les mots-clés sont : sincérité + concordance + exhaustivité."},

// ── NI XII — Dividendes ──

{id:"v7b14",p:"CAC",th:"Exercice",ty:"qcm",q:"Le versement d'acomptes sur dividendes nécessite l'établissement préalable d'un rapport par :",ch:["L'expert-comptable","Le commissaire aux comptes","Le directeur financier","Le président du tribunal de commerce"],a:1,ex:"Art. L. 232-12 C. com. : le bilan établi au cours ou à la fin de l'exercice et certifié par un CAC est nécessaire pour distribuer un acompte sur dividende.",sr:"C. com., art. L. 232-12 / NI XII"},

// ── NI XXI — Caractère significatif ──

{id:"v7b15",p:"CAC",th:"Qualité",ty:"qcm",q:"Le seuil de signification de planification (performance materiality) est fixé par rapport au seuil de signification global à un niveau :",ch:["Égal","Supérieur","Inférieur","Double"],a:2,ex:"NEP 320 §6 : le seuil de planification est fixé à un niveau inférieur au seuil de signification global afin de réduire le risque que le total des anomalies non corrigées dépasse le seuil de signification.",sr:"NEP 320, §6 / NI XXI"},

// ── NI XXII — Estimations comptables ──

{id:"v7b16",p:"CAC",th:"Qualité",ty:"qcm",q:"Pour auditer une estimation comptable complexe comportant un risque inhérent élevé, le CAC peut :",ch:["Se fier uniquement aux explications de la direction","Développer sa propre estimation indépendante","Ignorer l'estimation si elle est immatérielle","Déléguer l'évaluation au contrôle interne"],a:1,ex:"NEP 540 : le CAC peut développer sa propre estimation (point estimate) ou son propre intervalle pour évaluer le caractère raisonnable de l'estimation de la direction.",sr:"NEP 540 / NI XXII"},

// ── NI XXIII — Rémunérations mandataires sociaux ──

{id:"v7b17",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC des sociétés cotées doit attester de l'exactitude et de la sincérité des informations relatives aux rémunérations des mandataires sociaux dans le cadre de :",ch:["Son rapport général","Ses vérifications spécifiques (NEP 9510)","Un rapport spécial ad hoc","Un rapport à la H2A"],a:1,ex:"NEP 9510 §12-13 : les informations sur les rémunérations des mandataires sociaux font l'objet d'une attestation spécifique dans la partie « vérifications spécifiques » du rapport sur les comptes.",sr:"NEP 9510, §12-13 / NI XXIII"},

// ── NI VI — Transformation des sociétés ──

{id:"v7b18",p:"CAC",th:"Exercice",ty:"qcm",q:"En cas de transformation d'une SARL en SA, le CAC de la SARL transformée (ou un CAC de transformation désigné) doit établir :",ch:["Un rapport sur la situation de la société uniquement","Un rapport sur la valeur des biens composant l'actif social et les avantages particuliers","Un rapport général sur les comptes","Un rapport au procureur de la République"],a:1,ex:"Art. L. 224-3 C. com. : un CAC établit un rapport sur la situation de la société et un rapport sur la valeur des biens composant l'actif social et sur les avantages particuliers.",sr:"C. com., art. L. 224-3 / NI VI"},

// ── Norme de comportement CAC ──

{id:"v7b19",p:"CAC",th:"Déontologie",ty:"qcm",q:"La norme de déontologie « Sécuriser les interventions du CAC — application des principes fondamentaux de comportement » s'applique :",ch:["Uniquement aux missions de certification","Uniquement aux EIP","À toutes les missions et prestations du CAC","Uniquement aux personnes physiques"],a:2,ex:"§01 de la norme : elle s'applique à tout CAC inscrit, quelle que soit la mission ou prestation, qu'il s'agisse d'une société ou d'une personne physique.",sr:"Norme de comportement, §01 / Art. A. 821-54"},

// ── Norme de sauvegardes CAC ──

{id:"v7b20",p:"CAC",th:"Déontologie",ty:"qcm",q:"Dans la norme de déontologie « risques et sauvegardes », le « tiers objectif, raisonnable et informé » est défini comme une personne qui :",ch:["Fait partie de l'entité contrôlée","Est extérieure à la situation, possède les connaissances suffisantes et peut apprécier objectivement les faits","Est un membre de la H2A","Est un magistrat désigné par le tribunal de commerce"],a:1,ex:"§11 de la norme de sauvegardes : le tiers objectif est extérieur, possède les connaissances suffisantes et peut apprécier si les faits sont de nature à faire naître un doute raisonnable sur l'indépendance.",sr:"Norme de sauvegardes, §11 / Art. A. 822-28-12"},

// ── NI XIX — Centre de Services Partagés (CSP) ──

{id:"v7b21",p:"CAC",th:"Qualité",ty:"qcm",q:"Lorsqu'une entité auditée a recours à un Centre de Services Partagés (CSP) au sein de son groupe, le CAC doit :",ch:["Certifier également les comptes du CSP","Prendre connaissance du contrôle interne du CSP et évaluer son impact sur la mission d'audit","Refuser la mission si un CSP est impliqué","Se limiter aux seules procédures analytiques"],a:1,ex:"NEP 315 / NI XIX : le CAC doit comprendre le contrôle interne du CSP dans la mesure où il a un impact sur l'entité auditée, notamment en obtenant un rapport de type ISAE 3402.",sr:"NEP 315 / NI XIX"},

// ── NI XX — Format ESEF ──

{id:"v7b22",p:"CAC",th:"Exercice",ty:"qcm",q:"Le format d'information électronique unique européen (ESEF) impose aux émetteurs cotés de publier leurs comptes consolidés en :",ch:["Format PDF uniquement","Format XHTML avec balisage XBRL (inline XBRL)","Format Excel","Format Word"],a:1,ex:"Règlement UE 2019/815 : le format ESEF impose la publication en XHTML avec balisage inline XBRL (iXBRL) pour les comptes consolidés IFRS.",sr:"Règlement UE 2019/815 / NI XX / NEP 9520"},

// ── Compléments documents non exploités ──

{id:"v7b23",p:"EC",th:"Exercice",ty:"qcm",q:"L'EC peut-il exercer l'activité de conseil en investissements financiers (CIF) ?",ch:["Non, c'est une activité interdite","Oui, mais uniquement via une filiale non inscrite","Oui, à titre accessoire dans sa structure inscrite, avec immatriculation ORIAS","Oui, sans aucune formalité"],a:2,ex:"L'EC peut exercer le CIF à titre accessoire dans sa structure inscrite. Il est dispensé d'immatriculation ORIAS si le service d'investissement est accessoire (art. L 531-2 g CMF).",sr:"Art. L 531-2 / L 541-1 CMF / CNOEC 2025"},
{id:"v7b24",p:"EC",th:"Déontologie",ty:"qcm",q:"La lettre de mission EC peut-elle être signée par un dirigeant mandataire social non-expert-comptable d'une SEC ?",ch:["Non, jamais","Oui, s'il bénéficie d'une délégation de signature ou de pouvoir","Oui, sans restriction","Non, sauf pour les missions accessoires"],a:1,ex:"La lettre de mission doit être revêtue de la signature sociale. Un non-EC dirigeant peut signer s'il a une délégation de signature ou de pouvoir.",sr:"CNOEC Exercice professionnel 2025, Déontologie §4.1 / DEC Mai 2024 Q8"},
{id:"v7b25",p:"EC",th:"Exercice",ty:"qcm",q:"Les missions relevant de la prérogative d'exercice exclusive (art. 2 ord. 1945) peuvent-elles être rémunérées par des honoraires de succès ?",ch:["Oui, si accord écrit","Non, jamais","Oui, depuis la loi PACTE 2019","Non, sauf pour les missions de révision"],a:1,ex:"Art. 24 ord. 1945 modifié par PACTE : les missions relevant de la prérogative exclusive ou participant à l'établissement de l'assiette fiscale ou sociale ne peuvent être rémunérées au succès.",sr:"Art. 24 ord. 1945 / CNOEC 2025 §3.2 / DEC Mai 2024 Q3"},
