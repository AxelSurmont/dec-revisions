// ── DEVOIR DE CONSEIL — Lacune critique (2→8 questions) ──

{id:"v7k1",p:"EC",th:"Déontologie",ty:"qrc",q:"Quel est le fondement juridique du devoir de conseil de l'EC et quelles sont ses manifestations concrètes ?",a:"Le fondement est l'article 155 du décret 2012-432 : l'EC est tenu d'un devoir d'information et de conseil envers son client. Manifestations concrètes : 1) Informer le client des obligations légales, fiscales et sociales qui s'imposent à lui. 2) Le mettre en garde sur les risques identifiés (non-conformité, options fiscales défavorables). 3) Formuler des recommandations écrites. 4) Alerter sur les conséquences d'un choix du client contraire à l'avis de l'EC. 5) Consigner les conseils donnés dans un courrier ou un compte-rendu pour preuve. Le défaut de conseil est la première cause de mise en jeu de la responsabilité civile de l'EC.",sr:"Art. 155 décret 2012-432 / Jurisprudence constante",kw:["article 155","information","conseil","obligations légales","mettre en garde","risques","recommandations","écrites","alerter","conséquences","consigner","preuve","responsabilité civile"],tip:"Le devoir de conseil est un sujet récurrent au DEC. Le point clé est la formalisation écrite : sans preuve écrite, l'EC ne pourra pas démontrer qu'il a rempli son obligation."},
{id:"v7k2",p:"EC",th:"Déontologie",ty:"qcm",q:"Le devoir de conseil de l'EC est une obligation :",ch:["De résultat","De moyens renforcée","De moyens simple","De garantie"],a:1,ex:"Le devoir de conseil est une obligation de moyens renforcée : la charge de la preuve de l'exécution du conseil incombe à l'EC, et non au client.",sr:"Jurisprudence / CNOEC 2025"},
{id:"v7k3",p:"EC",th:"Responsabilité",ty:"qrc",q:"Un EC n'a pas alerté son client sur l'obligation de déposer ses comptes au greffe. Le client est sanctionné d'une amende. Analysez la responsabilité de l'EC.",a:"L'EC engage sa responsabilité civile contractuelle pour défaut de conseil (art. 155). Les 3 éléments sont réunis : 1) Faute : manquement au devoir de conseil — l'EC aurait dû informer le client de l'obligation de dépôt des comptes (art. L. 232-23 C. com.) et le mettre en garde sur les sanctions encourues. 2) Préjudice : l'amende subie par le client (1 500 € pour les personnes physiques, 7 500 € pour les PM). 3) Lien de causalité : si l'EC avait informé le client, celui-ci aurait pu déposer ses comptes et éviter l'amende. L'EC pourra se défendre en prouvant qu'il a effectivement alerté le client par écrit.",sr:"Art. 155 décret 2012-432 / Art. L. 232-23 C. com. / Art. 1231-1 Code civil",kw:["défaut de conseil","article 155","dépôt des comptes","greffe","L. 232-23","amende","faute","préjudice","lien de causalité","preuve","écrit"],tip:"Cas pratique typique du DEC. Structurez toujours en 3 temps : faute + préjudice + lien de causalité."},
{id:"v7k4",p:"EC",th:"Déontologie",ty:"qrc",q:"L'EC constate que son client n'a pas souscrit d'assurance multirisque professionnelle. Que doit-il faire au titre de son devoir de conseil ?",a:"Au titre de l'article 155, l'EC doit : 1) Informer le client de l'existence de l'obligation ou de l'intérêt de souscrire une assurance multirisque. 2) Le mettre en garde par écrit sur les risques en cas de sinistre (perte d'exploitation, responsabilité civile). 3) Recommander de contacter un courtier ou assureur. 4) Formaliser le conseil dans un courrier ou un compte-rendu de mission signé. 5) Si le client refuse malgré la mise en garde : documenter le refus par écrit. L'EC n'a pas à vérifier que le client a effectivement souscrit l'assurance (obligation de moyens, pas de résultat).",sr:"Art. 155 décret 2012-432 / CNOEC 2025",kw:["informer","assurance","mettre en garde","écrit","risques","sinistre","recommander","formaliser","courrier","refus","documenter","obligation de moyens"],tip:"L'EC n'est pas garant de la décision du client, mais il doit prouver qu'il a bien conseillé. La formalisation écrite est la clé."},
{id:"v7k5",p:"EC",th:"Déontologie",ty:"qcm",q:"En matière de devoir de conseil, la charge de la preuve de l'exécution du conseil incombe à :",ch:["Au client qui invoque le défaut","À l'EC qui doit prouver qu'il a informé et mis en garde","Au juge d'office","Au conseil régional de l'Ordre"],a:1,ex:"Jurisprudence constante (Cass. Civ. 1re, 25 février 1997) : c'est au professionnel de prouver qu'il a exécuté son obligation de conseil, et non au client de prouver le contraire.",sr:"Cass. Civ. 1re / CNOEC 2025"},

// ── PARTIES LIÉES — Lacune critique (1→5 questions) ──

{id:"v7k6",p:"CAC",th:"Qualité",ty:"qcm",q:"Les parties liées de l'entité auditée comprennent notamment :",ch:["Uniquement les dirigeants","Les dirigeants, les actionnaires significatifs et les entités contrôlées ou sous influence notable","Uniquement les entités du même groupe","Les fournisseurs et clients principaux"],a:1,ex:"NEP 550 §03 : les parties liées incluent les dirigeants, actionnaires significatifs, entités contrôlées, sous influence notable, entités sœurs, et les membres de la famille proche des dirigeants.",sr:"NEP 550, §03"},
{id:"v7k7",p:"CAC",th:"Qualité",ty:"qrc",q:"Pourquoi les transactions avec les parties liées présentent-elles un risque accru d'anomalies significatives pour le CAC ?",a:"Les transactions avec les parties liées présentent un risque accru car : 1) Elles peuvent ne pas être conclues aux conditions normales du marché (prix de transfert, conditions avantageuses). 2) Elles peuvent masquer la situation financière réelle de l'entité (transferts de résultats, prêts non rémunérés). 3) Elles créent un risque de fraude : les dirigeants peuvent utiliser les parties liées pour organiser des circuits financiers opaques. 4) Le risque de non-exhaustivité : des transactions avec des parties liées non déclarées peuvent ne pas être identifiées. 5) L'information en annexe peut être incomplète ou trompeuse. Le CAC doit obtenir des déclarations écrites de la direction confirmant l'exhaustivité des informations communiquées (NEP 550 §22).",sr:"NEP 550 §05-24",kw:["conditions normales","marché","prix de transfert","situation financière","fraude","circuits opaques","non-exhaustivité","non déclarées","annexe","déclarations écrites","exhaustivité"],tip:"Les parties liées sont un sujet transversal (NEP 550 + conventions réglementées). Le risque de non-exhaustivité est le plus critique."},
{id:"v7k8",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelle est la différence entre les conventions réglementées et les conventions libres ? Comment le CAC les traite-t-il ?",a:"Les conventions réglementées (art. L. 225-38 C. com.) sont celles conclues entre la société et un administrateur, le DG, un actionnaire >10% ou une entité liée. Elles nécessitent une autorisation préalable du CA et font l'objet du rapport spécial du CAC à l'AG. Les conventions libres (art. L. 225-39) sont les opérations courantes conclues à des conditions normales — elles n'ont pas à être autorisées ni rapportées au CAC. Les conventions interdites (art. L. 225-43) sont celles prohibées par la loi (emprunts, découverts, cautions au profit des dirigeants personnes physiques). Le CAC vérifie pour les conventions réglementées : la procédure d'autorisation, la nature et les conditions, et les mentionne dans son rapport spécial.",sr:"C. com., art. L. 225-38 à L. 225-43 / NI IX",kw:["réglementées","autorisation","CA","rapport spécial","AG","libres","opérations courantes","conditions normales","interdites","emprunts","découverts","cautions","dirigeants"],tip:"Les 3 catégories (réglementées/libres/interdites) sont fondamentales. Le CAC n'intervient que sur les réglementées."},
{id:"v7k9",p:"CAC",th:"Qualité",ty:"qcm",q:"Le CAC doit-il vérifier les conventions libres (opérations courantes conclues à des conditions normales) ?",ch:["Oui, dans son rapport spécial","Non, elles sont hors du périmètre du rapport spécial","Oui, si elles dépassent un seuil","Non, sauf pour les EIP"],a:1,ex:"Art. L. 225-39 C. com. : les conventions portant sur des opérations courantes conclues à des conditions normales ne sont pas soumises à la procédure d'autorisation et de rapport.",sr:"C. com., art. L. 225-39 / NI IX"},

// ── CSRD / DURABILITÉ — Lacune (1→5 questions) ──

{id:"v7k10",p:"CAC",th:"Exercice",ty:"qrc",q:"Qu'est-ce que la CSRD et quelles sont les nouvelles obligations du CAC en matière de certification des informations de durabilité ?",a:"La CSRD (Corporate Sustainability Reporting Directive, ordonnance 2023-1142 du 6/12/2023) impose aux entités éligibles de publier un rapport de durabilité. Obligations du CAC : 1) Mission de certification des informations en matière de durabilité (distincte de la certification des comptes). 2) Assurance modérée (limitée) dans un premier temps, avec évolution prévue vers une assurance raisonnable. 3) Normes spécifiques en cours d'élaboration. 4) Le CAC certifiant les informations de durabilité doit disposer de compétences spécifiques et suivre une formation homologuée par la H2A. 5) La mission peut être confiée au CAC titulaire ou à un organisme tiers indépendant (OTI). 6) En co-commissariat, un CAC et un OTI peuvent intervenir conjointement.",sr:"Ord. 2023-1142 / C. com., art. L. 821-54 à L. 821-59",kw:["CSRD","durabilité","ordonnance 2023-1142","rapport","assurance modérée","limitée","raisonnable","compétences","formation","H2A","OTI","organisme tiers indépendant","co-commissariat"],tip:"La CSRD est LE sujet d'actualité pour le DEC. L'assurance est modérée (pas encore raisonnable) et le CAC doit être formé spécifiquement."},
{id:"v7k11",p:"CAC",th:"Exercice",ty:"qcm",q:"Le CAC qui souhaite certifier les informations en matière de durabilité (CSRD) doit :",ch:["Simplement être inscrit sur la liste des CAC","Suivre une formation homologuée par la H2A de 90 heures","Être également expert-comptable","Être accrédité par le COFRAC"],a:1,ex:"Art. 37 ord. 2023-1142 : les CAC doivent justifier d'une formation homologuée par la H2A. La validation d'une formation homologuée vaut pour 90 heures de formation continue.",sr:"Ord. 2023-1142, art. 37 / Arrêté 28/12/2023"},
{id:"v7k12",p:"CAC",th:"Exercice",ty:"qcm",q:"La mission de certification des informations de durabilité peut être confiée :",ch:["Uniquement au CAC de l'entité","Au CAC de l'entité ou à un organisme tiers indépendant (OTI)","Uniquement à un OTI accrédité","À n'importe quel auditeur"],a:1,ex:"Art. L. 821-54 C. com. : la certification peut être réalisée par le CAC ou un OTI. En cas de comptes consolidés, un CAC et un OTI peuvent intervenir conjointement.",sr:"C. com., art. L. 821-54"},
{id:"v7k13",p:"CAC",th:"Déontologie",ty:"qrc",q:"Comment les règles d'indépendance et de déontologie s'appliquent-elles à la mission de certification des informations de durabilité ?",a:"Les règles applicables sont : 1) Le code de déontologie s'applique intégralement (Titre I socle commun + dispositions spécifiques). 2) Les incompatibilités sont les mêmes que pour la certification des comptes (art. L. 821-30 et suivants). 3) L'interdiction de fournir des services susceptibles de compromettre l'indépendance s'applique. 4) La rotation des cabinets (EIP) et des signataires s'applique. 5) Le plafonnement des honoraires SACC (70%) s'étend aux honoraires de la mission de certification de durabilité. 6) Le comité spécialisé (comité d'audit) doit approuver la nomination du CAC/OTI pour cette mission.",sr:"Ord. 2023-1142 / C. com., art. L. 821-30 et s.",kw:["code de déontologie","incompatibilités","indépendance","services","rotation","signataires","plafonnement","70%","comité spécialisé","approbation"],tip:"Les règles d'indépendance sont identiques à celles de la certification des comptes. C'est logique : le CAC ne doit pas être juge et partie sur la durabilité non plus."},

// ── QRC RÉÉQUILIBRAGE FINAL — Exercice EC ──

{id:"v7k14",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les différences entre « monopole » et « prérogative d'exercice exclusive » pour les EC ?",a:"Le terme « monopole » est impropre et doit être abandonné au profit de « prérogative d'exercice exclusive ». Les différences de logique sont : 1) « Monopole » implique que l'EC est le seul à pouvoir faire cette activité pour quelqu'un d'autre → ce n'est pas exact car l'entité peut toujours faire sa propre comptabilité elle-même (en interne). 2) « Prérogative d'exercice exclusive » signifie que si l'entité décide de confier ces travaux à un tiers externe, seul un EC inscrit peut les réaliser. 3) Le recours à un EC n'est jamais obligatoire — c'est un choix du client. 4) Conséquence pratique : l'exercice de ces activités par un non-inscrit constitue de l'exercice illégal (art. 20 ord. 1945).",sr:"Art. 2, 20 ord. 1945 / Profession EC 2025 §A.4",kw:["monopole","impropre","prérogative","exercice exclusive","tiers externe","interne","inscrit","jamais obligatoire","choix","exercice illégal","art. 20"],tip:"Question tombée au DEC mai 2025 (sujet connexe). La nuance monopole/prérogative est importante pour la compréhension de la profession."},
{id:"v7k15",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les missions de l'EC relevant de l'article 22 de l'ordonnance de 1945 qui ne font PAS partie de la prérogative d'exercice exclusive ?",a:"Les missions de l'art. 22 (hors prérogative) comprennent : 1) Consultations juridiques accessoires d'une mission comptable permanente/habituelle. 2) Études et travaux d'ordre statistique, économique, administratif, financier, environnemental, numérique. 3) Travaux à caractère administratif ou technique dans le domaine social et fiscal. 4) Activités commerciales accessoires (vente de logiciels, actes d'intermédiaire) depuis la norme agréée 2021. 5) Représentation devant certaines commissions administratives (CDAS, commissions fiscales). Ces missions peuvent être réalisées pour tout client, même sans mission comptable préalable (sauf consultations juridiques), à condition que l'expertise comptable reste l'activité principale.",sr:"Art. 22 ord. 1945 / Profession EC 2025 §A/B",kw:["article 22","consultations juridiques","accessoires","études","statistique","économique","numérique","activités commerciales","logiciels","intermédiaire","représentation","commissions","activité principale"],tip:"L'art. 22 élargit considérablement le champ d'intervention de l'EC. La condition clé : l'EC ne doit pas faire de ces activités son activité principale."},

// ── QRC RÉÉQUILIBRAGE FINAL — Déontologie EC ──

{id:"v7k16",p:"EC",th:"Déontologie",ty:"qrc",q:"L'EC est-il un agent immobilier ? Peut-il exercer cette activité ? Justifiez avec les textes.",a:"Non. L'agent immobilier est un intermédiaire commercial soumis à la loi Hoguet (loi 70-9 du 2/01/1970). Cette activité est incompatible avec la profession d'EC pour 3 raisons : 1) C'est une activité commerciale à titre principal (art. 22 al. 5 ord. 1945 interdit les activités commerciales à titre principal). 2) L'agent immobilier perçoit des commissions de tiers, or l'EC ne peut être rémunéré que par ses clients sous forme d'honoraires exclusifs (art. 24 ord. 1945). 3) Le maniement de fonds de tiers inhérent à la transaction immobilière est restreint pour l'EC. En revanche, l'EC peut réaliser des missions de conseil en immobilier (évaluation, optimisation fiscale, gestion locative sans maniement de fonds) dans le cadre de l'article 22.",sr:"Art. 22 al. 5, art. 24 ord. 1945 / Loi Hoguet 70-9",kw:["agent immobilier","incompatible","loi Hoguet","activité commerciale","principale","commissions","tiers","honoraires exclusifs","maniement de fonds","conseil","évaluation","optimisation fiscale"],tip:"Question tombée au DEC mai 2023/2025. L'interdiction porte sur l'ACTIVITÉ d'agent immobilier, pas sur le conseil en immobilier."},

// ── QRC RÉÉQUILIBRAGE FINAL — Qualité EC ──

{id:"v7k17",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les trois grandes natures de missions distinguées par le cadre de référence du référentiel normatif EC ?",a:"Le cadre de référence distingue 3 grandes natures : 1) Missions d'assurance sur des comptes complets historiques : NP 2300 (présentation — assurance modérée), NP 2400 (examen limité — assurance modérée), mission d'audit ISA (assurance raisonnable). 2) Missions sans assurance : NP 4400 (procédures convenues — constats factuels), NP 4410 (compilation — mise en forme). 3) Missions d'assurance portant sur des éléments autres que des comptes complets historiques : NP 3100 (attestation particulière — assurance raisonnable ou modérée), NP 3530 (informations prévisionnelles — assurance modérée). Toutes sont soumises aux 3 normes transversales : code de déontologie, NPMQ, NPLAB.",sr:"Cadre de référence / Référentiel normatif 2025 / DEC Mai 2025 Q2",kw:["3 natures","assurance","comptes complets","modérée","raisonnable","sans assurance","constats factuels","compilation","attestation particulière","prévisionnelles","transversales","NPMQ","NPLAB"],tip:"Question tombée au DEC mai 2025 (3 points). Les 3 catégories structurent tout le référentiel normatif EC."},

// ── QRC RÉÉQUILIBRAGE FINAL — Responsabilité EC ──

{id:"v7k18",p:"EC",th:"Responsabilité",ty:"qrc",q:"À quelles sanctions s'expose un EC en cas de non-respect des règles déontologiques ?",a:"L'EC s'expose à 3 types de sanctions : 1) Sanctions disciplinaires (art. 53 ord. 1945) : avertissement, blâme, suspension temporaire (max 5 ans), radiation. Sanctions complémentaires : interdiction de siéger aux conseils (max 10 ans), publication de la décision, frais de procédure. 2) Sanctions pénales (selon l'infraction) : violation du secret professionnel (art. 226-13 CP : 1 an, 15 000 €), exercice illégal (art. 433-17 CP), complicité d'infractions du client. 3) Sanctions civiles : responsabilité contractuelle (5 ans, obligation de moyens), responsabilité quasi-délictuelle envers les tiers. En matière LBC-FT : sanctions spécifiques de la Commission nationale (art. 53 bis) pouvant aller jusqu'à 1 M€ de sanction pécuniaire. Les 3 types de responsabilité sont cumulables.",sr:"Art. 53, 53 bis ord. 1945 / Art. 226-13 CP / Art. 2224 Code civil / DEC Mai 2025 Q1",kw:["disciplinaires","avertissement","blâme","suspension","radiation","pénales","secret professionnel","exercice illégal","complicité","civiles","contractuelle","quasi-délictuelle","LBC-FT","1 M€","cumulables"],tip:"Question tombée au DEC mai 2025 (2 points). Les 3 types sont cumulables — c'est un point essentiel."},

// ── QRC RÉÉQUILIBRAGE FINAL — Responsabilité CAC ──

{id:"v7k19",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Le CAC est-il responsable civilement envers les tiers (et non seulement envers l'entité auditée) ?",a:"Oui. La responsabilité civile du CAC s'exerce à double niveau : 1) Envers l'entité auditée (responsabilité contractuelle) : le CAC est responsable des fautes commises dans l'exécution de sa mission. L'obligation est de moyens : il ne garantit pas l'absence d'anomalies mais doit mettre en œuvre les diligences requises. 2) Envers les tiers (responsabilité délictuelle, art. 1240 Code civil) : les tiers (actionnaires, créanciers, investisseurs) qui subissent un préjudice du fait d'une faute du CAC peuvent engager sa responsabilité. Le tiers doit prouver la faute, le préjudice et le lien de causalité. Limitation : le CAC bénéficie d'une immunité pour la révélation des faits délictueux au procureur (art. L. 821-10 C. com.).",sr:"Art. 1240 Code civil / C. com., art. L. 821-10",kw:["tiers","responsabilité délictuelle","contractuelle","entité auditée","actionnaires","créanciers","investisseurs","faute","préjudice","lien de causalité","immunité","révélation","procureur"],tip:"La double responsabilité (contractuelle envers l'entité + délictuelle envers les tiers) est un point fondamental. L'immunité de révélation est l'exception notable."},

// ── QRC RÉÉQUILIBRAGE FINAL — Exercice CAC ──

{id:"v7k20",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les catégories d'entités qualifiées d'EIP (entités d'intérêt public) au sens du code de commerce ?",a:"Les EIP (art. L. 821-2-III C. com.) comprennent : 1) Les établissements de crédit (banques). 2) Les entreprises d'assurance et de réassurance. 3) Les institutions de prévoyance et mutuelles. 4) Les sociétés cotées sur un marché réglementé. 5) Les compagnies financières holdings et compagnies financières holdings mixtes (si bilan consolidé > 5 Md€). 6) Les sociétés de groupe d'assurance et unions mutualistes de groupe (si bilan > 5 Md€). Les associations faisant appel à la générosité publique (APG) > 153 000 € de dons ne sont PAS des EIP mais ont des obligations similaires (co-commissariat, rotation).",sr:"C. com., art. L. 821-2-III / H2A FAQ §2",kw:["EIP","établissements de crédit","assurance","réassurance","prévoyance","mutuelles","sociétés cotées","marché réglementé","holdings","5 milliards","APG","pas EIP"],tip:"Les catégories d'EIP sont fréquemment testées au DEC. Les APG ne sont PAS des EIP — c'est un piège classique."},

// V7 PASSE 11 — QRC rééquilibrage vers 50% (30 QRC ciblées)

// ── Exercice EC (besoin : 10 QRC) ──

{id:"v7l1",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les conditions de création et de fonctionnement d'une AGC (Association de Gestion et de Comptabilité) ?",a:"Les AGC (art. 7 ter et 83 ord. 1945) sont des associations loi 1901 autorisées à exercer l'activité d'expertise comptable. Conditions : 1) Inscription sur une liste spéciale tenue par la Commission 42 bis. 2) Les professionnels EC des AGC sont des salariés (et non des libéraux). 3) Les salariés autorisés exercent sous les art. 83 ter et 83 quater. 4) Les AGC sont soumises aux mêmes normes professionnelles, déontologiques et disciplinaires. 5) Elles versent des contributions (et non des cotisations) au conseil régional. 6) Elles sont soumises au contrôle qualité.",sr:"Art. 7 ter, 83 ord. 1945 / CNOEC 2025",kw:["AGC","association","loi 1901","Commission 42 bis","salariés","83 ter","83 quater","normes","déontologiques","contributions","contrôle qualité"],tip:"Les AGC sont un mode d'exercice méconnu mais régulièrement testé. La distinction cotisation/contribution est un piège."},
{id:"v7l2",p:"EC",th:"Exercice",ty:"qrc",q:"Qu'est-ce que le statut d'expert-comptable en entreprise créé par la loi PACTE ?",a:"Art. 13 ord. 1945 (loi PACTE 2019) : 1) Les personnes physiques salariées d'une entité non inscrite au Tableau peuvent être inscrites en qualité d'EC en entreprise. 2) Conditions : être titulaire du DEC et remplir les conditions de l'art. 3-II. 3) L'EC en entreprise est inscrit au Tableau mais n'est PAS membre de l'Ordre. 4) Il ne peut accomplir aucune mission de l'art. 2 sauf au bénéfice de l'entité qui l'emploie. 5) Il est soumis à l'obligation de formation continue. 6) En juillet 2025 : 206 EC en entreprise inscrits.",sr:"Art. 13 ord. 1945 / CNOEC 2025",kw:["EC en entreprise","PACTE","salarié","non inscrite","DEC","inscrit au Tableau","pas membre","Ordre","article 2","bénéfice","entité employeuse","206"],tip:"L'EC en entreprise est inscrit au Tableau MAIS pas membre de l'Ordre — c'est la subtilité essentielle."},
{id:"v7l3",p:"EC",th:"Exercice",ty:"qrc",q:"Quelles sont les missions interdites aux EC et pourquoi ?",a:"Les missions interdites (art. 22 al. 5 ord. 1945) comprennent : 1) L'activité d'agent d'affaires (intermédiaire rémunéré par des tiers). 2) L'activité d'agent immobilier (loi Hoguet). 3) La fonction de représentant fiscal (garant du paiement de l'impôt). 4) Le maniement de fonds sauf recouvrement amiable et mandat de paiement encadrés. 5) La représentation devant les tribunaux (art. 22 al. 5). 6) Les activités commerciales à titre principal. Raison fondamentale : ces activités compromettent l'indépendance de l'EC ou créent des conflits d'intérêts incompatibles avec sa mission de confiance.",sr:"Art. 22 al. 5 ord. 1945",kw:["interdites","agent d'affaires","agent immobilier","représentant fiscal","garant","maniement de fonds","représentation","tribunaux","commerciales","principal","indépendance","conflits d'intérêts"],tip:"Les 6 interdictions sont à connaître avec leurs justifications. Le fil rouge est la protection de l'indépendance."},
{id:"v7l4",p:"EC",th:"Exercice",ty:"qrc",q:"Quelle procédure doit suivre une personne physique pour s'inscrire au Tableau de l'Ordre des EC ?",a:"La procédure (art. 42 ord. 1945 / art. 114-118 décret 2012-432) est : 1) Demande d'inscription au conseil régional du ressort de l'établissement principal. 2) Constitution du dossier : DEC ou titre équivalent, casier judiciaire (B2), attestation d'assurance RCP, serment. 3) Instruction par le conseil régional : vérification des conditions (art. 3-II). 4) Décision du conseil régional dans un délai de 3 mois. 5) Notification au candidat et au Commissaire du Gouvernement dans les 10 jours. 6) En cas de refus : recours possible devant le Comité national du Tableau dans un délai d'1 mois.",sr:"Art. 42 ord. 1945 / Art. 114-118 décret 2012-432",kw:["demande","conseil régional","dossier","DEC","casier judiciaire","assurance","serment","3 mois","notification","Commissaire du Gouvernement","10 jours","refus","Comité national","1 mois"],tip:"Les délais sont importants : 3 mois pour statuer, 10 jours pour notifier, 1 mois pour recourir."},
{id:"v7l5",p:"EC",th:"Exercice",ty:"qrc",q:"Comment les spécialisations des EC sont-elles encadrées depuis le décret du 30 décembre 2022 ?",a:"Le décret du 30 décembre 2022 a modifié l'article 154 du décret 2012-432 : 1) L'ancien dispositif de reconnaissance préalable des compétences spécialisées par l'Ordre a été supprimé. 2) Les EC peuvent mentionner librement leurs spécialisations sur leurs imprimés professionnels. 3) La spécialisation doit être justifiable lors des contrôles de l'Ordre par : a) une formation d'au moins 120 heures dans les 5 dernières années, OU b) le suivi/conception/animation de 40 heures de formation sur 5 ans dans le domaine, OU c) au moins 10% de l'activité annuelle consacrée au domaine. 4) Les anciennes reconnaissances restent valables jusqu'à la fin de leur période de validité.",sr:"Art. 154 décret 2012-432 modifié / Art. 306 RI / Profession EC 2025 §E.5",kw:["spécialisations","décret 2022","article 154","librement","imprimés","justifiable","contrôles","120 heures","5 ans","40 heures","10%","activité"],tip:"Le nouveau régime est déclaratif (plus d'autorisation préalable). Les 3 critères alternatifs sont à connaître."},

// ── Exercice CAC (besoin : 10 QRC) ──

{id:"v7l6",p:"CAC",th:"Exercice",ty:"qrc",q:"Quels sont les seuils de nomination obligatoire d'un CAC dans les sociétés commerciales (SA, SAS, SARL) ?",a:"Depuis les décrets de 2019 (PACTE) et 2024 (décret 2024-152) : Pour les SA : la nomination est obligatoire (pas de seuil). Pour les SAS et SARL : nomination obligatoire si dépassement de 2 des 3 seuils pendant 2 exercices consécutifs : total du bilan > 5 000 000 €, CA HT > 10 000 000 €, nombre moyen de salariés > 50. Pour les « petits groupes » (art. L. 821-43) : seuils cumulés (mère + filiales) : bilan > 5 000 000 €, CA HT > 10 000 000 €, salariés > 50. Pour les filiales importantes : seuils individuels : bilan > 2 500 000 €, CA HT > 5 000 000 €, salariés > 25.",sr:"C. com., art. D. 821-171, D. 821-172 / Décret 2024-152",kw:["seuils","SA","obligatoire","SAS","SARL","5 000 000","10 000 000","50","petits groupes","cumulés","filiales","2 500 000","5 000 000","25"],tip:"Les seuils ont été relevés par PACTE puis ajustés par le décret 2024-152. La SA n'a pas de seuil (obligation absolue)."},
{id:"v7l7",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les obligations du CAC en matière de signalement des irrégularités et de révélation des faits délictueux ?",a:"Art. L. 821-10 C. com. prévoit 2 obligations distinctes : 1) Signalement des irrégularités et inexactitudes : le CAC les signale à la plus prochaine AG ou réunion de l'organe compétent. Ce sont des manquements aux textes légaux/réglementaires ou aux normes comptables qui ne constituent pas nécessairement des infractions pénales. 2) Révélation des faits délictueux au procureur de la République : le CAC révèle les faits ayant un caractère délictueux dont il a eu connaissance, sans que sa responsabilité puisse être engagée par cette révélation (immunité). La révélation doit porter sur des faits précis, circonstanciés et volontaires. La non-révélation est punie de 5 ans et 75 000 € (art. L. 821-8).",sr:"C. com., art. L. 821-10, L. 821-8",kw:["signalement","irrégularités","inexactitudes","AG","organe compétent","révélation","faits délictueux","procureur","connaissance","immunité","précis","circonstanciés","non-révélation","5 ans","75 000"],tip:"La distinction signalement (→ AG) et révélation (→ procureur) est fondamentale. L'immunité ne protège que la révélation de bonne foi."},
{id:"v7l8",p:"CAC",th:"Exercice",ty:"qrc",q:"Quels sont les pouvoirs d'investigation du CAC et leurs limites ?",a:"Art. L. 821-60 et L. 821-61 C. com. : 1) Le CAC opère toutes vérifications et tous contrôles qu'il juge opportuns, à toute époque de l'année. 2) Il peut se faire communiquer sur place toutes pièces utiles (contrats, livres, documents comptables, PV). 3) Ses investigations s'étendent aux entités mère et filles (art. L. 821-61). 4) Il peut recueillir des informations auprès de tiers ayant accompli des opérations pour le compte de l'entité. 5) Le secret professionnel ne peut lui être opposé, sauf par les auxiliaires de justice (avocats). 6) Il peut se faire assister ou représenter par des experts ou collaborateurs (qu'il fait connaître nommément). Limites : il ne peut pas obtenir communication de pièces détenues par des tiers sans autorisation judiciaire.",sr:"C. com., art. L. 821-60, L. 821-61",kw:["vérifications","contrôles","opportuns","pièces","contrats","livres","mère","filles","tiers","secret professionnel","inopposable","auxiliaires de justice","avocats","experts","collaborateurs","autorisation judiciaire"],tip:"Les pouvoirs du CAC sont très étendus mais pas illimités. La limite « tiers + autorisation judiciaire » est un piège classique."},
{id:"v7l9",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les personnes ou organes qui composent le Conseil national des commissaires aux comptes (CNCC) ?",a:"Le Conseil national de la CNCC (art. L. 821-6 C. com.) est composé de 60 membres, désignés pour 4 ans : 1) Des commissaires aux comptes élus par les CRCC. 2) Des membres de droit (représentants de l'État, de la H2A). Le CN est présidé par un CAC élu. Ses missions incluent : représenter la profession auprès des pouvoirs publics, contribuer à l'élaboration des NEP, organiser la formation continue, coordonner les CRCC, assurer la discipline conjointe avec la H2A (compétence historique transférée). Les CRCC sont les instances régionales qui assurent l'inscription et le suivi local des CAC.",sr:"C. com., art. L. 821-6 / DEC Mai 2021 Q12",kw:["60 membres","4 ans","élus","CRCC","présidé","CAC","pouvoirs publics","NEP","formation continue","CRCC","inscription"],tip:"Question tombée au DEC mai 2021. Ne confondez pas CNCC (représentation professionnelle) et H2A (régulateur/superviseur)."},
{id:"v7l10",p:"CAC",th:"Exercice",ty:"qrc",q:"Que se passe-t-il lorsqu'une société de CAC est absorbée par une autre société de CAC ? Quel est le sort des mandats ?",a:"Art. L. 821-48 C. com. : lorsqu'une société de CAC est absorbée, les mandats de certification des comptes détenus par la société absorbée deviennent les mandats de la société absorbante. Les conditions de poursuite sont : 1) La société absorbante doit être une société de CAC inscrite. 2) Les mandats sont transférés de plein droit (pas de nouvelle nomination nécessaire). 3) La durée résiduelle du mandat est conservée. 4) L'entité contrôlée conserve le droit de récuser le CAC ou de demander sa révocation pour juste motif. 5) Les règles d'indépendance et d'incompatibilité s'apprécient au regard de la nouvelle entité (société absorbante).",sr:"C. com., art. L. 821-48 / DEC Mai 2021 Q14",kw:["absorbée","absorbante","mandats","transférés","plein droit","durée résiduelle","récuser","révocation","indépendance","nouvelle entité"],tip:"Question tombée au DEC mai 2021. Le transfert de plein droit est la règle, mais les droits de l'entité auditée (récusation, révocation) subsistent."},

// ── Déontologie EC (besoin : 11 QRC) ──

{id:"v7l11",p:"EC",th:"Déontologie",ty:"qrc",q:"Quels sont les principes et limites de l'indépendance de l'EC (art. 145-146 du code de déontologie) ?",a:"L'indépendance (art. 145-146 décret 2012-432) implique : 1) L'EC ne doit subir aucune pression extérieure (client, tiers, administration). 2) Il doit éviter tout conflit d'intérêts (art. 145). 3) Il ne peut avoir de liens financiers, personnels ou professionnels de nature à compromettre son indépendance. 4) En cas de doute, il évalue les risques et met en place des mesures de sauvegarde. 5) Si les sauvegardes sont insuffisantes, il refuse ou se retire de la mission. Différence avec le CAC : l'indépendance de l'EC est moins réglementée (pas de liste d'incompatibilités légales, pas de rotation obligatoire), mais le principe est le même.",sr:"Art. 145-146 décret 2012-432",kw:["indépendance","pression","conflit d'intérêts","liens financiers","personnels","professionnels","mesures de sauvegarde","refuse","retire","CAC","moins réglementée","incompatibilités","rotation"],tip:"L'indépendance EC est un principe souple (pas de liste d'incompatibilités), contrairement au CAC (liste précise)."},
{id:"v7l12",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les obligations de l'EC en matière de lutte contre le blanchiment (NPLAB) ? Décrivez les étapes de la vigilance.",a:"La NPLAB impose 5 étapes de vigilance : 1) Identification et vérification de l'identité du client et du bénéficiaire effectif (entrée en relation). 2) Classification du risque : attribution d'un niveau de risque (faible, moyen, élevé) et d'un niveau de vigilance (standard ou renforcée). 3) Vigilance au cours de la relation d'affaires : surveillance des opérations, vérification de cohérence avec la connaissance du client. 4) Examen renforcé des opérations atypiques, complexes ou sans justification économique. 5) Déclaration de soupçon à TRACFIN si le professionnel sait, soupçonne ou a de bonnes raisons de soupçonner que des sommes proviennent d'une infraction. En complément : désignation d'un correspondant TRACFIN, d'un responsable du contrôle interne LBC-FT, et mise en place de procédures internes.",sr:"NPLAB §10-50 / Art. L. 561-2 12° CMF",kw:["identification","bénéficiaire effectif","classification","risque","vigilance","standard","renforcée","opérations atypiques","déclaration de soupçon","TRACFIN","correspondant","responsable","contrôle interne"],tip:"Les 5 étapes séquentielles sont le cœur de la NPLAB. La distinction vigilance standard/renforcée est un point de différenciation important."},
{id:"v7l13",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les règles applicables à la résiliation d'une lettre de mission EC ?",a:"Les règles de résiliation (art. 151 décret 2012-432 / art. L. 215-1 Code conso.) sont : 1) Le contrat peut prévoir les conditions de résiliation (préavis, indemnité). 2) Le client consommateur ou non-professionnel bénéficie des protections du Code de la consommation : l'EC doit l'informer chaque année de la possibilité de ne pas reconduire le contrat (tacite reconduction). 3) En cas de résiliation par le client sans respecter le préavis, l'EC a droit au paiement des travaux déjà effectués. 4) L'EC peut résilier la mission pour motif légitime : perte de confiance, non-respect des obligations par le client, non-paiement des honoraires. 5) La résiliation ne doit pas intervenir à un moment inopportun (obligation de continuité des services). 6) L'EC doit restituer les documents du client et faciliter la transition.",sr:"Art. 151 décret 2012-432 / Art. L. 215-1 Code conso. / DEC Nov 2022 Q7-8",kw:["résiliation","préavis","indemnité","consommateur","non-professionnel","reconduction","travaux effectués","motif légitime","confiance","non-paiement","inopportun","continuité","restituer","transition"],tip:"La distinction client professionnel/non-professionnel est importante pour la tacite reconduction. Le paiement des travaux effectués est un droit de l'EC."},
{id:"v7l14",p:"EC",th:"Déontologie",ty:"qrc",q:"L'EC peut-il exercer simultanément des activités d'EC et de CAC ? Sous quelles conditions ?",a:"Oui, l'exercice mixte est possible (art. 22 al. 7 ord. 1945). Conditions : 1) L'EC doit être inscrit sur la liste des CAC (art. L. 821-13 C. com.) et au Tableau de l'Ordre. 2) Il ne peut certifier les comptes d'une entité dont il tient ou a tenu la comptabilité au cours des 2 exercices précédents (incompatibilité). 3) La société d'exercice peut être mixte (SEC et société de CAC) sous réserve de respecter les conditions de détention de capital et de droits de vote des deux professions. 4) Les cabinets mixtes doivent respecter les règles de communication/publicité des DEUX professions (la plus restrictive s'applique). 5) Le professionnel doit cloisonner ses activités pour éviter tout conflit d'intérêts.",sr:"Art. 22 al. 7 ord. 1945 / Code déonto. CAC / Profession EC 2025 §E.3",kw:["exercice mixte","simultanément","EC","CAC","liste","Tableau","incompatibilité","tenu la comptabilité","2 exercices","société mixte","capital","droits de vote","communication","restrictive","cloisonner"],tip:"L'exercice mixte est courant. L'incompatibilité tenue de comptabilité/certification est la règle d'or."},
{id:"v7l15",p:"EC",th:"Déontologie",ty:"qrc",q:"Qu'est-ce que la non-immixtion dans la gestion du client et comment l'EC doit-il la respecter ?",a:"Le principe de non-immixtion (art. 155 décret 2012-432 et jurisprudence) signifie que : 1) L'EC ne doit pas se substituer au client dans ses décisions de gestion. 2) Il informe, conseille et met en garde, mais ne décide pas à la place du client. 3) Il ne peut pas s'immiscer dans les opérations commerciales, financières ou stratégiques de l'entité. 4) En cas de désaccord avec le client sur une décision de gestion, l'EC doit formaliser par écrit son opposition mais ne peut pas imposer sa position. 5) Exception : l'EC peut exiger des corrections comptables ou la mise en conformité avec les textes (ce n'est pas de l'immixtion mais l'exercice de son obligation professionnelle). La frontière est ténue entre le devoir de conseil (obligation) et la non-immixtion (interdiction).",sr:"Art. 155 décret 2012-432 / Jurisprudence",kw:["non-immixtion","substituer","décisions de gestion","informe","conseille","met en garde","décide pas","opérations commerciales","désaccord","formaliser","écrit","exiger","corrections comptables","conformité","frontière","devoir de conseil"],tip:"La non-immixtion est le corollaire du devoir de conseil. L'EC conseille mais ne décide pas. La frontière est souvent floue en pratique."},

// ── Qualité EC (besoin : 7 QRC) ──

{id:"v7l16",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les diligences de l'EC dans le cadre de l'acceptation et du maintien d'une mission (NPMQ §18-22) ?",a:"Avant d'accepter une mission, l'EC doit (NPMQ §18-22) : 1) Évaluer l'intégrité du client (antécédents, réputation, raisons du changement d'EC). 2) Vérifier qu'il dispose de la compétence, des ressources et du temps nécessaires. 3) S'assurer qu'il peut respecter les normes professionnelles et le code de déontologie. 4) Évaluer les risques (conflits d'intérêts, indépendance, LBC-FT). 5) Contacter le prédécesseur (art. 163 code déontologie). 6) Conclure une lettre de mission. Pour le maintien : l'EC réévalue périodiquement ces éléments et peut se retirer si les conditions ne sont plus réunies (perte de confiance, non-paiement, etc.).",sr:"NPMQ §18-22 / Art. 150, 163 décret 2012-432",kw:["acceptation","maintien","intégrité","compétence","ressources","temps","normes","conflits d'intérêts","indépendance","LBC-FT","prédécesseur","lettre de mission","réévalue","retirer"],tip:"L'acceptation est un moment clé. L'évaluation de l'intégrité du client est le premier filtre — si l'EC doute de l'intégrité, il refuse."},
{id:"v7l17",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les obligations de formation continue pour les EC et comment sont-elles contrôlées ?",a:"Les obligations (art. 145 décret 2012-432 / RI de l'Ordre) sont : 1) Obligation de maintenir un niveau de compétence suffisant. 2) Le Conseil national fixe le programme de formation obligatoire. 3) Le nombre minimal d'heures est de 40 heures par an (ou 120 heures sur 3 ans avec minimum 20h/an — alignement sur les CAC en pratique). 4) Les actions éligibles incluent : séminaires, colloques, e-learning, conception de formations, publications techniques. 5) Le contrôle est réalisé lors du contrôle qualité du cabinet (volet structurel). 6) Le non-respect peut justifier une sanction disciplinaire. Le contrôle qualité vérifie les attestations de présence et les justificatifs.",sr:"Art. 145 décret 2012-432 / RI Ordre",kw:["formation continue","compétence","programme","40 heures","120 heures","3 ans","20 heures","séminaires","colloques","e-learning","publications","contrôle qualité","attestations","sanction disciplinaire"],tip:"Les obligations de formation EC sont moins détaillées dans les textes que celles du CAC. Le contrôle est effectué via le contrôle qualité."},
{id:"v7l18",p:"EC",th:"Qualité",ty:"qrc",q:"Décrivez le contenu et les objectifs de la mission d'examen limité des comptes (NP 2400).",a:"La NP 2400 (examen limité) : 1) Objectif : exprimer une assurance modérée sur la conformité des comptes au référentiel comptable applicable. 2) Procédures : essentiellement des entretiens avec la direction et des procédures analytiques (pas de contrôles de substance détaillés comme dans l'audit). 3) Points d'attention : exhaustivité, changements comptables, opérations non courantes, continuité, événements postérieurs. 4) Le rapport exprime une conclusion négative : « rien n'a été relevé qui remette en cause la conformité ». 5) Les 5 conclusions possibles : sans réserve, avec réserve, défavorable, impossibilité de conclure, avec observation. 6) La mission est applicable aux comptes annuels, consolidés et intermédiaires.",sr:"NP 2400 §05-30",kw:["examen limité","assurance modérée","conformité","entretiens","procédures analytiques","contrôles de substance","conclusion négative","sans réserve","avec réserve","défavorable","impossibilité","observation","comptes consolidés"],tip:"L'examen limité se distingue de la mission de présentation (NP 2300) par un niveau de diligences plus élevé. La conclusion négative est la marque de l'assurance modérée."},

// ── Responsabilité EC (besoin : 8 QRC) ──

{id:"v7l19",p:"EC",th:"Responsabilité",ty:"qrc",q:"La responsabilité civile de l'EC peut-elle être engagée envers des tiers non clients (responsabilité quasi-délictuelle) ?",a:"Oui. La responsabilité quasi-délictuelle (art. 1240 Code civil) peut être engagée envers des tiers non clients : 1) Les associés/actionnaires qui ont subi un préjudice personnel du fait d'une faute de l'EC. 2) Les banques qui se sont fiées à des comptes présentés par l'EC comportant des erreurs significatives. 3) L'administration fiscale en cas de complicité de fraude. 4) Les créanciers de l'entreprise cliente. Le tiers doit prouver : une faute de l'EC, un préjudice subi par le tiers, et un lien de causalité direct entre la faute et le préjudice. La prescription est de 5 ans (art. 2224 Code civil).",sr:"Art. 1240, 2224 Code civil",kw:["quasi-délictuelle","tiers","non clients","art. 1240","associés","actionnaires","banques","comptes","administration fiscale","complicité","créanciers","preuve","faute","préjudice","lien de causalité","5 ans"],tip:"La responsabilité quasi-délictuelle est distincte de la contractuelle. Le tiers doit prouver les 3 éléments (faute, préjudice, causalité)."},
{id:"v7l20",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quels sont les principaux cas de mise en cause de la responsabilité pénale de l'EC en tant que complice ?",a:"L'EC peut être poursuivi comme complice (art. 121-7 Code pénal) lorsqu'il a sciemment aidé ou assisté son client dans la commission d'une infraction : 1) Complicité de fraude fiscale (art. 1741 CGI) : établissement de déclarations fiscales sciemment fausses, conseils frauduleux. 2) Complicité d'abus de biens sociaux (art. L. 241-3 C. com.) : aide à la dissimulation d'un ABS dans les comptes. 3) Complicité de travail dissimulé (art. L. 8221-1 Code du travail). 4) Complicité de banqueroute (art. L. 654-2 C. com.) : tenue de comptabilité fictive ou irrégulière en connaissance de cause. 5) Complicité d'escroquerie. L'élément intentionnel (connaissance du caractère frauduleux) est toujours requis.",sr:"Art. 121-7 Code pénal / Art. 1741 CGI / Art. L. 241-3, L. 654-2 C. com.",kw:["complice","121-7","sciemment","aidé","assisté","fraude fiscale","1741","ABS","dissimulation","travail dissimulé","banqueroute","comptabilité fictive","escroquerie","élément intentionnel"],tip:"La complicité suppose l'élément intentionnel. L'EC qui agit sans savoir n'est pas complice mais peut être responsable civilement."},

// ── Responsabilité CAC (besoin : 5 QRC) ──

{id:"v7l21",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Comment s'articulent les responsabilités civile, pénale et disciplinaire du CAC ? Sont-elles cumulables ?",a:"Les 3 responsabilités sont cumulables et indépendantes : 1) Responsabilité civile (art. L. 821-55 C. com.) : le CAC est responsable des fautes commises dans l'exercice de ses fonctions. Obligation de moyens. Prescription 5 ans (art. 2224 Code civil). 2) Responsabilité pénale (art. L. 821-7 à L. 821-9) : infractions spécifiques (usage illicite du titre, violation des incompatibilités, confirmation d'informations mensongères, non-révélation). Prescription 6 ans. 3) Responsabilité disciplinaire (art. L. 821-70 et s.) : tout manquement aux textes, normes ou code de déontologie. Commission des sanctions de la H2A. Prescription 6 ans. Le cumul signifie qu'un même fait peut donner lieu à des poursuites simultanées sur les 3 terrains. L'acquittement pénal ne fait pas obstacle aux poursuites disciplinaires.",sr:"C. com., art. L. 821-55, L. 821-7 à L. 821-9, L. 821-70",kw:["cumulables","indépendantes","civile","L. 821-55","moyens","5 ans","pénale","L. 821-7","6 ans","disciplinaire","L. 821-70","H2A","acquittement","fait obstacle"],tip:"Le principe de cumul et d'indépendance des 3 voies est fondamental. L'acquittement pénal ne bloque pas les poursuites disciplinaires."},

// ── Qualité CAC (besoin : 4 QRC) ──

{id:"v7l22",p:"CAC",th:"Qualité",ty:"qrc",q:"Qu'est-ce que la documentation de l'audit (NEP 230) et quels éléments doit-elle contenir ?",a:"La NEP 230 impose la constitution d'un dossier de travail contenant : 1) La trace des procédures d'audit mises en œuvre. 2) Les éléments probants collectés et les résultats des contrôles. 3) Les questions significatives identifiées et les conclusions du CAC. 4) La preuve de la revue des travaux par le responsable de mission. 5) L'identification des personnes ayant réalisé les travaux et la date. Le dossier doit être assemblé dans les 60 jours suivant la signature du rapport. Il est conservé pendant 6 ans (art. R. 823-10). Le dossier doit permettre à un CAC expérimenté n'ayant pas participé à la mission de comprendre les travaux réalisés et les conclusions.",sr:"NEP 230 §05-12 / C. com., art. R. 823-10",kw:["documentation","dossier","procédures","éléments probants","questions significatives","revue","responsable de mission","60 jours","signature","6 ans","CAC expérimenté","comprendre"],tip:"Le critère du « CAC expérimenté extérieur » est le test de suffisance de la documentation. Les 60 jours pour l'assemblage sont un délai strict."},

// ── Déontologie CAC (besoin : 2 QRC) ──

{id:"v7l23",p:"CAC",th:"Déontologie",ty:"qrc",q:"Quelles sont les dispositions complémentaires du code de déontologie CAC applicables au CAC dans l'exercice de son activité professionnelle pour le compte de l'entité auditée ?",a:"Les dispositions complémentaires (Section 3 du Titre I, art. 10-18) sont : 1) Lettre de mission obligatoire pour chaque mission/prestation (art. 10). 2) Démarche d'acceptation et de maintien de la mission (art. 10-11). 3) Honoraires en rapport avec les diligences (art. 12) — interdiction des honoraires conditionnels ou proportionnels (art. 13). 4) Cadeaux : interdiction de solliciter ou accepter des cadeaux au-delà du plafond fixé par arrêté (art. 14). 5) Publicité et sollicitation personnalisée encadrées (art. 15-16). 6) Succession entre confrères : vérification des conditions du non-renouvellement (art. 26). 7) Information sur la date de fin de mandat EIP (art. 27).",sr:"Code déonto. CAC, art. 10-18, 26-27 / DEC Nov 2021 Q17",kw:["dispositions complémentaires","lettre de mission","acceptation","maintien","honoraires","conditionnels","proportionnels","cadeaux","plafond","publicité","sollicitation","succession","non-renouvellement","fin de mandat"],tip:"Question tombée au DEC nov 2021. Les 7 dispositions complémentaires forment le socle pratique du code de déontologie CAC."},

// ── Déontologie EC — 10 QRC ──

{id:"v7m1",p:"EC",th:"Déontologie",ty:"qrc",q:"Quelles sont les obligations de l'EC en matière d'assurance responsabilité civile professionnelle ?",a:"Art. 17 ord. 1945 / art. 139-140 décret 2012-432 : 1) L'assurance RCP est obligatoire avant tout début d'activité. 2) L'EC adhère au contrat groupe négocié par le Conseil national. 3) Montants minimaux : 500 000 € par sinistre, 1 000 000 € par an. 4) Garantie subséquente de 10 ans minimum après cessation d'activité. 5) Le défaut d'assurance constitue un manquement disciplinaire. 6) Les missions gratuites sont couvertes. 7) L'EC doit vérifier l'adéquation de sa couverture (activités accessoires, missions hors normes). 8) Les fautes intentionnelles ou pénales ne sont pas couvertes (sauf faute d'un salarié — art. L. 121-2 Code assurances).",sr:"Art. 17 ord. 1945 / Art. 139-140 décret 2012-432",kw:["assurance RCP","obligatoire","contrat groupe","500 000","1 000 000","subséquente","10 ans","défaut","disciplinaire","gratuites","couvertes","intentionnelles","salarié","L. 121-2"],tip:"Les chiffres (500k€/sinistre, 1M€/an, 10 ans subséquente) reviennent systématiquement au DEC."},
{id:"v7m2",p:"EC",th:"Déontologie",ty:"qrc",q:"L'EC peut-il exercer la fonction de conseiller prud'homal simultanément à sa profession ?",a:"Oui. La fonction de conseiller prud'homal est compatible avec la profession d'EC. Art. 22 al. 7 ord. 1945 : les incompatibilités visent les activités commerciales à titre principal et certaines fonctions spécifiques (agent immobilier, agent d'affaires). La fonction de conseiller prud'homal, qui est un mandat judiciaire bénévole, ne fait pas partie des incompatibilités listées. De même, l'EC peut être expert judiciaire, conciliateur de justice, ou membre de commissions administratives.",sr:"Art. 22 ord. 1945 / DEC Mai 2023 Q5",kw:["conseiller prud'homal","compatible","incompatibilités","activités commerciales","mandat judiciaire","bénévole","expert judiciaire","conciliateur","commissions"],tip:"Le piège est de confondre l'agent immobilier (interdit) avec le conseiller prud'homal (autorisé). La clé est la nature de l'activité."},
{id:"v7m3",p:"EC",th:"Déontologie",ty:"qrc",q:"L'EC qui reçoit un prospectus dénigrant un confrère de la part d'un nouveau client potentiel peut-il accepter la mission ?",a:"L'EC doit être prudent. Les règles de confraternité (art. 161-164 décret 2012-432) imposent : 1) Vérifier que le prospectus ne provient pas du candidat successeur lui-même (auto-promotion dénigrante interdite par art. 152). 2) Contacter le confrère prédécesseur (art. 163) pour connaître les circonstances du changement. 3) S'assurer que les honoraires du prédécesseur sont réglés. 4) Si le client critique ouvertement le prédécesseur, l'EC pressenti ne doit pas reprendre ces critiques à son compte. 5) L'acceptation est possible si les conditions déontologiques sont réunies, mais l'EC doit être vigilant sur les motivations réelles du client (recherche de complaisance, pression sur les honoraires).",sr:"Art. 152, 161-164 décret 2012-432",kw:["confraternité","prospectus","dénigrant","confrère","prédécesseur","article 163","honoraires","réglés","critiques","vigilant","motivations","complaisance"],tip:"Le respect de la confraternité est un principe fondamental. L'EC ne doit jamais participer au dénigrement d'un confrère."},
{id:"v7m4",p:"EC",th:"Déontologie",ty:"qrc",q:"Un EC en difficultés financières peut-il continuer à exercer ? Quelles mesures de protection existent ?",a:"L'EC en difficulté peut continuer à exercer sous certaines conditions : 1) Il doit maintenir son assurance RCP (le défaut est un manquement disciplinaire). 2) Il doit continuer à satisfaire ses obligations professionnelles (formation, cotisations). 3) En cas de grave maladie ou d'empêchement : le président du CR peut proposer un remplaçant provisoire (art. 166 décret 2012-432). 4) En cas de cessation de paiement : la procédure collective s'applique (redressement ou liquidation judiciaire). 5) Le conseil régional peut proposer une omission provisoire du Tableau si l'EC ne remplit plus les conditions d'exercice. 6) Les confrères sont tenus par un devoir d'entraide (confraternité). L'EC doit informer ses clients si sa situation compromet la qualité des travaux.",sr:"Art. 166 décret 2012-432 / CNOEC 2025",kw:["difficultés financières","assurance RCP","obligations","remplaçant provisoire","article 166","cessation de paiement","procédure collective","omission provisoire","Tableau","entraide","confraternité","informer","clients"],tip:"La continuité de l'assurance RCP est la priorité absolue en cas de difficulté. L'omission provisoire est une mesure de protection, pas une sanction."},
{id:"v7m5",p:"EC",th:"Déontologie",ty:"qrc",q:"Un EC peut-il facturer des honoraires pour une activité commerciale accessoire (ex : vente de logiciels) ? Sous quelle forme ?",a:"Oui, mais exclusivement sous forme d'honoraires (art. 24 ord. 1945). Règles : 1) Les activités commerciales accessoires sont autorisées depuis la norme agréée en 2021. 2) Elles doivent s'inscrire dans le prolongement des missions du cabinet. 3) La rémunération est exclusivement sous forme d'honoraires facturés au client — jamais de commissions de tiers. 4) L'EC ne peut pas percevoir de rétrocommissions ou de marges commerciales sur des produits vendus. 5) L'activité commerciale ne peut pas constituer l'activité principale du cabinet. 6) L'EC doit respecter ses obligations déontologiques (indépendance, conflit d'intérêts) même dans ces activités.",sr:"Art. 22 al. 3, art. 24 ord. 1945 / Profession EC 2025 §D.4",kw:["activités commerciales","accessoires","honoraires","exclusivement","commissions","interdites","prolongement","missions","rétrocommissions","marges","activité principale","indépendance"],tip:"La règle d'or : l'EC n'est rémunéré que par ses clients, sous forme d'honoraires. Les commissions sont absolument interdites."},
{id:"v7m6",p:"EC",th:"Déontologie",ty:"qrc",q:"Quels sont les cas de rupture de la lettre de mission par l'EC et quelles précautions doit-il prendre ?",a:"L'EC peut mettre fin à la mission dans les cas suivants : 1) Perte de confiance dans l'intégrité du client. 2) Non-paiement persistant des honoraires malgré relance. 3) Non-respect des obligations contractuelles par le client (non-communication des documents). 4) Survenance d'un conflit d'intérêts irrémédiable. 5) Impossibilité de réaliser la mission conformément aux normes. Précautions : 1) Respecter le préavis prévu dans la lettre de mission. 2) Ne pas rompre à un moment inopportun (ex : veille de clôture fiscale). 3) Informer le client par écrit des motifs. 4) Restituer tous les documents. 5) Faciliter la transition avec le successeur. 6) Facturer les travaux déjà réalisés.",sr:"Art. 150-151 décret 2012-432",kw:["rupture","perte de confiance","intégrité","non-paiement","non-communication","conflit d'intérêts","normes","préavis","inopportun","écrit","motifs","restituer","documents","transition","facturer"],tip:"La rupture est un droit mais aussi une responsabilité. Le timing et la formalisation écrite sont essentiels pour éviter une mise en cause."},

// ── Exercice EC — 5 QRC ──

{id:"v7m7",p:"EC",th:"Exercice",ty:"qrc",q:"Quelle est la procédure d'omission provisoire du Tableau de l'Ordre des EC et dans quels cas intervient-elle ?",a:"L'omission provisoire (art. 124 décret 2012-432) intervient lorsqu'un EC cesse temporairement de remplir les conditions d'inscription, sans qu'il y ait motif disciplinaire : 1) Exercice effectif : l'EC n'exerce plus effectivement l'expertise comptable. 2) Incompatibilité temporaire : survenance d'une activité incompatible. 3) Non-respect des conditions d'inscription (ex : défaut d'assurance prolongé). L'omission est prononcée par le conseil régional après avis du Commissaire du Gouvernement. L'EC omis ne peut plus exercer ni utiliser le titre pendant la durée de l'omission. La réinscription est de droit lorsque les conditions sont à nouveau remplies.",sr:"Art. 124 décret 2012-432",kw:["omission provisoire","cesse","conditions","inscription","exercice effectif","incompatibilité","assurance","conseil régional","Commissaire du Gouvernement","titre","réinscription","de droit"],tip:"L'omission provisoire n'est PAS une sanction disciplinaire. C'est une mesure administrative liée aux conditions d'inscription."},
{id:"v7m8",p:"EC",th:"Exercice",ty:"qrc",q:"Quels sont les recours possibles en cas de refus d'inscription au Tableau de l'Ordre des EC ?",a:"Les recours (art. 42-44 ord. 1945) sont : 1) Recours devant le Comité national du Tableau (CNT) : dans le délai d'1 mois suivant la notification du refus. Le CNT statue dans un délai de 6 mois. L'affaire est portée entière devant le CNT. 2) Recours juridictionnel : contre la décision du CNT, recours devant le Conseil d'État (juridiction administrative). 3) Le Commissaire du Gouvernement peut également déférer la décision du conseil régional devant le CNT (en cas d'inscription qu'il conteste). 4) En cas de silence du conseil régional pendant 3 mois : le silence vaut rejet implicite, ouvrant droit au recours devant le CNT.",sr:"Art. 42-44 ord. 1945",kw:["recours","Comité national du Tableau","1 mois","6 mois","entière","Conseil d'État","juridiction administrative","Commissaire du Gouvernement","déférer","silence","3 mois","rejet implicite"],tip:"La double voie de recours (CNT puis Conseil d'État) est un point classique du DEC."},

// ── Exercice CAC — 5 QRC ──

{id:"v7m9",p:"CAC",th:"Exercice",ty:"qrc",q:"Quels sont les critères de détermination du barème d'heures du CAC et comment s'applique-t-il ?",a:"Le barème d'heures (art. R. 823-12 et D. 821-188 C. com.) fixe un nombre d'heures de travail minimum en fonction de critères : 1) Le total du bilan. 2) Le montant du CA HT ou des ressources. 3) Le nombre de salariés. Le barème est une fourchette (minimum-maximum). Une dérogation à la baisse peut être demandée au président de la CRCC (art. D. 821-190). Recours : devant le président de la CNCC, puis devant le bureau de la H2A. Le barème ne s'applique PAS : aux missions ALPE (NEP 911), aux prestations hors certification, ni aux missions de certification des informations de durabilité (CSRD). Le déclenchement de la procédure d'alerte peut majorer les heures de plus d'un tiers.",sr:"C. com., art. R. 823-12, D. 821-188, D. 821-190",kw:["barème d'heures","bilan","CA","salariés","fourchette","dérogation","baisse","président CRCC","CNCC","H2A","ALPE","prestations","CSRD","alerte","majorer","tiers"],tip:"Le barème est un sujet récurrent au DEC. Les exclusions (ALPE, prestations, CSRD) sont des pièges fréquents."},
{id:"v7m10",p:"CAC",th:"Exercice",ty:"qrc",q:"Quelles sont les obligations du CAC lors de la prise de connaissance de l'entité et de son environnement (NEP 315) ?",a:"Le CAC doit acquérir une connaissance suffisante (NEP 315 §01-15) portant sur : 1) Le secteur d'activité et la nature des activités. 2) Les objectifs et la stratégie de l'entité. 3) La structure juridique et la gouvernance. 4) L'organisation et le financement. 5) Les textes légaux et réglementaires applicables. 6) Le contrôle interne pertinent pour l'audit. 7) Les relations et transactions avec les parties liées. 8) L'importance des estimations comptables. 9) L'existence de procès, contentieux ou litiges. Sur cette base, le CAC évalue le risque d'anomalies significatives au niveau des comptes et au niveau des assertions, en distinguant le risque inhérent et le risque de contrôle.",sr:"NEP 315 §01-15",kw:["connaissance","secteur","activités","stratégie","structure juridique","contrôle interne","parties liées","estimations","litiges","risque inhérent","risque de contrôle","assertions"],tip:"La NEP 315 est la fondation de l'approche par les risques. Les 9 éléments de connaissance sont à maîtriser."},
{id:"v7m11",p:"CAC",th:"Exercice",ty:"qrc",q:"Quel est le rôle du CAC dans la prévention et le traitement des difficultés des entreprises ?",a:"Le CAC intervient à plusieurs niveaux : 1) Continuité d'exploitation (NEP 570) : appréciation sur 12 mois à compter de la clôture. Si doute, l'EC le mentionne dans son rapport (observation ou réserve selon l'info en annexe). 2) Procédure d'alerte (art. L. 234-1 C. com.) : 4 phases séquentielles si faits de nature à compromettre la continuité. 3) Communication au tribunal : le CAC peut être entendu par le président du tribunal de commerce (art. L. 611-2). 4) En cas de procédure collective : le CAC maintient sa mission, participe à l'inventaire, certifie les comptes pendant la période d'observation. 5) Le CAC ne peut PAS démissionner pour se soustraire à ces obligations.",sr:"NEP 570 / C. com., art. L. 234-1, L. 611-2",kw:["continuité","12 mois","doute","observation","réserve","alerte","4 phases","tribunal de commerce","procédure collective","inventaire","période d'observation","démissionner","soustraire"],tip:"Le rôle du CAC dans la prévention des difficultés est transversal (NEP 570 + alerte + communication tribunal)."},

// ── Qualité EC — 3 QRC ──

{id:"v7m12",p:"EC",th:"Qualité",ty:"qrc",q:"Quels éléments le contrôle structurel du contrôle qualité EC vérifie-t-il en pratique ?",a:"Le contrôle structurel (arrêté 3/05/2012 / Guide CQ) vérifie : 1) Organisation générale : organigramme, répartition des missions, taux d'encadrement (15/1). 2) Lettres de mission : existence, contenu, mise à jour. 3) Assurance RCP : validité, adéquation des garanties. 4) Formation continue : respect de l'obligation, attestations. 5) LBC-FT : procédures internes, correspondant TRACFIN, classifications des risques. 6) Code de déontologie : indépendance, confraternité, secret professionnel. 7) SMQ (NPMQ) : existence d'un manuel qualité, revues de dossiers, revues indépendantes. 8) Communication : conformité des supports (papier en-tête, site internet, spécialisations).",sr:"Arrêté 3/05/2012 / Contrôle qualité en pratique 2018 / NPMQ",kw:["contrôle structurel","organisation","organigramme","taux d'encadrement","15","lettres de mission","assurance","formation continue","LBC-FT","correspondant TRACFIN","déontologie","SMQ","manuel qualité","revues","communication"],tip:"Les 8 points du contrôle structurel couvrent l'ensemble de l'organisation du cabinet. C'est la partie « cabinet » du contrôle qualité."},
{id:"v7m13",p:"EC",th:"Qualité",ty:"qrc",q:"Comment l'EC applique-t-il la notion de caractère significatif dans ses missions d'assurance (NP 2300 et NP 2400) ?",a:"L'EC applique le caractère significatif (importance relative) pour : 1) Déterminer l'étendue des contrôles par épreuves : les contrôles se concentrent sur les éléments significatifs (montants élevés, comptes inhabituels). 2) Évaluer les anomalies identifiées : une anomalie est significative si elle peut influencer le jugement de l'utilisateur des comptes. 3) Déterminer la conclusion du rapport : les anomalies significatives non corrigées conduisent à une réserve ou un refus d'attester. 4) En pratique, l'EC fixe un seuil de signification en fonction du total du bilan, du CA, ou du résultat (souvent 1-5% du CA ou 5-10% du résultat). 5) La notion s'apprécie de manière qualitative et quantitative (une anomalie de faible montant peut être significative si elle change la nature d'un solde).",sr:"NP 2300 §11 / NP 2400 §15 / NPMQ",kw:["caractère significatif","importance relative","contrôles par épreuves","éléments significatifs","anomalies","jugement","utilisateur","réserve","refus","seuil de signification","bilan","CA","résultat","qualitative","quantitative"],tip:"Le seuil de signification n'est pas fixé par les normes EC (contrairement au CAC avec la NEP 320). C'est au jugement professionnel de l'EC de le déterminer."},
{id:"v7m14",p:"EC",th:"Qualité",ty:"qrc",q:"Quelles sont les diligences de l'EC dans le cadre d'une mission de procédures convenues (NP 4400) ?",a:"Les diligences (NP 4400) sont : 1) L'EC convient avec le client des procédures spécifiques à mettre en œuvre (elles sont définies contractuellement dans la lettre de mission). 2) Il met en œuvre uniquement les procédures convenues — ni plus, ni moins. 3) Il rapporte les constatations factuelles résultant de ses travaux (sans exprimer d'opinion ni d'assurance). 4) Le rapport est à usage exclusif des parties désignées dans la lettre de mission. 5) L'EC ne formule aucune conclusion sur la conformité ou la régularité des éléments examinés. 6) Il mentionne que les travaux ne constituent ni un audit, ni un examen limité, ni une présentation des comptes. Intérêt : cette mission est adaptée aux due diligence, aux vérifications ponctuelles, ou aux demandes spécifiques d'un tiers (banque, acquéreur).",sr:"NP 4400 §01-12",kw:["procédures convenues","contractuellement","lettre de mission","uniquement","constatations factuelles","opinion","assurance","usage exclusif","parties désignées","conformité","régularité","audit","examen limité","due diligence","vérifications ponctuelles"],tip:"La NP 4400 est la norme « sur mesure ». Le point clé : aucune assurance n'est exprimée. L'EC est un « exécutant » de procédures prédéfinies."},

// ── Responsabilité EC — 3 QRC ──

{id:"v7m15",p:"EC",th:"Responsabilité",ty:"qrc",q:"Quels sont les principaux moyens de défense de l'EC en cas de mise en cause de sa responsabilité civile ?",a:"Les moyens de défense sont : 1) Preuve de l'exécution du devoir de conseil : produire les courriers, comptes-rendus et mises en garde écrits. 2) Obligation de moyens : l'EC n'est pas garant du résultat, il doit prouver qu'il a mis en œuvre les diligences requises par les normes. 3) Faute du client : si le préjudice résulte d'informations fausses ou incomplètes fournies par le client, l'EC peut invoquer la faute du client (exonération partielle ou totale). 4) Absence de lien de causalité : le préjudice n'est pas la conséquence directe de la faute de l'EC. 5) Prescription : l'action est prescrite si plus de 5 ans se sont écoulés depuis la connaissance des faits (art. 2224 Code civil). 6) Clause limitative contractuelle : si la lettre de mission prévoit une limitation contractuelle (min 1 an, art. 2254 Code civil — non applicable aux consommateurs).",sr:"Art. 1231-1, 2224, 2254 Code civil",kw:["défense","preuve","devoir de conseil","écrits","obligation de moyens","diligences","normes","faute du client","informations fausses","exonération","lien de causalité","prescription","5 ans","clause limitative","1 an","consommateurs"],tip:"La preuve écrite du conseil donné est le premier moyen de défense. Sans écrit, l'EC aura beaucoup de mal à se défendre."},
{id:"v7m16",p:"EC",th:"Responsabilité",ty:"qrc",q:"L'EC peut-il être poursuivi pénalement pour exercice illégal de la profession ? Qui est visé et quelles sont les peines ?",a:"L'exercice illégal (art. 20 ord. 1945) vise : 1) Toute personne qui, sans être inscrite au Tableau, exerce habituellement des travaux prévus à l'art. 2 (tenue, révision, attestation). 2) L'EC qui couvre l'exercice illégal d'un tiers (mise à disposition du cabinet à un non-inscrit). 3) Les personnes autorisées à exercer partiellement (art. 26-0) qui dépassent leur périmètre. Peines : les peines des art. 433-17 et 433-25 du Code pénal s'appliquent. L'Ordre peut se constituer partie civile (art. 37-8° ord. 1945). La saisie comptable par un logiciel est considérée comme de la tenue de comptabilité par la jurisprudence (CA Paris, 27/05/2016). Le simple fait de « collecter des données » est aussi visé (CA Paris, 6/09/2019).",sr:"Art. 20, 37 ord. 1945 / Art. 433-17, 433-25 Code pénal / Jurisprudence",kw:["exercice illégal","article 20","inscrite","Tableau","habituellement","couvre","non-inscrit","433-17","433-25","partie civile","saisie comptable","logiciel","tenue de comptabilité","jurisprudence","collecter"],tip:"La jurisprudence est très extensive : même la saisie informatique est considérée comme de la tenue de comptabilité. L'Ordre peut agir en justice directement."},

// ── Responsabilité CAC — 4 QRC ──

{id:"v7m17",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quelles sont les sanctions disciplinaires que peut prononcer la Commission des sanctions de la H2A à l'encontre d'un CAC personne physique ?",a:"Les sanctions (art. L. 821-71 C. com.) sont : 1) L'avertissement. 2) Le blâme. 3) L'interdiction temporaire d'exercice (max 3 ans pour les PP, 5 ans pour les PM). 4) La radiation de la liste. 5) La sanction pécuniaire : max 250 000 € pour une PP, max 1 000 000 € ou la moyenne des honoraires perçus au cours des 3 derniers exercices pour une PM. Sanctions complémentaires possibles : inéligibilité aux fonctions de membre des instances professionnelles (max 10 ans), publication de la décision. L'exécution de la décision est immédiate (pas d'effet suspensif de l'appel sauf demande au Conseil d'État).",sr:"C. com., art. L. 821-71",kw:["sanctions","avertissement","blâme","interdiction","3 ans","radiation","sanction pécuniaire","250 000","1 000 000","moyenne honoraires","3 exercices","inéligibilité","10 ans","publication","exécution immédiate","Conseil d'État"],tip:"Les montants (250k€ PP, 1M€ ou moyenne 3 ans PM) et l'exécution immédiate (pas d'effet suspensif) sont des points distinctifs vs la procédure EC."},
{id:"v7m18",p:"CAC",th:"Responsabilité",ty:"qrc",q:"Quels sont les liens entre la déclaration de soupçon à TRACFIN et la révélation des faits délictueux au procureur pour le CAC ?",a:"Les deux obligations sont distinctes mais peuvent se combiner (NEP 9605 §76-78) : 1) Soupçon seul → TRACFIN uniquement : si le CAC soupçonne que des sommes proviennent d'une infraction, il déclare à TRACFIN mais ne révèle PAS au procureur (il ne sait pas encore). 2) Connaissance certaine → TRACFIN + procureur : si le CAC sait (certitude) que les sommes proviennent d'une infraction > 1 an, il déclare concomitamment à TRACFIN ET révèle au procureur (art. L. 821-10). 3) Évolution du soupçon en connaissance : le CAC réévalue tout au long de la mission. Si ses soupçons se confirment, il procède à la révélation. 4) La déclaration TRACFIN est confidentielle — elle ne peut PAS être révélée au client ni au procureur. La révélation au procureur est distincte et autonome.",sr:"NEP 9605 §76-78 / C. com., art. L. 821-10",kw:["soupçon","TRACFIN","uniquement","connaissance","certitude","concomitamment","procureur","L. 821-10","réévalue","confirment","confidentielle","ne peut pas","révéler","autonome"],tip:"La distinction soupçon (→ TRACFIN seul) vs connaissance (→ TRACFIN + procureur) est LE point clé de la NEP 9605 et un classique du DEC."},

// ── Qualité CAC — 4 QRC ──

{id:"v7m19",p:"CAC",th:"Qualité",ty:"qrc",q:"Quelles sont les 7 techniques de contrôle que le CAC peut utiliser dans le cadre de l'audit (NEP 330/911/912) ?",a:"Les 7 techniques (NEP 330/911 §23) sont : 1) Les procédures analytiques : appréciation d'éléments à partir de corrélations avec d'autres données. 2) L'inspection des enregistrements ou documents : examen de documents internes ou externes. 3) L'inspection des actifs corporels : contrôle physique. 4) L'observation physique : examiner l'exécution d'une procédure. 5) La demande d'information : adressée à des personnes internes ou externes. 6) La demande de confirmation de tiers : obtention d'une déclaration directement adressée au CAC par un tiers. 7) La vérification d'un calcul et la re-exécution d'un contrôle.",sr:"NEP 330 / NEP 911 §23 / NEP 912",kw:["7 techniques","procédures analytiques","inspection","documents","actifs corporels","observation physique","demande d'information","confirmation de tiers","vérification","calcul","re-exécution"],tip:"Les 7 techniques sont le « toolbox » du CAC. Elles sont combinées pour répondre aux risques identifiés."},
{id:"v7m20",p:"CAC",th:"Qualité",ty:"qrc",q:"Comment le CAC planifie-t-il sa mission et quels sont les documents qu'il établit (NEP 300) ?",a:"La planification (NEP 300 §06-14) comprend : 1) L'approche générale : définition de la stratégie d'audit, des ressources et du calendrier. 2) Le plan de mission : document stratégique fixant l'étendue, le calendrier et l'orientation des travaux. Il comprend le seuil de signification, les risques identifiés, la composition de l'équipe, les domaines significatifs. 3) Le programme de travail : traduction opérationnelle du plan — nature, étendue et calendrier des procédures d'audit pour chaque assertion. 4) Mise à jour : la planification est itérative. Le CAC peut modifier son approche en cours de mission si de nouveaux risques sont identifiés. Les modifications sont documentées avec leurs raisons. 5) Communication : le CAC peut s'entretenir de la planification avec les personnes appropriées de l'entité.",sr:"NEP 300 §06-14 / C. com., art. R. 823-11",kw:["planification","approche générale","stratégie","plan de mission","étendue","calendrier","seuil de signification","risques","programme de travail","assertions","itérative","modifier","documenter"],tip:"Plan de mission = stratégique, programme de travail = opérationnel. La planification est un processus dynamique, pas un document figé."},

// ── LACUNE 1 : Non-immixtion du CAC (2→5 questions) ──

{id:"v7n1",p:"CAC",th:"Exercice",ty:"qrc",q:"En quoi consiste le principe de non-immixtion dans la gestion applicable au CAC ? Comment se concilie-t-il avec ses pouvoirs d'investigation ?",a:"Le principe de non-immixtion (art. L. 821-60 C. com. et NEP 200 §36) signifie que : 1) Le CAC ne doit pas s'immiscer dans la gestion de l'entité : il ne participe pas aux décisions de gestion, ne formule pas de recommandations de gestion, ne prend pas parti dans les choix stratégiques. 2) Son rôle est de certifier les comptes, pas de gérer l'entité. Conciliation avec les pouvoirs d'investigation : 3) Le CAC dispose de pouvoirs d'investigation très étendus (art. L. 821-60-61) pour collecter les éléments probants. 4) Il peut demander toute pièce, accéder à tout document, interroger tout collaborateur — mais ces pouvoirs servent exclusivement à fonder son opinion sur les comptes. 5) Communiquer les faiblesses du contrôle interne (NEP 265) ou mettre en œuvre la procédure d'alerte n'est PAS de l'immixtion : c'est l'exercice d'obligations légales. 6) En revanche, conseiller sur le choix d'un système comptable, recommander un recrutement, ou proposer une réorganisation SERAIT de l'immixtion.",sr:"C. com., art. L. 821-60 / NEP 200 §36 / NEP 265",kw:["non-immixtion","gestion","décisions","recommandations","stratégiques","certifier","pouvoirs d'investigation","éléments probants","faiblesses","contrôle interne","alerte","obligations légales","système comptable","immixtion"],tip:"La frontière entre investigation légitime et immixtion est ténue. Le test : l'action sert-elle à fonder l'opinion sur les comptes (ok) ou à gérer l'entité (interdit) ?"},
{id:"v7n2",p:"CAC",th:"Exercice",ty:"qcm",q:"Laquelle de ces actions du CAC constitue une immixtion dans la gestion ?",ch:["Communiquer les faiblesses significatives du contrôle interne à la direction","Recommander un logiciel comptable spécifique à l'entité auditée","Déclencher la procédure d'alerte","Demander la confirmation de soldes auprès des tiers"],a:1,ex:"Recommander un logiciel comptable = conseil en gestion = immixtion. Les 3 autres actions sont des obligations légales du CAC.",sr:"NEP 200 §36 / C. com., art. L. 821-60"},
{id:"v7n3",p:"CAC",th:"Exercice",ty:"qrc",q:"Le délit d'entrave à la mission du CAC : en quoi consiste-t-il et quelles sont les sanctions ?",a:"Le délit d'entrave (art. L. 821-8, 3° et art. L. 820-4 C. com.) consiste à : 1) Mettre obstacle aux vérifications ou contrôles du CAC. 2) Refuser la communication de pièces ou documents demandés par le CAC dans le cadre de sa mission. 3) Fournir sciemment des informations inexactes au CAC. Sanctions : 5 ans d'emprisonnement et 75 000 € d'amende (art. L. 820-4). En pratique, le délit d'entrave protège les pouvoirs d'investigation du CAC et garantit qu'il peut exercer sa mission sans obstacle. Le CAC victime d'entrave doit en tirer les conséquences sur son rapport (limitation) et envisager la révélation au procureur si les faits sont délictueux.",sr:"C. com., art. L. 820-4, L. 821-8 / NEP 200",kw:["délit d'entrave","obstacle","vérifications","contrôles","communication","pièces","refus","informations inexactes","5 ans","75 000","pouvoirs d'investigation","limitation","révélation"],tip:"Le délit d'entrave est la protection pénale des pouvoirs d'investigation du CAC. C'est le pendant du principe de non-immixtion : le CAC ne s'immisce pas, mais en contrepartie on ne peut pas l'empêcher de contrôler."},
